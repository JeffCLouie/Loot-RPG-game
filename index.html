<!-- Dungeon Loot — a single-file browser-based pixel loot RPG -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dungeon Loot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --panel: #11111a;
    --border: #2a2a3a;
    --text: #c8c8d0;
    --gold: #c8a84b;
    --hp: #ff3b4e;
    --mp: #3a8bff;

    /* Loot tiers */
    --junk:      #6b6b6b;
    --normal:    #e8e8e8;
    --uncommon:  #44bb44;
    --rare:      #4488ff;
    --epic:      #aa44ff;
    --legendary: #ff8800;
    --unique:    #ff2222;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px 14px;
    padding: 6px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header h1 { color: var(--gold); font-size: 14px; letter-spacing: 2px; }
  #stats { display: flex; gap: 14px; font-size: 11px; }
  .stat-bar { display: flex; align-items: center; gap: 4px; }
  .bar-track { width: 74px; height: 13px; background: #45455e; border: 1px solid #000; border-radius: 4px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.6); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.2s; }
  .hp-fill  { background: linear-gradient(180deg, #ff6b78, var(--hp)); box-shadow: 0 0 7px var(--hp), inset 0 1px 0 rgba(255,255,255,0.4); }
  .mp-fill  { background: linear-gradient(180deg, #7db4ff, var(--mp)); box-shadow: 0 0 7px var(--mp), inset 0 1px 0 rgba(255,255,255,0.4); }
  #gold-display { color: var(--gold); font-size: 11px; }

  /* Header HUD chips: floor, level/XP, enemies remaining */
  .hud-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text); }
  .hud-item .hud-val { font-weight: bold; }
  #floor-hud { color: #9fd0ff; }
  #enemies-hud { color: #ff9a9a; }
  #level-hud { color: var(--gold); }
  #power-hud { color: #ffd24b; }
  .xp-track { width: 46px; height: 6px; background: #45455e; border: 1px solid #000; border-radius: 3px; overflow: hidden; }
  .xp-fill { height: 100%; background: linear-gradient(180deg, #ffe9a0, var(--gold)); box-shadow: 0 0 5px var(--gold); transition: width 0.2s; }

  /* Persistent red vignette when health is critical */
  #low-hp-vignette { position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: 0; box-shadow: inset 0 0 90px 28px rgba(220,0,30,0.55); transition: opacity 0.3s; }
  #low-hp-vignette.active { opacity: 1; animation: hpPulse 1.1s ease-in-out infinite; }
  @keyframes hpPulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.9; } }

  /* Heal button nudges you when you're hurt and holding potions */
  .heal-btn.urgent { animation: healPulse 0.85s ease-in-out infinite; }
  @keyframes healPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,60,80,0); } 50% { box-shadow: 0 0 10px 2px rgba(255,60,80,0.85); } }

  /* ── MAIN LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── GAME CANVAS ── */
  #game-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    width: 100%;
    flex: 1;
    min-height: 0;
    touch-action: none;
  }

  /* ── BOTTOM CONTROL BAR (thumb zone) ── */
  #control-bar {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 8px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    /* Stay above the bag overlay so the d-pad and action buttons remain usable. */
    position: relative;
    z-index: 210;
  }

  #action-buttons {
    display: flex;
    flex-direction: column;
    gap: 6px;
    justify-content: center;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    width: 58px;
    flex: 1;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: 'Courier New', monospace;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .action-icon { font-size: 18px; line-height: 1; display:flex; align-items:center; justify-content:center; }
  .action-icon svg { display:block; }
  .action-label { font-size: 9px; letter-spacing: 1px; }

  .heal-btn {
    background: #6a1a2a;
    border-color: #a03048;
    color: #ffd5dd;
  }
  .heal-btn:active { background: #c02040; }
  .heal-btn.empty { background: #2a1a1f; border-color: #3a2a2f; color: #6a4a52; }

  .bag-btn {
    background: #4a3520;
    border-color: #6b4f2f;
    color: #e8d5b5;
  }
  .bag-btn:active { background: #6b4f2f; }
  .bag-btn.open { background: #6b4f2f; border-color: var(--gold); color: #fff; }

  .newgame-action {
    background: #2a1a1a;
    border-color: #4a2a2a;
    color: #c89090;
  }
  .newgame-action:active { background: var(--hp); color: #fff; }
  .newgame-action.armed { background: var(--hp); color: #fff; border-color: #fff; }

  /* ── SIDE PANEL ── */
  /* Overlays the map (absolutely positioned) so opening it doesn't resize the
     game canvas. The control bar sits above it via a higher z-index. */
  #side-panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 160px;
    z-index: 200;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: -4px 0 14px rgba(0,0,0,0.45);
    transition: transform 0.18s ease, opacity 0.18s ease;
  }
  #side-panel.collapsed {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  .panel-tab {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 5px 0;
    background: none;
    border: none;
    color: #666;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  /* HERO tab glows gold while unspent attribute points are waiting. */
  .tab-btn.has-points { color: #ffe9a0; animation: tabGlow 1.1s ease-in-out infinite; }
  @keyframes tabGlow { 0%,100% { text-shadow: 0 0 0 rgba(255,210,75,0); } 50% { text-shadow: 0 0 8px rgba(255,210,75,0.95); } }

  /* ── HERO / ATTRIBUTES PANEL ── */
  .hero-power { text-align: center; padding: 8px 4px; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 6px; background: #14140f; }
  .hero-power .hp-label { font-size: 10px; color: #888; letter-spacing: 1px; }
  .hero-power .hp-value { font-size: 22px; font-weight: bold; color: #ffd24b; text-shadow: 0 0 10px rgba(255,210,75,0.6); }
  .hero-sub { font-size: 10px; color: #888; text-align: center; margin-bottom: 8px; line-height: 1.5; }
  .hero-points { text-align: center; font-size: 11px; color: #ffe9a0; margin-bottom: 8px; font-weight: bold; }
  .attr-row { display: flex; align-items: center; gap: 6px; padding: 5px 4px; border: 1px solid var(--border); border-radius: 5px; margin-bottom: 5px; }
  .attr-info { flex: 1; min-width: 0; }
  .attr-name { font-size: 11px; font-weight: bold; color: #d8d8e0; }
  .attr-desc { font-size: 9px; color: #777; line-height: 1.3; }
  .attr-val { font-size: 14px; font-weight: bold; color: #ffd24b; width: 24px; text-align: center; flex-shrink: 0; }
  .attr-plus { flex-shrink: 0; width: 30px; height: 30px; border: none; border-radius: 5px; background: #2e7d32; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; line-height: 1; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .attr-plus:active { background: #44bb44; }
  .attr-plus:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; }

  #panel-content { flex: 1; overflow-y: auto; padding: 6px; }
  #panel-content::-webkit-scrollbar { width: 4px; }
  #panel-content::-webkit-scrollbar-track { background: var(--bg); }
  #panel-content::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── LOOT LIST ── */
  .loot-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    margin-bottom: 3px;
    border: 1px solid transparent;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.3;
    transition: background 0.1s;
  }
  .loot-item:hover { background: #1e1e2e; border-color: var(--border); }
  .loot-item.selected { background: #1e1e30; border-color: #444; }
  /* Upgrade highlight: this item has more power than what's in its slot. */
  .loot-item.upgrade { border-color: #2e7d32; background: rgba(46,125,50,0.12); box-shadow: 0 0 6px rgba(68,187,68,0.25); }
  .loot-item.upgrade:hover { background: rgba(46,125,50,0.2); }
  .up-arrow { color: #5ee08a; font-weight: bold; }
  .equip-row-btn.upgrade-btn { background: #1b8f3a; box-shadow: 0 0 8px rgba(68,187,68,0.6); animation: upgPulse 1.3s ease-in-out infinite; }
  .equip-row-btn.upgrade-btn:active { background: #44bb44; }
  @keyframes upgPulse { 0%,100% { box-shadow: 0 0 4px rgba(68,187,68,0.4); } 50% { box-shadow: 0 0 11px rgba(68,187,68,0.85); } }
  .loot-info { flex: 1; cursor: pointer; min-width: 0; }
  .loot-info .item-name { overflow: hidden; text-overflow: ellipsis; }
  /* Little item picture shown at the start of each loot / gear / shop row. */
  .loot-icon {
    flex-shrink: 0;
    width: 22px;
    text-align: center;
    font-size: 16px;
    line-height: 1;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6));
  }
  .slot-icon { width: 18px; font-size: 14px; }

  /* ── COSMETICS / APPEARANCE ── */
  .cos-head { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 8px; }
  .cos-title { font-size: 11px; color: #c9a84a; letter-spacing: 1px; margin-bottom: 2px; }
  .cos-sub { font-size: 9px; color: #555; margin-bottom: 6px; }
  .cos-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 4px;
    font-size: 10px;
  }
  .cos-preview { width: 26px; text-align: center; font-size: 18px; line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6)); }
  .cos-info { flex: 1; min-width: 0; }
  .cos-slot-label { color: #888; }
  .cos-source { font-size: 9px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cos-btn {
    flex-shrink: 0;
    border: none;
    border-radius: 4px;
    background: #3a3a5a;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 10px;
    padding: 6px 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .cos-btn:active { background: #55557a; }
  .cos-btn.reset { background: #4a2e2e; font-size: 12px; width: 28px; padding: 6px 0; }
  .cos-btn.reset:active { background: var(--hp); }

  /* Inline action buttons on loot/gear rows */
  .row-btn {
    flex-shrink: 0;
    border: none;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .equip-row-btn {
    background: #2e7d32;
    color: #fff;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 7px 9px;
  }
  .equip-row-btn:active { background: #44bb44; }
  .unequip-row-btn {
    background: #5a2a2a;
    color: #fff;
    font-size: 12px;
    width: 28px;
    height: 28px;
    line-height: 1;
  }
  .unequip-row-btn:active { background: var(--hp); }

  .item-junk      { color: var(--junk); }
  .item-normal    { color: var(--normal); }
  .item-uncommon  { color: var(--uncommon); }
  .item-rare      { color: var(--rare); }
  .item-epic      { color: var(--epic); }
  .item-legendary { color: var(--legendary); }
  .item-unique    { color: var(--unique); }

  .item-name { font-weight: bold; }
  .item-type { font-size: 10px; opacity: 0.7; }
  /* Item power badge — a single gold number shown alongside an item's stats. */
  .item-power { color: #ffd24b; font-weight: bold; opacity: 0.95; margin-left: 5px; white-space: nowrap; }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    display: none;
    background: #0e0e1a;
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-size: 11px;
    min-width: 160px;
    max-width: 220px;
    /* Above the side panel (200) and control bar (210) so it never hides
       behind the drawer; below the non-interactive screen flash (300). */
    z-index: 250;
    pointer-events: auto;
    cursor: pointer;
    line-height: 1.6;
  }
  #tooltip .tt-name { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
  #tooltip .tt-stat { color: #8899bb; }
  #tooltip .tt-flavor { color: #666; font-style: italic; margin-top: 4px; font-size: 10px; }
  #tooltip .tt-tier { font-size: 10px; opacity: 0.7; }

  /* ── EQUIPMENT ── */
  .equip-slot {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 4px;
    min-height: 30px;
    font-size: 10px;
  }
  .slot-info { display: flex; align-items: center; gap: 6px; flex: 1; cursor: pointer; min-width: 0; }
  .slot-label { color: #555; width: 36px; flex-shrink: 0; }
  .slot-item { flex: 1; font-size: 10px; overflow: hidden; text-overflow: ellipsis; }
  .slot-empty { color: #333; }

  /* ── LOG ── */
  /* ── BOTTOM ROW: log (left) + dpad (right) ── */
  #bottom-row {
    display: flex;
    align-items: stretch;
    border-top: 1px solid var(--border);
    flex: 0 0 130px;
    min-height: 90px;
    max-height: 28vh;
    overflow: hidden;
  }

  #log {
    background: var(--panel);
    padding: 6px 8px;
    font-size: 12px;
    flex: 1;
    overflow-y: auto;
  }
  #log::-webkit-scrollbar { width: 3px; }
  #log::-webkit-scrollbar-thumb { background: var(--border); }
  .log-line { color: #b8b8c8; line-height: 1.55; }
  .log-line.important { color: #ffffff; }
  .log-line.loot { color: #6fe06f; }

  /* ── CONTROLS (mobile) ── */
  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
    flex-shrink: 0;
  }
  .dpad-btn {
    background: #1a1a2a;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .dpad-btn:active { background: #2a2a3a; }
  .dpad-center {
    background: #1e1e2e;
    border-color: var(--gold);
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 0;
  }

  #empty-panel { color: #333; text-align: center; padding: 20px 0; font-size: 11px; }

  /* ── SHOP MODAL ── */
  #shop-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
  }
  #shop-overlay.open { display: flex; }
  #shop-modal {
    background: #14101c;
    border: 2px solid #6b4f9f;
    border-radius: 10px;
    width: 100%;
    max-width: 340px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(140,90,255,0.4);
  }
  #shop-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: linear-gradient(90deg,#3a2a5a,#5a3a7a);
    border-bottom: 1px solid #6b4f9f;
  }
  #shop-title { color: #e8d5ff; font-size: 14px; font-weight: bold; }
  #shop-close {
    background: none; border: none; color: #c8b5e8;
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  #shop-gold {
    padding: 8px 12px; font-size: 12px; color: var(--gold);
    border-bottom: 1px solid var(--border);
  }
  #shop-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .shop-tab {
    flex: 1; padding: 8px 0; background: none; border: none;
    color: #777; font-family: 'Courier New', monospace; font-size: 12px;
    letter-spacing: 2px; cursor: pointer; border-bottom: 2px solid transparent;
  }
  .shop-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  #shop-content { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px; }

  .shop-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px; margin-bottom: 4px;
    border: 1px solid var(--border); border-radius: 5px;
  }
  .shop-row-info { flex: 1; min-width: 0; }
  .shop-row-name { font-weight: bold; font-size: 12px; }
  .shop-row-sub { font-size: 10px; opacity: 0.7; }
  .shop-row-stats { font-size: 10px; color: #8899bb; margin-top: 2px; line-height: 1.3; }
  .shop-price { color: var(--gold); font-size: 11px; flex-shrink: 0; }
  .shop-buy-btn, .shop-sell-btn {
    flex-shrink: 0; border: none; border-radius: 5px; cursor: pointer;
    font-family: 'Courier New', monospace; font-weight: bold;
    font-size: 11px; padding: 8px 10px; color: #fff;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .shop-buy-btn { background: #2e7d32; }
  .shop-buy-btn:active { background: #44bb44; }
  .shop-buy-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .shop-sell-btn { background: #8a6a1a; }
  .shop-sell-btn:active { background: var(--gold); }
  .shop-empty { color: #555; text-align: center; padding: 24px 0; font-size: 12px; }

  /* Brief full-screen colour flash for crits, low HP, and big events. */
  #screen-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 300;
    opacity: 0; transition: opacity 0.1s ease;
  }
  #screen-flash.active { opacity: 0.5; }

  /* ── WEB / DESKTOP LAYOUT ──
     On keyboard + mouse devices with room to spare, rearrange the play area:
     the log sits in a full-height column on the LEFT, a big SQUARE map fills
     the middle, and the loot drawer becomes a permanent right-hand column so
     the inventory list can scroll the full height and is never covered. The
     d-pad and bag toggle are dropped (keyboard moves; the drawer stays open),
     and heal / new-game float over the map's top-left corner.
     This block is intentionally gated to pointer:fine + hover so the stacked
     mobile/touch layout above is left completely untouched. */
  @media (min-width: 760px) and (hover: hover) and (pointer: fine) {
    /* Loot drawer: a real column in the flow (not an overlay), always open and
       a little wider so the LOOT/GEAR/HERO tabs have room to breathe. */
    #side-panel {
      position: static;
      flex: 0 0 210px;
      width: 210px;
      transform: none;
      opacity: 1;
      pointer-events: auto;
      box-shadow: none;
    }
    #side-panel.collapsed { transform: none; opacity: 1; pointer-events: auto; }

    #game-wrap {
      position: relative;
      display: grid;
      grid-template-columns: 250px 1fr;
      grid-template-rows: 1fr;
    }
    /* Log: full-height left column. */
    #bottom-row {
      grid-column: 1;
      grid-row: 1;
      flex: none;
      max-height: none;
      min-height: 0;
      border-top: none;
      border-right: 1px solid var(--border);
    }
    /* Map: the largest square that fits its cell, centered. */
    canvas {
      grid-column: 2;
      grid-row: 1;
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
      justify-self: center;
      align-self: center;
      flex: none;
    }
    /* No bottom bar on web — heal + new float over the map's top-left so they
       never cover the loot list. */
    #control-bar {
      position: absolute;
      top: 8px;
      left: 258px;
      padding: 0;
      background: none;
      border-top: none;
      width: auto;
      z-index: 215;
    }

<script>
// ══════════════════════════════════════════
// CONSTANTS & DATA
// ══════════════════════════════════════════

const TILE = 16;
const MAP_W = 20, MAP_H = 20;

// Each equipment slot, with the base item names that roll for it.
const SLOTS = {
  head:   { label: '🪖 Head',   names: ['Helm','Cap','Crown','Hood','Circlet'] },
  chest:  { label: '🛡 Chest',  names: ['Chestplate','Robe','Cuirass','Tunic','Mail'] },
  hands:  { label: '🧤 Hands',  names: ['Gauntlets','Gloves','Bracers','Grips'] },
  legs:   { label: '👖 Legs',   names: ['Greaves','Leggings','Tassets','Trousers'] },
  weapon: { label: '⚔ Weapon', names: ['Sword','Axe','Dagger','Staff','Bow','Mace','Spear','Scythe'] },
  ring:   { label: '💍 Ring',   names: ['Ring','Band','Signet','Loop'] },
  amulet: { label: '📿 Amulet', names: ['Amulet','Pendant','Necklace','Talisman','Charm'] },
};
const SLOT_KEYS = Object.keys(SLOTS);

// Roll weights for which slot a dropped item belongs to.
const SLOT_WEIGHTS = { weapon:22, chest:15, head:13, hands:13, legs:13, ring:12, amulet:12 };

// ── ITEM ICONS ──
// Every base item name maps to an emoji so loot can be *seen*: a small picture
// next to each bag row, and — for head/chest/weapon — drawn right onto the hero
// sprite so the character visibly wears its gear. Keyed by the base word found
// in an item's name (e.g. "Ancient Helm of Power" → "Helm" → 🪖).
const ITEM_ICONS = {
  // head
  Helm:'🪖', Cap:'🧢', Crown:'👑', Hood:'🥷', Circlet:'👲',
  // chest
  Chestplate:'🛡️', Robe:'🥼', Cuirass:'🦺', Tunic:'👕', Mail:'⛓️',
  // hands
  Gauntlets:'🧤', Gloves:'🧤', Bracers:'🧤', Grips:'🧤',
  // legs
  Greaves:'👖', Leggings:'👖', Tassets:'👖', Trousers:'👖',
  // weapon
  Sword:'🗡️', Axe:'🪓', Dagger:'🔪', Staff:'🪄', Bow:'🏹', Mace:'🔨', Spear:'🔱', Scythe:'⚔️',
  // ring
  Ring:'💍', Band:'💍', Signet:'💍', Loop:'💍',
  // amulet
  Amulet:'📿', Pendant:'📿', Necklace:'📿', Talisman:'🧿', Charm:'🔮',
};
const SLOT_ICONS = { head:'🪖', chest:'🛡️', hands:'🧤', legs:'👖', weapon:'⚔️', ring:'💍', amulet:'📿' };
// Slots that actually change how the hero sprite looks.
const VISUAL_SLOTS = ['head','chest','weapon'];

// Resolve an emoji picture for any item. New items carry a stored `icon`; older
// saved items are matched by the base word in their name, falling back to a
// generic per-slot icon (or a potion flask for non-gear).
function itemIcon(item) {
  if (!item) return '';
  if (item.icon) return item.icon;
  if (!item.slot) return '🧪';
  for (const base of Object.keys(ITEM_ICONS)) {
    if (new RegExp('\\b' + base + '\\b').test(item.name || '')) return ITEM_ICONS[base];
  }
  return SLOT_ICONS[item.slot] || '❔';
}

// Remember every distinct look the player has discovered, per visual slot, so
// the wardrobe (cosmetics) can offer it later — even after the item is sold.
function recordWardrobe(item) {
  if (!item || !item.slot || !VISUAL_SLOTS.includes(item.slot)) return;
  if (!player.wardrobe) player.wardrobe = { head:[], chest:[], weapon:[] };
  const list = player.wardrobe[item.slot] || (player.wardrobe[item.slot] = []);
  const icon = itemIcon(item);
  if (!list.some(w => w.icon === icon)) list.push({ icon, name: (item.name || '').replace(/^☠\s*/, '') });
}

// The emoji actually drawn on the sprite for a visual slot: a chosen cosmetic
// look wins; otherwise it mirrors whatever is equipped there; null = nothing.
function visualIcon(slot) {
  const cos = player.cosmetics && player.cosmetics[slot];
  if (cos) return cos;
  const it = equipped[slot];
  return it ? itemIcon(it) : null;
}

const POTIONS = ['Health Potion','Mana Potion','Elixir'];

const TIERS = {
  junk:      { color: '#6b6b6b', weight: 30 },
  normal:    { color: '#e8e8e8', weight: 35 },
  uncommon:  { color: '#44bb44', weight: 20 },
  rare:      { color: '#4488ff', weight: 10 },
  epic:      { color: '#aa44ff', weight: 4  },
  legendary: { color: '#ff8800', weight: 1  },
  unique:    { color: '#ff2222', weight: 0.5},
};

const PREFIXES = ['Ancient','Cursed','Blazing','Frozen','Runic','Shadow','Divine','Storm','Iron','Blood','Soul','Void'];
const SUFFIXES = ['of Power','of Doom','of the Fallen','of Light','of Ages','of Chaos','of the Ancients','of Fury'];

const FLAVOR = {
  junk:      ['Smells odd.','Someone threw this away.','Barely worth carrying.'],
  normal:    ['Reliable. Nothing more.','Solid craftsmanship.','Gets the job done.'],
  uncommon:  ['Faint magic hums within.','A cut above the rest.','Green with envy.'],
  rare:      ['The air crackles around it.','Forged in a dying star.','Few have seen its like.'],
  epic:      ['Power radiates from within.','Whispers of forgotten gods.','Even dragons fear this.'],
  legendary: ['Songs are sung of this.','History bends around it.','The gods weep with jealousy.'],
  unique:    ['Only one exists. You found it.','The world trembles.','Destiny has chosen you.'],
};

const STAT_NAMES = ['ATK','DEF','SPD','LCK','HP','MP','CRIT','REGEN'];
const HERO = '🧙';

// ── POWER & ATTRIBUTES ──
// Every equippable item has a single "power" number summarising how strong it is:
// each stat is worth a weighted amount, plus a flat bonus for its rarity tier.
// The player's overall power is built from their level, attributes, and gear.
const STAT_POWER_WEIGHTS = { ATK:3, DEF:2, SPD:2, LCK:2, HP:1, MP:1, CRIT:4, REGEN:5, DMG:3 };
const TIER_POWER_BONUS = { junk:0, normal:1, uncommon:3, rare:7, epic:14, legendary:28, unique:50 };

// Hero attributes — raised by spending points earned on each level up.
const ATTRIBUTES = {
  might:    { label: '💪 Might',    short: 'MIG', desc: '+2 attack damage per point' },
  vitality: { label: '❤️ Vitality', short: 'VIT', desc: '+10 max HP per point' },
  agility:  { label: '🎯 Agility',  short: 'AGI', desc: '+1% crit chance per point' },
  spirit:   { label: '✨ Spirit',   short: 'SPR', desc: '+6 max MP & regen per point' },
};
const ATTR_KEYS = Object.keys(ATTRIBUTES);
const ATTR_POINTS_PER_LEVEL = 3;

// Total power of a single item: weighted sum of its stats + a rarity bonus.
function itemPower(item) {
  if (!item || !item.stats) return 0;
  let p = 0;
  for (const [k, v] of Object.entries(item.stats)) {
    if (k === 'DMG') {
      const [lo, hi] = String(v).split('-').map(Number);
      p += ((lo + hi) / 2) * STAT_POWER_WEIGHTS.DMG;
    } else if (typeof v === 'number') {
      p += v * (STAT_POWER_WEIGHTS[k] || 1);
    }
  }
  p += TIER_POWER_BONUS[item.tier] || 0;
  return Math.max(0, Math.round(p));
}

// The player's overall power: a blend of level, spent attributes, and equipped gear.
function playerPower() {
  let p = player.level * 10;
  for (const slot of SLOT_KEYS) if (equipped[slot]) p += itemPower(equipped[slot]);
  const a = player.attributes || {};
  p += (a.might||0)*4 + (a.vitality||0)*3 + (a.agility||0)*3 + (a.spirit||0)*2;
  return Math.round(p);
}

// Max HP/MP are derived from level + attributes so the formula stays consistent
// across level ups, attribute spends, and loading an older save.
function baseMaxHp() { return 92 + player.level*8 + (player.attributes?.vitality||0)*10; }
function baseMaxMp() { return 56 + player.level*4 + (player.attributes?.spirit||0)*6; }
function recomputeMaxStats() {
  player.maxHp = baseMaxHp();
  player.maxMp = baseMaxMp();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  if (player.mp > player.maxMp) player.mp = player.maxMp;
}

const FOODS = [
  { emoji: '🍖', name: 'Drumstick',   heal: 15 },
  { emoji: '🍗', name: 'Roast Leg',   heal: 20 },
  { emoji: '🥩', name: 'Steak',       heal: 28 },
  { emoji: '🍎', name: 'Apple',       heal: 10 },
  { emoji: '🍞', name: 'Bread',       heal: 8  },
  { emoji: '🧀', name: 'Cheese',      heal: 12 },
  { emoji: '🥧', name: 'Meat Pie',    heal: 25 },
  { emoji: '🍕', name: 'Pizza Slice', heal: 18 },
  { emoji: '🍔', name: 'Burger',      heal: 22 },
  { emoji: '🍲', name: 'Hot Stew',    heal: 24 },
  { emoji: '🍇', name: 'Grapes',      heal: 9  },
  { emoji: '🍓', name: 'Strawberry',  heal: 7  },
  { emoji: '🍒', name: 'Cherries',    heal: 8  },
  { emoji: '🍠', name: 'Roast Yam',   heal: 14 },
  { emoji: '🥓', name: 'Bacon',       heal: 16 },
  { emoji: '🍤', name: 'Fried Shrimp',heal: 13 },
];

// Enemy rosters by depth band. Each floor draws a few types from one band so
// floors feel varied but enemies stay around the same power level.
const ENEMY_POOL = [
  // upper floors — vermin and small creatures
  ['🐀','🐁','🦇','🐍','🐛','🐜','🦗','🦎','🐸','🐌','🪲','🪳','🦔','🐝'],
  // middle floors — beasts and undead
  ['👹','👺','🧟','👻','🧛','🐺','🐗','🐻','🦂','🦟','🦅','🐊','🦨','🐅'],
  // deep floors — demons and horrors
  ['🐉','👿','😈','🧌','🦖','🦕','🐙','🦑','👾','🧞','🦏','🦬','🐲','🦞'],
];

const BOSSES = [
  { type: '👑', name: 'Rat King',      floor: 5  },
  { type: '🔥', name: 'Inferno Demon', floor: 10 },
  { type: '🐲', name: 'Elder Dragon',  floor: 15 },
  { type: '💀', name: 'Death Knight',  floor: 20 },
  { type: '👁', name: 'The All-Seer',  floor: 25 },
];

// Names rolled for elite (named) enemies and mimics, so a glowing foe feels
// like a personality rather than just a tougher sprite.
const ELITE_NAMES = ['Grok the Render','Vossk Bonechewer','Mauler','The Gloomfang','Ssarith','Korrath','Bilewretch','Ironjaw','Nightcrawler','The Hollow King'];

// Floor modifiers — each new floor rolls a random theme that tweaks danger and
// rewards. This is a gameplay layer on top of the purely-visual THEMES below.
const FLOOR_MODS = [
  { id: 'normal', name: null,                     dmgMult: 1,    lootMult: 1,   eliteBonus: 0,    desc: '' },
  { id: 'cursed', name: '🩸 Cursed Depths',        dmgMult: 1.3,  lootMult: 1.5, eliteBonus: 0.1,  desc: 'Enemies hit harder, but loot is richer.' },
  { id: 'vault',  name: '💰 Treasure Vault',       dmgMult: 1.1,  lootMult: 2.2, eliteBonus: 0.05, desc: 'Treasure everywhere — and guards to match.' },
  { id: 'silent', name: '🔇 Silent Halls',         dmgMult: 0.9,  lootMult: 1,   eliteBonus: 0,    desc: 'No merchant here, but the air feels calm.', noMerchant: true, forceFountain: true },
  { id: 'swarm',  name: '🐝 Infested Floor',       dmgMult: 0.85, lootMult: 1.2, eliteBonus: 0,    desc: 'Crawling with weaker foes.', enemyMult: 1.8, hpMult: 0.7 },
  { id: 'elite',  name: '⚔ Champions\' Ground',    dmgMult: 1.15, lootMult: 1.4, eliteBonus: 0.4,  desc: 'Elite monsters stalk these halls.' },
  { id: 'goldrush', name: '🌟 Gold Rush',          dmgMult: 1,    lootMult: 1.2, eliteBonus: 0,    desc: 'Coins everywhere — foes spill extra gold.', goldMult: 2, goldPiles: 3 },
  { id: 'haunted',  name: '👻 Haunted Halls',       dmgMult: 1.2,  lootMult: 1.3, eliteBonus: 0.15, desc: 'Restless spirits strike from the dark.' },
  { id: 'brittle',  name: '🍃 Brittle Bones',       dmgMult: 1,    lootMult: 1,   eliteBonus: 0,    desc: 'Foes are frail — strike them down fast.', hpMult: 0.55 },
  { id: 'bountiful',name: '🎁 Bountiful Floor',      dmgMult: 1.05, lootMult: 1.6, eliteBonus: 0,    desc: 'Chests hide around every corner.', chestBonus: 2 },
];
let floorMod = FLOOR_MODS[0];

function rollFloorMod() {
  // First floor is always normal so players learn the ropes.
  if (dungeonLevel <= 1) { floorMod = FLOOR_MODS[0]; return; }
  // ~55% normal, otherwise a random theme.
  if (Math.random() < 0.55) { floorMod = FLOOR_MODS[0]; return; }
  floorMod = pick(FLOOR_MODS.slice(1));
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════

let player = { x: 5, y: 5, hp: 100, maxHp: 100, mp: 60, maxMp: 60, gold: 0, level: 1, xp: 0, healPotions: 2, manaPotions: 0, healthPotionsBought: 0,
  // Hero attributes raised by spending points earned on level up.
  attributes: { might: 0, vitality: 0, agility: 0, spirit: 0 }, attrPoints: 0,
  // Chosen cosmetic looks per visual slot (null = mirror equipped gear), plus the
  // wardrobe of every look the player has ever found.
  cosmetics: { head: null, chest: null, weapon: null },
  wardrobe: { head: [], chest: [], weapon: [] } };
let inventory = [];
let equipped = { head: null, chest: null, hands: null, legs: null, weapon: null, ring: null, amulet: null };
let groundItems = []; // chests on the floor: { x, y } — loot is rolled when opened
let merchant = null;  // { x, y, stock: [...] } when present
let hasFountain = false;
let shrineData = {};  // "y,x" -> { kind } for shrine tiles on this floor
const SHRINE_KINDS = ['power','guard','fortune','blood','wisdom'];
// Temporary shrine buffs, each counts down a number of floors.
let buffs = { power: 0, guard: 0, fortune: 0 };
let floatingTexts = [];
let statusEffects = [];
let groundFood = [];
let groundGold = []; // scattered coin piles: { x, y, amount } — grabbed by walking over
let floorTint = null; // optional atmospheric colour overlay for the current floor
let enemies = [];
let currentTab = 'inv';
let selectedItem = null;
let mapData = [];
let dungeonLevel = 1;

// ══════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

// On the web/desktop layout the loot drawer is a permanent column, so it's
// always open and tapping the map should not close it.
const WEB_MQ = window.matchMedia('(min-width: 760px) and (hover: hover) and (pointer: fine)');
function isWebLayout() { return WEB_MQ.matches; }

let panelOpen = false;
function togglePanel() {
  // The drawer is pinned open on the web layout — just (re)render it.
  if (isWebLayout()) { panelOpen = true; renderPanel(); return; }
  panelOpen = !panelOpen;
  const panel = document.getElementById('side-panel');
  const btn = document.querySelector('.bag-btn');
  panel.classList.toggle('collapsed', !panelOpen);
  btn.classList.toggle('open', panelOpen);
  btn.querySelector('.action-label').textContent = panelOpen ? 'CLOSE' : 'BAG';
  if (panelOpen) renderPanel();
}

// Tapping the map closes the bag overlay if it's open (mobile only — on the
// web layout the drawer is a fixed column and stays put).
canvas.addEventListener('click', () => { if (panelOpen && !isWebLayout()) togglePanel(); });

// Keep the drawer populated and open whenever we're in (or switch into) the
// web layout.
function syncWebPanel() {
  if (isWebLayout()) { panelOpen = true; renderPanel(); }
}
WEB_MQ.addEventListener('change', () => { syncWebPanel(); resizeCanvas(); draw(); });

// ══════════════════════════════════════════
// MAP GENERATION
// ══════════════════════════════════════════

const FLOOR_TINTS = [
  'rgba(80,120,255,0.10)',   // cold blue
  'rgba(120,40,160,0.10)',   // eerie violet
  'rgba(255,140,40,0.10)',   // warm torchlight
  'rgba(40,180,120,0.10)',   // sickly green
  'rgba(200,40,60,0.10)',    // bloody red
];
function generateMap() {
  rollFloorMod();
  // ~35% of floors get a subtle colour wash for atmosphere.
  floorTint = Math.random() < 0.35 ? pick(FLOOR_TINTS) : null;
  mapData = [];
  for (let y = 0; y < MAP_H; y++) {
    mapData[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      // Border walls
      if (x === 0 || y === 0 || x === MAP_W-1 || y === MAP_H-1) {
        mapData[y][x] = 1;
      } else {
        // Random walls ~20%
        mapData[y][x] = Math.random() < 0.18 ? 1 : 0;
      }
    }
  }
  // Ensure spawn clear
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++)
      if (mapData[player.y+dy]) mapData[player.y+dy][player.x+dx] = 0;

  // Add stairs down
  let sx, sy;
  do { sx = rnd(2, MAP_W-2); sy = rnd(2, MAP_H-2); }
  while (mapData[sy][sx] !== 0 || (sx === player.x && sy === player.y));
  mapData[sy][sx] = 2; // stairs

  // Rare Fountain of Healing (~8% of floors, or forced by a modifier). Tile type 3.
  hasFountain = false;
  if (Math.random() < 0.08 || floorMod.forceFountain) {
    let fx, fy, tries = 0;
    do { fx = rnd(2, MAP_W-2); fy = rnd(2, MAP_H-2); tries++; }
    while ((mapData[fy][fx] !== 0 || (fx === player.x && fy === player.y)) && tries < 100);
    if (tries < 100) { mapData[fy][fx] = 3; hasFountain = true; }
  }
  if (hasFountain) log('⛲ You sense a healing presence somewhere on this floor...', 'important');

  // Shrines (tile type 5): ~25% chance of one per floor. Touch it for a buff.
  shrineData = {};
  if (Math.random() < 0.25) {
    let sx2, sy2, tries = 0;
    do { sx2 = rnd(2, MAP_W-2); sy2 = rnd(2, MAP_H-2); tries++; }
    while ((mapData[sy2][sx2] !== 0 || (Math.abs(sx2-player.x)+Math.abs(sy2-player.y) < 3)) && tries < 100);
    if (tries < 100) { mapData[sy2][sx2] = 5; shrineData[sy2+','+sx2] = { kind: pick(SHRINE_KINDS) }; }
  }

  // Announce this floor's modifier theme, if any.
  if (floorMod.name) log(`${floorMod.name} — ${floorMod.desc}`, 'important');

  spawnEnemies();
  spawnGroundLoot();
  spawnMerchant();
}

function spawnMerchant() {
  merchant = null;
  if (floorMod.noMerchant) return;
  // The roaming merchant appears on roughly 1 in 3 floors.
  if (Math.random() > 0.34) return;
  let mx, my, tries = 0;
  do {
    mx = rnd(1, MAP_W-1); my = rnd(1, MAP_H-1); tries++;
  } while ((mapData[my][mx] !== 0 || (mx === player.x && my === player.y) || getEnemyAt(mx,my)) && tries < 100);
  if (tries >= 100) return;
  // Build a small randomized stock: potions + a couple of gamble-priced gear pieces.
  const stock = [
    { kind: 'potion', name: 'Health Potion', heal: 40, price: 25 + dungeonLevel*5 },
    { kind: 'potion', name: 'Mana Potion',   mana: 30, price: 20 + dungeonLevel*5 },
  ];
  const gearCount = rnd(2, 3);
  for (let i = 0; i < gearCount; i++) {
    // Merchants deal in better goods: extra rarity rolls on top of progression.
    const item = generateItem(3);
    stock.push({ kind: 'gear', item, price: Math.max(10, Math.round(item.value * 1.4)) });
  }
  // Sometimes the merchant runs a flash sale — everything 30% off.
  const sale = Math.random() < 0.25 ? 0.7 : 1;
  merchant = { x: mx, y: my, stock, sale };
  log('✨ A robed merchant has wandered onto this floor...', 'important');
  if (sale < 1) log('🏷️ The merchant is holding a flash sale — 30% off everything!', 'important');
}

// ══════════════════════════════════════════
// SHOP
// ══════════════════════════════════════════

let shopCurrentTab = 'buy';

// Effective price of a stock entry. Health potions get pricier the more you've
// bought, so you can't lean on them forever as a cheap heal.
function stockPrice(s) {
  const sale = (merchant && merchant.sale) || 1;
  if (s.kind === 'potion' && s.heal) {
    return Math.max(1, Math.round((s.price + (player.healthPotionsBought || 0) * 15) * sale));
  }
  return Math.max(1, Math.round(s.price * sale));
}

// Compact one-line summary of an item's stats, e.g. "⚡14 · 8-12 DMG · +3 ATK".
function itemStatLine(item) {
  const body = Object.entries(item.stats).map(([k, v]) =>
    (typeof v === 'string') ? `${v} ${k}` : `${v < 0 ? '' : '+'}${v} ${k}`
  ).join(' · ');
  return item.slot ? `⚡${itemPower(item)}${body ? ' · ' + body : ''}` : body;
}

function openShop() {
  if (!merchant) return;
  document.getElementById('shop-overlay').classList.add('open');
  // Always reopen on the BUY tab — shopTab() also resyncs the tab highlight so
  // it can't get stuck showing SELL as active while displaying buy content.
  shopTab('buy');
  log('The merchant spreads out their wares.');
}

function closeShop() {
  document.getElementById('shop-overlay').classList.remove('open');
}

function shopTab(tab) {
  shopCurrentTab = tab;
  document.getElementById('shoptab-buy').classList.toggle('active', tab==='buy');
  document.getElementById('shoptab-sell').classList.toggle('active', tab==='sell');
  renderShop();
}

function renderShop() {
  document.getElementById('shop-gold-count').textContent = player.gold;
  const el = document.getElementById('shop-content');
  if (!merchant) { closeShop(); return; }

  if (shopCurrentTab === 'buy') {
    if (merchant.stock.length === 0) {
      el.innerHTML = '<div class="shop-empty">Sold out! Come back later.</div>';
      return;
    }
    el.innerHTML = merchant.stock.map((s, i) => {
      const price = stockPrice(s);
      const afford = player.gold >= price;
      let name, sub, cls = '', stats = '';
      if (s.kind === 'potion') {
        name = s.name;
        sub = s.heal ? `Restores ${s.heal} HP` : `Restores ${s.mana} MP`;
      } else {
        name = s.item.name;
        sub = SLOTS[s.item.slot].label.replace(/^\S+\s/, '');
        cls = 'item-' + s.item.tier;
        stats = itemStatLine(s.item);
      }
      const sicon = s.kind === 'potion' ? (s.heal ? '🧪' : '🔷') : itemIcon(s.item);
      return `<div class="shop-row">
        <span class="loot-icon">${sicon}</span>
        <div class="shop-row-info ${cls}">
          <div class="shop-row-name">${name}</div>
          <div class="shop-row-sub">${sub}</div>
          ${stats ? `<div class="shop-row-stats">${stats}</div>` : ''}
        </div>
        <span class="shop-price">${price}g</span>
        <button class="shop-buy-btn" ${afford?'':'disabled'} onclick="buyItem(${i})">BUY</button>
      </div>`;
    }).join('');
  } else {
    // SELL tab — sell anything in your bag at its value.
    if (inventory.length === 0) {
      el.innerHTML = '<div class="shop-empty">Nothing to sell.<br>Go find some loot!</div>';
      return;
    }
    el.innerHTML = inventory.map((item, i) => {
      const sellPrice = Math.max(1, Math.round(item.value * 0.5));
      const stats = item.stats ? itemStatLine(item) : '';
      return `<div class="shop-row">
        <span class="loot-icon">${itemIcon(item)}</span>
        <div class="shop-row-info item-${item.tier}">
          <div class="shop-row-name">${item.name}</div>
          <div class="shop-row-sub">${item.slot ? SLOTS[item.slot].label.replace(/^\S+\s/, '') : 'potion'}</div>
          ${stats ? `<div class="shop-row-stats">${stats}</div>` : ''}
        </div>
        <span class="shop-price">${sellPrice}g</span>
        <button class="shop-sell-btn" onclick="sellItem(${i})">SELL</button>
      </div>`;
    }).join('');
  }
}

function buyItem(i) {
  const s = merchant.stock[i];
  if (!s) return;
  const price = stockPrice(s);
  if (player.gold < price) return;
  player.gold -= price;
  if (s.kind === 'potion') {
    if (s.heal) { player.healPotions++; player.healthPotionsBought++; log(`Bought a ${logPotion('Health Potion')}. (${player.healPotions} held)`, 'loot'); }
    if (s.mana) { player.manaPotions++; log(`Bought a ${logPotion('Mana Potion')}. (${player.manaPotions} held)`, 'loot'); }
    // potions restock infinitely; gear is one-off
  } else {
    inventory.push(s.item);
    recordWardrobe(s.item);
    log(`Bought ${logItem(s.item)}!`, 'loot');
    merchant.stock.splice(i, 1);
  }
  updateBars();
  renderShop();
  renderPanel();
  saveGame();
}

function sellItem(i) {
  const item = inventory[i];
  if (!item) return;
  const sellPrice = Math.max(1, Math.round(item.value * 0.5));
  player.gold += sellPrice;
  inventory.splice(i, 1);
  log(`Sold ${logItem(item)} for ${sellPrice}g.`);
  updateBars();
  renderShop();
  renderPanel();
  saveGame();
}

function spawnEnemies() {
  enemies = [];
  const isBossFloor = dungeonLevel % 5 === 0;
  let count = isBossFloor
    ? 1 + Math.floor(dungeonLevel / 5)
    : Math.min(3 + Math.floor(dungeonLevel * 0.7), 10);
  // Some floor modifiers crowd the level with extra foes.
  if (!isBossFloor && floorMod.enemyMult) count = Math.round(count * floorMod.enemyMult);

  // Pick 2-3 enemy types for this floor from the depth-appropriate band, so
  // each floor has variety while every monster stays around the same level.
  const bandIdx = Math.min(Math.floor((dungeonLevel - 1) / 3), ENEMY_POOL.length - 1);
  const pool = [...ENEMY_POOL[bandIdx]];
  const typeCount = Math.min(rnd(2, 3), pool.length);
  const floorTypes = [];
  for (let i = 0; i < typeCount; i++) floorTypes.push(pool.splice(rnd(0, pool.length-1), 1)[0]);

  // ~20% of non-boss floors feature a single glowing "elite" with better loot;
  // certain floor modifiers raise that chance.
  const eliteChance = 0.2 + (floorMod.eliteBonus || 0);
  const eliteIndex = (!isBossFloor && Math.random() < eliteChance) ? rnd(0, count - 1) : -1;

  for (let i = 0; i < count; i++) {
    let ex, ey;
    let tries = 0;
    do {
      ex = rnd(1, MAP_W-1); ey = rnd(1, MAP_H-1); tries++;
    } while ((mapData[ey][ex] !== 0 || (ex === player.x && ey === player.y) || getEnemyAt(ex,ey)) && tries < 100);
    if (tries < 100) {
      if (isBossFloor && i === 0) {
        const bossIdx = Math.min(Math.floor(dungeonLevel / 5) - 1, BOSSES.length - 1);
        const boss = BOSSES[bossIdx];
        // Bosses scale with the floor and, gently, with the hero's own level so
        // they keep pace as your power (gear + attributes) climbs.
        const bossHp = Math.round((12 + dungeonLevel * 7 + player.level * 2) * 3);
        const bossDmg = (3 + dungeonLevel + player.level * 0.4) * 1.6;
        enemies.push({
          x: ex, y: ey,
          hp: bossHp, maxHp: bossHp,
          type: boss.type, name: boss.name,
          dmg: Math.round(bossDmg),
          dead: false, isBoss: true,
          statusChance: 0.25,
        });
        log(`⚠️ ${boss.name} ${boss.type} guards this floor!`, 'important');
      } else {
        // Floor modifiers scale base health and damage up or down. Enemies also
        // scale gently with the hero's level so the game keeps its bite as your
        // power grows from gear and spent attribute points.
        const baseHp = Math.round((12 + dungeonLevel * 7 + player.level * 2) * (floorMod.hpMult || 1));
        const baseDmg = Math.round((3 + dungeonLevel + bandIdx + player.level * 0.4) * (floorMod.dmgMult || 1));
        if (i === eliteIndex) {
          const eHp = Math.round(baseHp * 2.2);
          const eName = pick(ELITE_NAMES);
          enemies.push({
            x: ex, y: ey,
            hp: eHp, maxHp: eHp,
            type: pick(floorTypes),
            name: eName,
            dmg: Math.round(baseDmg * 1.4),
            dead: false, isElite: true,
          });
          log(`✨ ${eName}, a glowing elite, prowls this floor — slay it for richer loot!`, 'important');
        } else {
          const mob = {
            x: ex, y: ey,
            hp: baseHp, maxHp: baseHp,
            type: pick(floorTypes),
            dmg: baseDmg,
            dead: false,
          };
          // ~22% of regular foes carry a random affix that shakes up the fight.
          if (Math.random() < 0.22) applyAffix(mob);
          enemies.push(mob);
        }
      }
    }
  }

  // Treasure Goblin: a rare, fast coward that flees on sight. Catch it for a
  // jackpot chest — but it never fights back, so it's a chase, not a duel.
  if (!isBossFloor && dungeonLevel >= 2 && Math.random() < 0.12) {
    let gx, gy, tries = 0;
    do {
      gx = rnd(1, MAP_W-1); gy = rnd(1, MAP_H-1); tries++;
    } while ((mapData[gy][gx] !== 0 || (gx === player.x && gy === player.y) || getEnemyAt(gx,gy)) && tries < 100);
    if (tries < 100) {
      const gHp = Math.round((10 + dungeonLevel * 6) * 1.2);
      enemies.push({
        x: gx, y: gy, hp: gHp, maxHp: gHp,
        type: '👺', name: 'Treasure', dmg: 1,
        dead: false, isGoblin: true,
      });
      log('👺 A Treasure Goblin scurries about — catch it before it escapes!', 'important');
    }
  }
}

const AFFIXES = [
  { key: 'tough',    icon: '🛡️', name: 'Tough',    apply: m => { m.hp = Math.round(m.hp * 1.6); m.maxHp = m.hp; } },
  { key: 'fierce',   icon: '😡', name: 'Fierce',   apply: m => { m.dmg = Math.round(m.dmg * 1.4); } },
  { key: 'venomous', icon: '🧪', name: 'Venomous', apply: m => { m.statusChance = 0.4; } },
];
// Give an enemy a random affix: a name, an icon, and a stat/behaviour tweak.
function applyAffix(mob) {
  const a = pick(AFFIXES);
  mob.affixIcon = a.icon;
  mob.name = a.name;
  a.apply(mob);
}

function spawnGroundLoot() {
  groundItems = [];
  // Ground loot is a rare lucky find — most floors have none.
  let count = 0;
  if (Math.random() < 0.22) count = 1;
  if (count === 1 && dungeonLevel >= 6 && Math.random() < 0.15) count = 2;
  // Bountiful floors hide a few extra chests.
  if (floorMod.chestBonus) count += floorMod.chestBonus;
  // Deeper chests roll richer loot on top of the usual progression bonus.
  const chestLuck = 1 + Math.floor(dungeonLevel / 4);
  for (let i = 0; i < count; i++) {
    let gx, gy;
    let tries = 0;
    do {
      gx = rnd(1, MAP_W-1); gy = rnd(1, MAP_H-1); tries++;
    } while (mapData[gy][gx] !== 0 && tries < 100);
    if (tries < 100) groundItems.push({ x: gx, y: gy, luck: chestLuck });
  }
  // Spawn food — a rare find: most floors have none.
  groundFood = [];
  let foodCount = 0;
  if (Math.random() < 0.18) foodCount = 1;
  for (let i = 0; i < foodCount; i++) {
    let fx, fy, tries = 0;
    do {
      fx = rnd(1, MAP_W-1); fy = rnd(1, MAP_H-1); tries++;
    } while ((mapData[fy][fx] !== 0 || (fx === player.x && fy === player.y)) && tries < 100);
    if (tries < 100) groundFood.push({ x: fx, y: fy, ...pick(FOODS) });
  }
  // Scatter coin piles — a few on most floors, lots during a Gold Rush.
  groundGold = [];
  let coinCount = (Math.random() < 0.5 ? 1 : 0) + (floorMod.goldPiles || 0);
  for (let i = 0; i < coinCount; i++) {
    let cx, cy, tries = 0;
    do {
      cx = rnd(1, MAP_W-1); cy = rnd(1, MAP_H-1); tries++;
    } while ((mapData[cy][cx] !== 0 || (cx === player.x && cy === player.y)) && tries < 100);
    if (tries < 100) groundGold.push({ x: cx, y: cy, amount: rnd(3, 10) + dungeonLevel * 2 });
  }
}

// ══════════════════════════════════════════
// ITEM GENERATION
// ══════════════════════════════════════════

// Bonus rarity rolls earned from progression: the deeper you delve and the
// higher your level, the more rolls every drop gets (and keeps the best),
// so rarer loot steadily becomes more common. Capped so it stays sane.
function progressionRolls() {
  return Math.min(6, Math.floor(dungeonLevel / 4) + Math.floor((player.level - 1) / 5));
}

function rollTier(rolls = 1) {
  const entries = Object.entries(TIERS);
  const total = entries.reduce((s, [,v]) => s + v.weight, 0);
  const rollOnce = () => {
    let roll = Math.random() * total;
    for (const [k, v] of entries) {
      roll -= v.weight;
      if (roll <= 0) return k;
    }
    return 'normal';
  };
  // Luckier sources roll several times and keep the rarest result, so bosses
  // (many rolls) skew much higher than elites, which skew higher than normal.
  // Progression adds extra rolls on top, raising rarity as you advance.
  const order = Object.keys(TIERS);
  const totalRolls = Math.max(1, rolls + progressionRolls());
  let best = rollOnce();
  for (let i = 1; i < totalRolls; i++) {
    const r = rollOnce();
    if (order.indexOf(r) > order.indexOf(best)) best = r;
  }
  return best;
}

function generateItem(rolls = 1) {
  const tier = rollTier(rolls);
  const slot = weighted(SLOT_WEIGHTS);
  const baseName = pick(SLOTS[slot].names);

  let name = baseName;
  if (tier === 'uncommon') name = pick(PREFIXES) + ' ' + baseName;
  if (tier === 'rare')     name = pick(PREFIXES) + ' ' + baseName + ' ' + pick(SUFFIXES);
  if (tier === 'epic')     name = pick(PREFIXES) + ' ' + baseName + ' ' + pick(SUFFIXES);
  if (tier === 'legendary') name = pick(PREFIXES) + ' ' + baseName + ' ' + pick(SUFFIXES);
  if (tier === 'unique')   name = 'The ' + pick(PREFIXES) + ' ' + baseName;

  // Stats per item are smaller now, since a full loadout has 7 slots.
  const statCount = { junk:0, normal:1, uncommon:1, rare:2, epic:3, legendary:3, unique:4 }[tier];
  const stats = {};
  const mult = { junk:0.4, normal:0.7, uncommon:1, rare:1.4, epic:2, legendary:3, unique:4.5 }[tier];
  // Weapon damage uses a gentler curve so epic+ weapons aren't overpowered.
  const dmgMult = { junk:0.4, normal:0.7, uncommon:0.9, rare:1.15, epic:1.5, legendary:2, unique:2.6 }[tier];
  const lvl = dungeonLevel;

  // Headline stat by slot: weapons deal damage, armor gives defense, jewelry gives utility.
  if (slot === 'weapon') {
    const base = Math.max(1, Math.floor((rnd(2,4) + lvl) * dmgMult));
    const spread = Math.max(1, Math.floor(base * 0.4));
    stats.DMG = `${base}-${base + spread}`;
  } else if (slot === 'head' || slot === 'chest' || slot === 'hands' || slot === 'legs') {
    // Bigger armor pieces give more DEF than smaller ones.
    const slotDef = { chest: 1.3, legs: 1.0, head: 0.8, hands: 0.7 }[slot];
    stats.DEF = Math.max(1, Math.floor((rnd(1,3) + lvl) * mult * slotDef));
    // Gloves also grant a little attack power — far less than a weapon.
    if (slot === 'hands') {
      stats.ATK = Math.max(1, Math.floor((rnd(1,2) + lvl * 0.25) * mult * 0.6));
    }
  }
  // ring/amulet have no fixed headline — they roll pure bonus stats below.

  const extraCount = (slot === 'ring' || slot === 'amulet')
    ? statCount + 1        // jewelry gets an extra rolled stat instead of a headline
    : Math.max(0, statCount - 1);
  const statPool = STAT_NAMES.filter(s => !(s in stats))
    .sort(() => Math.random()-0.5).slice(0, extraCount);
  statPool.forEach(s => {
    let v = Math.max(1, Math.floor((rnd(1,3) + lvl*0.5) * mult));
    // Regen is applied every step, so keep the per-item value modest.
    if (s === 'REGEN') v = Math.max(1, Math.round(v * 0.4));
    stats[s] = v;
  });

  let value = { junk:1, normal:5, uncommon:20, rare:80, epic:300, legendary:1200, unique:5000 }[tier];

  const item = { id: Math.random(), name, tier, slot, stats, value,
    flavor: pick(FLAVOR[tier]), icon: ITEM_ICONS[baseName] || SLOT_ICONS[slot] };

  // Cursed items (~12% of uncommon+): a big stat boost paired with a penalty.
  // The negative stat flows straight through totalStat(), so the drawback is real.
  const tierRank = Object.keys(TIERS).indexOf(tier);
  if (tierRank >= 2 && Math.random() < 0.12) {
    const boostStat = pick(STAT_NAMES.filter(s => s !== 'DMG'));
    const curseStat = pick(STAT_NAMES.filter(s => s !== boostStat && s !== 'DMG'));
    stats[boostStat] = (stats[boostStat] || 0) + Math.round((10 + lvl*2) * mult);
    stats[curseStat] = -(Math.round((6 + lvl) * mult)); // negative = penalty
    item.cursed = true;
    item.name = '☠ ' + item.name;
    item.flavor = 'Cursed: great power at a price.';
    item.value = Math.round(value * 1.5);
  }
  return item;
}

function weighted(obj) {
  const total = Object.values(obj).reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for (const [k,v] of Object.entries(obj)) { r-=v; if(r<=0) return k; }
  return Object.keys(obj)[0];
}

// ══════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════

// Each dungeon depth cycles through a visual theme so floors don't all look
// alike. Every theme defines the full palette used by the tile renderer.
const THEMES = [
  { name: 'the Stone Crypt',
    floor:'#2e2e42', floorAlt:'#26263a', wall:'#4a4a66', wallTop:'#64648a',
    brickA:'#56567a', brickB:'#4e4e70', mortar:'#33334a', crack:'#2a2a3c',
    seam:'#1c1c2c', speckle:'#3a3a52', accent:'rgba(90,140,70,0.3)', stairsGlow:'#ffd24b' },
  { name: 'the Mossy Caverns',
    floor:'#243524', floorAlt:'#1d2b1d', wall:'#3a5236', wallTop:'#557a4e',
    brickA:'#436147', brickB:'#3a5640', mortar:'#243a26', crack:'#1c2c1e',
    seam:'#142016', speckle:'#3a5236', accent:'rgba(150,200,90,0.32)', stairsGlow:'#ffe24b' },
  { name: 'the Lava Depths',
    floor:'#3a221c', floorAlt:'#2c1916', wall:'#5a2c22', wallTop:'#8a3e2c',
    brickA:'#6e3326', brickB:'#5e2c20', mortar:'#3a1c14', crack:'#ff6a2a',
    seam:'#241310', speckle:'#7a3a20', accent:'rgba(255,120,40,0.35)', stairsGlow:'#ff9a3b' },
  { name: 'the Frozen Halls',
    floor:'#2a3a4a', floorAlt:'#22303e', wall:'#3e5a72', wallTop:'#6a90ad',
    brickA:'#4a6a86', brickB:'#3e5c76', mortar:'#283a4a', crack:'#1e2c38',
    seam:'#16222c', speckle:'#5a7a96', accent:'rgba(150,220,255,0.3)', stairsGlow:'#bfe8ff' },
  { name: 'the Sunken Tombs',
    floor:'#4a4026', floorAlt:'#3e351f', wall:'#6e5d36', wallTop:'#9a8550',
    brickA:'#7e6c40', brickB:'#6e5d36', mortar:'#4a3e22', crack:'#34291a',
    seam:'#241c10', speckle:'#8a7548', accent:'rgba(220,200,120,0.3)', stairsGlow:'#ffe07a' },
  { name: 'the Void Sanctum',
    floor:'#2e2440', floorAlt:'#251d34', wall:'#4a3a6a', wallTop:'#6e54a0',
    brickA:'#56447e', brickB:'#4a3a6e', mortar:'#332a4a', crack:'#22182c',
    seam:'#1a1226', speckle:'#5a4a82', accent:'rgba(190,120,255,0.3)', stairsGlow:'#d9a0ff' },
];
function currentTheme() { return THEMES[(dungeonLevel - 1) % THEMES.length]; }

// Layer the hero's worn gear over the base sprite. Chest sits on the torso, head
// caps the top, and the weapon is held off to the side — each only drawn when the
// matching slot has gear equipped or a cosmetic look chosen.
function drawWornGear(px, py, tw, th, scale) {
  const cx = px + tw/2, cy = py + th/2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 3 * scale;

  const chest = visualIcon('chest');
  if (chest) {
    ctx.font = `${Math.round(tw * 0.4)}px serif`;
    ctx.fillText(chest, cx, cy + th*0.26);
  }
  const head = visualIcon('head');
  if (head) {
    ctx.font = `${Math.round(tw * 0.42)}px serif`;
    ctx.fillText(head, cx, py + th*0.16);
  }
  const weapon = visualIcon('weapon');
  if (weapon) {
    ctx.font = `${Math.round(tw * 0.46)}px serif`;
    ctx.fillText(weapon, px + tw*0.78, cy + th*0.04);
  }
  ctx.shadowBlur = 0;
}

function draw() {
  const W = canvas.width, H = canvas.height;
  const C = currentTheme();
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // ── FOLLOW CAMERA ──
  // Aim to show ~VIEW_TILES across the shorter axis, so tiles are large.
  const VIEW_TILES = 11;
  const tw = Math.ceil(Math.min(W, H) / VIEW_TILES);
  const th = tw;

  // Center the camera on the player, then clamp so we never scroll past edges.
  let camX = player.x * tw + tw/2 - W/2;
  let camY = player.y * th + th/2 - H/2;
  const maxCamX = MAP_W * tw - W;
  const maxCamY = MAP_H * th - H;
  // If the map is smaller than the viewport on an axis, center it instead.
  camX = (MAP_W * tw <= W) ? -(W - MAP_W*tw)/2 : Math.max(0, Math.min(camX, maxCamX));
  camY = (MAP_H * th <= H) ? -(H - MAP_H*th)/2 : Math.max(0, Math.min(camY, maxCamY));

  const offX = Math.round(-camX);
  const offY = Math.round(-camY);
  const scale = tw / TILE; // for glow blur sizing, relative to base tile

  // Only draw tiles within the visible window (perf + clean edges)
  const x0 = Math.max(0, Math.floor(camX / tw));
  const y0 = Math.max(0, Math.floor(camY / th));
  const x1 = Math.min(MAP_W, Math.ceil((camX + W) / tw));
  const y1 = Math.min(MAP_H, Math.ceil((camY + H) / th));

  // Draw tiles
  for (let y = y0; y < y1; y++) {
    for (let x = x0; x < x1; x++) {
      const px = offX + x * tw, py = offY + y * th;
      const t = mapData[y][x];
      const seed = (x * 73856093) ^ (y * 19349663); // deterministic per-tile

      if (t === 1) {
        // Wall base
        ctx.fillStyle = C.wall;
        ctx.fillRect(px, py, tw, th);
        // Brick rows with mortar lines
        const rows = 3;
        const rh = th / rows;
        for (let r = 0; r < rows; r++) {
          const ry = py + r * rh;
          const offset = (r % 2) * (tw / 2);
          // brick face shading
          ctx.fillStyle = (r % 2 === 0) ? C.brickA : C.brickB;
          ctx.fillRect(px, ry + 1, tw, rh - 1.5);
          // vertical mortar gap
          ctx.fillStyle = C.mortar;
          ctx.fillRect(px + (offset % tw), ry, Math.max(1, tw*0.06), rh);
          ctx.fillRect(px + ((offset + tw/2) % tw), ry, Math.max(1, tw*0.06), rh);
          // horizontal mortar
          ctx.fillRect(px, ry, tw, Math.max(1, th*0.05));
        }
        // top highlight ridge
        ctx.fillStyle = C.wallTop;
        ctx.fillRect(px, py, tw, Math.max(1, th*0.12));
        // occasional crack
        if (seed % 5 === 0) {
          ctx.fillStyle = C.crack;
          ctx.fillRect(px + tw*0.5, py + th*0.3, Math.max(1,tw*0.06), th*0.4);
        }
      } else if (t === 2) {
        // Stair pit
        ctx.fillStyle = '#0d0d14';
        ctx.fillRect(px, py, tw, th);
        // descending steps
        const steps = 4;
        for (let s = 0; s < steps; s++) {
          const shade = 20 + s * 14;
          ctx.fillStyle = `rgb(${shade+30},${shade+22},${Math.floor(shade*0.4)})`;
          const inset = (s / steps) * tw * 0.4;
          const sy = py + (s / steps) * th * 0.5;
          ctx.fillRect(px + inset, sy, tw - inset*2, th * (0.5/steps) + 1);
        }
        // glow
        ctx.fillStyle = C.stairsGlow + '33';
        ctx.fillRect(px, py + th*0.55, tw, th*0.45);
        ctx.fillStyle = C.stairsGlow;
        ctx.font = `bold ${Math.round(tw*0.42)}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText('▼', px + tw/2, py + th*0.85);
        // Pulsing ring so the exit is easy to spot from across the room.
        const sp = 0.5 + 0.5*Math.sin(Date.now()/350);
        ctx.save();
        ctx.strokeStyle = C.stairsGlow;
        ctx.globalAlpha = 0.35 + 0.4*sp;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px + tw/2, py + th/2, tw*(0.4 + 0.08*sp), 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      } else if (t === 3) {
        // Fountain of Healing — stone basin with glowing blue water
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        // stone rim
        ctx.fillStyle = '#5a5a72';
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*0.42, 0, Math.PI*2);
        ctx.fill();
        // water, gently pulsing
        const wp = 0.5 + 0.5*Math.sin(Date.now()/400);
        ctx.fillStyle = `rgba(90,180,255,${0.7+0.3*wp})`;
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*0.32, 0, Math.PI*2);
        ctx.fill();
        // glow
        ctx.save();
        ctx.shadowColor = '#8ad0ff';
        ctx.shadowBlur = 10 * (tw/TILE);
        ctx.fillStyle = '#bfe8ff';
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*0.14, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      } else if (t === 5) {
        // Shrine — a glowing pillar that pulses to draw the eye.
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        const sp = 0.5 + 0.5*Math.sin(Date.now()/350);
        ctx.save();
        ctx.shadowColor = '#d8a8ff';
        ctx.shadowBlur = (6 + 6*sp) * (tw/TILE);
        ctx.fillStyle = '#6a5a8a';
        ctx.fillRect(px+tw*0.38, py+th*0.25, tw*0.24, th*0.55); // pillar
        ctx.fillStyle = `rgba(216,168,255,${0.6+0.4*sp})`;
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th*0.28, tw*0.16, 0, Math.PI*2); // glowing orb
        ctx.fill();
        ctx.restore();
      } else {
        // Floor base with subtle checker
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        // flagstone seams
        ctx.fillStyle = C.seam;
        ctx.fillRect(px, py, tw, 1);
        ctx.fillRect(px, py, 1, th);
        // speckle / rubble (deterministic)
        const speckles = (seed % 4);
        ctx.fillStyle = C.speckle;
        for (let s = 0; s < speckles; s++) {
          const sx = px + ((seed >> (s*3+1)) % tw);
          const sy = py + ((seed >> (s*2+2)) % th);
          ctx.fillRect(sx, sy, Math.max(1, tw*0.08), Math.max(1, th*0.08));
        }
        // occasional accent tint (moss/embers/frost depending on theme)
        if (seed % 11 === 0) {
          ctx.fillStyle = C.accent;
          ctx.fillRect(px+tw*0.2, py+th*0.2, tw*0.5, th*0.5);
        }
      }
    }
  }

  // Ground chests — a classic brown chest with gold trim, drawn by hand so it
  // looks the same on every device. Lucky chests glow brighter gold.
  groundItems.forEach(({ x, y, luck }) => {
    const lucky = (luck || 1) > 1;
    const px = offX + x * tw, py = offY + y * th;
    const cx = px + tw/2, cy = py + th/2;
    const w = tw * 0.58, h = th * 0.46;
    const bx = cx - w/2, by = cy - h/2;
    const gold = lucky ? '#ffd24b' : '#d9a441';
    ctx.save();
    ctx.shadowColor = lucky ? '#ffe066' : '#caa24a';
    ctx.shadowBlur = (lucky ? 14 : 7) * scale;
    // wooden body
    ctx.fillStyle = '#7a4a22';
    ctx.fillRect(bx, by, w, h);
    ctx.shadowBlur = 0;
    // lid (slightly lighter band across the top)
    ctx.fillStyle = '#8a5628';
    ctx.fillRect(bx, by, w, h * 0.42);
    // lid top highlight
    ctx.fillStyle = '#a36c36';
    ctx.fillRect(bx, by, w, Math.max(1, h * 0.1));
    // gold trim: lid seam + bottom edge
    ctx.fillStyle = gold;
    ctx.fillRect(bx, by + h * 0.38, w, Math.max(1, h * 0.1));
    ctx.fillRect(bx, by + h - Math.max(1, h * 0.1), w, Math.max(1, h * 0.1));
    // vertical gold straps
    ctx.fillRect(bx + w * 0.14, by, Math.max(1, w * 0.09), h);
    ctx.fillRect(bx + w * 0.77, by, Math.max(1, w * 0.09), h);
    // lock plate
    ctx.fillStyle = lucky ? '#fff0a0' : '#e8c050';
    ctx.fillRect(cx - w * 0.09, by + h * 0.32, w * 0.18, h * 0.3);
    // keyhole
    ctx.fillStyle = '#4a2f15';
    ctx.fillRect(cx - w * 0.025, by + h * 0.42, w * 0.05, h * 0.13);
    ctx.restore();
  });

  // Ground food
  groundFood.forEach(f => {
    const px = offX + f.x * tw, py = offY + f.y * th;
    ctx.font = `${Math.round(tw * 0.6)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.emoji, px + tw/2, py + th/2);
  });

  // Coin piles — a soft golden glow so loose gold catches the eye.
  groundGold.forEach(g => {
    const px = offX + g.x * tw, py = offY + g.y * th;
    ctx.save();
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur = 8 * scale;
    ctx.font = `${Math.round(tw * 0.52)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🪙', px + tw/2, py + th/2);
    ctx.restore();
  });

  // Merchant (roaming trader in bright robes)
  if (merchant) {
    const px = offX + merchant.x * tw, py = offY + merchant.y * th;
    // pulsing rainbow-ish glow so they stand out as special
    const t = (Date.now() % 2000) / 2000;
    const hue = Math.floor(t * 360);
    ctx.save();
    ctx.fillStyle = `hsla(${hue},90%,60%,0.35)`;
    ctx.beginPath();
    ctx.arc(px + tw/2, py + th/2, tw*0.55, 0, Math.PI*2);
    ctx.fill();
    // bright robe body
    ctx.fillStyle = `hsl(${hue},85%,55%)`;
    ctx.fillRect(px + tw*0.28, py + tw*0.4, tw*0.44, tw*0.5);
    ctx.fillStyle = `hsl(${(hue+60)%360},85%,60%)`;
    ctx.fillRect(px + tw*0.34, py + tw*0.5, tw*0.32, tw*0.18);
    ctx.restore();
    // merchant sprite on top
    ctx.font = `${Math.round(tw * 0.74)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧙‍♂️', px + tw/2, py + th/2 + th*0.02);
    // little "$" tag above
    ctx.fillStyle = '#ffd24b';
    ctx.font = `bold ${Math.round(tw*0.34)}px serif`;
    ctx.fillText('💰', px + tw/2, py - th*0.02);
  }

  // Enemies
  enemies.filter(e => !e.dead).forEach(e => {
    const px = offX + e.x * tw, py = offY + e.y * th;
    // boss aura
    if (e.isBoss) {
      ctx.fillStyle = 'rgba(255,50,50,0.2)';
      ctx.beginPath();
      ctx.arc(px + tw/2, py + th/2, tw * 0.6, 0, Math.PI*2);
      ctx.fill();
    } else if (e.isElite) {
      // golden glow marking the elite
      const pulse = 0.18 + 0.1 * (0.5 + 0.5 * Math.sin(Date.now() / 300));
      ctx.save();
      ctx.shadowColor = '#ffd24b';
      ctx.shadowBlur = 16 * scale;
      ctx.fillStyle = `rgba(255,210,75,${pulse})`;
      ctx.beginPath();
      ctx.arc(px + tw/2, py + th/2, tw * 0.56, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.font = `${Math.round(tw * (e.isBoss ? 0.95 : (e.isElite ? 0.86 : 0.78)))}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.type, px + tw/2, py + th/2 + th*0.04);

    // Affix badge (Tough/Fierce/Venomous) or goblin loot tag, floated above.
    if (e.affixIcon || e.isGoblin) {
      ctx.font = `${Math.round(tw * 0.34)}px serif`;
      ctx.fillText(e.isGoblin ? '💰' : e.affixIcon, px + tw/2, py - th*0.02);
    }

    // Status effect icons
    const eEffects = statusEffects.filter(s => s.target === e);
    if (eEffects.length) {
      ctx.font = `${Math.round(tw * 0.28)}px serif`;
      eEffects.forEach((s, i) => {
        ctx.fillText(s.effect === 'poison' ? '🧪' : '⚡', px + tw * 0.15 + i * tw * 0.25, py + th * 0.92);
      });
    }

    // HP bar
    if (e.hp < e.maxHp) {
      const bw = tw - 2, bh = Math.max(2, th * 0.14);
      ctx.fillStyle = '#000';
      ctx.fillRect(px, py, bw+2, bh+1);
      ctx.fillStyle = '#3a0000';
      ctx.fillRect(px+1, py, bw, bh);
      ctx.fillStyle = e.isBoss ? '#ff6622' : (e.isElite ? '#ffaa22' : '#ff3344');
      ctx.fillRect(px+1, py, bw * (e.hp/e.maxHp), bh);
    }
  });

  // Player
  const px = offX + player.x * tw, py = offY + player.y * th;
  // glowing aura ring
  ctx.fillStyle = 'rgba(255,225,120,0.18)';
  ctx.beginPath();
  ctx.arc(px + tw/2, py + th/2, tw*0.5, 0, Math.PI*2);
  ctx.fill();
  // dark backing disc
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.arc(px + tw/2, py + th/2, tw*0.42, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowColor = '#ffffaa';
  ctx.shadowBlur = 12 * scale;
  ctx.font = `${Math.round(tw * 0.84)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(HERO, px + tw/2, py + th/2 + th*0.04);
  ctx.shadowBlur = 0;

  // ── WORN GEAR ── draw the hero's equipped (or cosmetic) head/chest/weapon
  // right on top of the sprite so the character visibly wears its loot.
  drawWornGear(px, py, tw, th, scale);

  // Player status effect icons
  const pEffects = statusEffects.filter(s => s.target === 'player');
  if (pEffects.length) {
    ctx.font = `${Math.round(tw * 0.28)}px serif`;
    ctx.textAlign = 'center';
    pEffects.forEach((s, i) => {
      ctx.fillText(s.effect === 'poison' ? '🧪' : '⚡', px + tw * 0.15 + i * tw * 0.25, py + th * 0.92);
    });
  }

  // Floating damage numbers
  const now = Date.now();
  floatingTexts = floatingTexts.filter(ft => now - ft.start < ft.duration);
  floatingTexts.forEach(ft => {
    const t = (now - ft.start) / ft.duration;
    const px = offX + ft.x * tw + tw / 2;
    const py = offY + ft.y * th - t * tw * 0.8;
    const alpha = 1 - t * t;
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.font = `${Math.round(tw * 0.28)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeText(ft.text, px, py);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, px, py);
    ctx.restore();
  });

  // Atmospheric colour wash for this floor, if any.
  if (floorTint) {
    ctx.fillStyle = floorTint;
    ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  }
}

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, start: Date.now(), duration: 800 });
}

// ══════════════════════════════════════════
// STATUS EFFECTS
// ══════════════════════════════════════════

function applyStatusEffect(target, effect, turns, source) {
  const existing = statusEffects.find(s => s.target === target && s.effect === effect);
  if (existing) { existing.turns = Math.max(existing.turns, turns); return; }
  statusEffects.push({ target, effect, turns, source });
}

function tickStatusEffects() {
  statusEffects = statusEffects.filter(s => {
    if (s.target === 'player') {
      if (s.effect === 'poison') {
        const dmg = 2 + dungeonLevel;
        player.hp = Math.max(1, player.hp - dmg);
        spawnFloatingText(player.x, player.y, `${dmg}`, '#44dd44');
        log(`🧪 Poison deals ${dmg} damage!`);
        updateBars();
      }
      if (s.effect === 'stun') {
        log('⚡ You are stunned and cannot move!');
      }
    } else {
      const e = s.target;
      if (e.dead) return false;
      if (s.effect === 'poison') {
        const dmg = 2 + dungeonLevel;
        e.hp -= dmg;
        spawnFloatingText(e.x, e.y, `${dmg}`, '#44dd44');
        log(`🧪 Poison deals ${dmg} to ${e.isBoss ? e.name : e.type}!`);
        if (e.hp <= 0) { e.dead = true; log(`${e.isBoss ? e.name : e.type} succumbed to poison!`, 'important'); }
      }
    }
    s.turns--;
    return s.turns > 0;
  });
}

function isPlayerStunned() {
  return statusEffects.some(s => s.target === 'player' && s.effect === 'stun');
}

function tryBossStatusProc(e) {
  if (!e.statusChance) return;
  if (Math.random() < e.statusChance) {
    const effect = Math.random() < 0.6 ? 'poison' : 'stun';
    const turns = effect === 'poison' ? 3 : 1;
    applyStatusEffect('player', effect, turns, e);
    const icon = effect === 'poison' ? '🧪' : '⚡';
    log(`${icon} ${e.name} inflicts ${effect}!`, 'important');
  }
}

function tryPlayerStatusProc(e) {
  const w = equipped.weapon;
  if (!w) return;
  const tierOrder = Object.keys(TIERS);
  const tierIdx = tierOrder.indexOf(w.tier);
  if (tierIdx >= 4 && Math.random() < 0.15) {
    const effect = Math.random() < 0.5 ? 'poison' : 'stun';
    const turns = effect === 'poison' ? 3 : 1;
    applyStatusEffect(e, effect, turns, 'player');
    const icon = effect === 'poison' ? '🧪' : '⚡';
    const label = e.isBoss ? e.name : e.type;
    log(`${icon} Your ${w.name} inflicts ${effect} on ${label}!`, 'loot');
  }
}

// ══════════════════════════════════════════
// SHRINES & BUFFS
// ══════════════════════════════════════════

// Brief full-screen colour flash for crits, low HP, and big events.
let flashTimer = null;
function screenFlash(color) {
  const el = document.getElementById('screen-flash');
  if (!el) return;
  el.style.background = `radial-gradient(circle, transparent 30%, ${color} 100%)`;
  el.classList.add('active');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('active'), 140);
}

// Shrines grant a temporary buff (lasts a few floors) or an instant effect.
function activateShrine(nx, ny) {
  const info = shrineData[ny+','+nx];
  mapData[ny][nx] = 0;            // shrine is spent
  delete shrineData[ny+','+nx];
  player.x = nx; player.y = ny;
  const kind = info ? info.kind : 'power';
  switch (kind) {
    case 'power':
      buffs.power = 3;
      log('🔥 Shrine of Power! +50% damage for 3 floors.', 'important');
      screenFlash('#ff6600'); break;
    case 'guard':
      buffs.guard = 3;
      log('🛡 Shrine of Warding! Incoming damage −40% for 3 floors.', 'important');
      screenFlash('#3366ff'); break;
    case 'fortune':
      buffs.fortune = 3;
      log('🍀 Shrine of Fortune! Better loot for 3 floors.', 'important');
      screenFlash('#22cc66'); break;
    case 'blood': {
      // Risky: costs HP now, big XP reward.
      const cost = Math.floor(player.hp * 0.3);
      player.hp = Math.max(1, player.hp - cost);
      const xp = 30 * dungeonLevel;
      player.xp += xp;
      log(`🩸 Blood Shrine! Sacrificed ${cost} HP for ${xp} XP.`, 'important');
      screenFlash('#cc0000'); checkLevelUp(); break;
    }
    case 'wisdom': {
      const heal = Math.floor(player.maxHp * 0.5);
      player.hp = Math.min(player.maxHp, player.hp + heal);
      player.mp = player.maxMp;
      log(`📖 Shrine of Wisdom! Restored ${heal} HP and full MP.`, 'important');
      screenFlash('#aa66ff'); break;
    }
  }
  updateBars();
  saveGame();
  draw();
}

// Random one-off event when you step onto a new floor (~40% of the time).
// Small spontaneous twists — a windfall, a scare, or a fleeting blessing.
function maybeFloorEvent() {
  if (dungeonLevel <= 1) return;
  if (Math.random() >= 0.4) return;
  const roll = rnd(1, 6);
  switch (roll) {
    case 1: {
      const g = rnd(10, 25) + dungeonLevel * 3;
      player.gold += g;
      log(`💰 You stumble on a hidden coin cache — +${g} gold!`, 'important');
      break;
    }
    case 2: {
      const dmg = Math.min(player.hp - 1, rnd(5, 12) + dungeonLevel);
      if (dmg > 0) { player.hp -= dmg; spawnFloatingText(player.x, player.y, `${dmg}`, '#ff3344'); }
      log(`🪤 A hidden trap snaps shut — you take ${dmg} damage!`, 'important');
      screenFlash('#cc0000');
      break;
    }
    case 3: {
      const heal = Math.floor(player.maxHp * 0.2);
      player.hp = Math.min(player.maxHp, player.hp + heal);
      spawnFloatingText(player.x, player.y, `+${heal}`, '#44dd44');
      log(`🌿 An eerie calm settles over you — +${heal} HP.`, 'important');
      break;
    }
    case 4: {
      const xp = 15 * dungeonLevel;
      player.xp += xp;
      log(`💡 A flash of insight — +${xp} XP!`, 'important');
      checkLevelUp();
      break;
    }
    case 5:
      buffs.fortune = Math.max(buffs.fortune, 2);
      log('🍀 You feel lucky — better loot for the next 2 floors!', 'important');
      screenFlash('#22cc66');
      break;
    case 6:
      buffs.power = Math.max(buffs.power, 2);
      log('🔥 Battle fury surges — +50% damage for the next 2 floors!', 'important');
      screenFlash('#ff6600');
      break;
  }
}

// Count active shrine buffs down by one floor (called on descent).
function tickBuffs() {
  for (const k of Object.keys(buffs)) if (buffs[k] > 0) buffs[k]--;
}

// ══════════════════════════════════════════
// MOVEMENT & COMBAT
// ══════════════════════════════════════════

// Heal a little each turn based on equipped REGEN, up to max HP.
function applyRegen() {
  // Spirit grants a small passive regen on top of any REGEN rolled on gear.
  const r = totalStat('REGEN') + Math.floor((player.attributes?.spirit||0) / 3);
  if (r > 0 && player.hp > 0 && player.hp < player.maxHp) {
    player.hp = Math.min(player.maxHp, player.hp + r);
    updateBars();
  }
}

function move(dx, dy) {
  if (isPlayerStunned()) {
    tickStatusEffects();
    applyRegen();
    draw();
    return;
  }
  tickStatusEffects();
  applyRegen();
  const nx = player.x + dx, ny = player.y + dy;
  if (nx < 0 || ny < 0 || nx >= MAP_W || ny >= MAP_H) return;

  const tile = mapData[ny][nx];
  if (tile === 1) return; // wall

  // Enemy collision → attack
  const enemy = getEnemyAt(nx, ny);
  if (enemy) {
    attackEnemy(enemy);
    return;
  }

  // Merchant → open shop (don't step onto them)
  if (merchant && merchant.x === nx && merchant.y === ny) {
    openShop();
    return;
  }

  // Shrine → activate it (grants a buff or instant effect), then stand on it.
  if (tile === 5) {
    activateShrine(nx, ny);
    return;
  }

  // Stairs
  if (tile === 2) {
    dungeonLevel++;
    statusEffects = [];
    tickBuffs();
    log(`Descended to dungeon level ${dungeonLevel}! You enter ${currentTheme().name}.`, 'important');
    player.x = 5; player.y = 5;
    generateMap();
    maybeFloorEvent();
    updateBars();
    saveGame();
    draw();
    return;
  }

  // Fountain of Healing → full heal + bonus potions, then dries up.
  if (tile === 3) {
    player.hp = player.maxHp;
    player.mp = player.maxMp;
    player.healPotions += 2;
    mapData[ny][nx] = 0; // fountain is spent
    hasFountain = false;
    player.x = nx; player.y = ny;
    log(`⛲ The Fountain of Healing restores you fully! +2 ${logPotion('Health Potions')}.`, 'important');
    updateBars();
    saveGame();
    draw();
    return;
  }

  player.x = nx;
  player.y = ny;

  // Auto-pickup food
  const fi = groundFood.findIndex(f => f.x === nx && f.y === ny);
  if (fi !== -1) {
    const f = groundFood.splice(fi, 1)[0];
    const healed = Math.min(f.heal, player.maxHp - player.hp);
    player.hp = Math.min(player.maxHp, player.hp + f.heal);
