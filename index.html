<!-- Dungeon Loot — a single-file browser-based pixel loot RPG -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dungeon Loot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0b1a;
    --panel: #1f1830;
    --border: #4a3d6a;
    --frame: #c8a24b;
    --text: #ece2cc;
    --gold: #e8c267;
    --hp: #ff3b4e;
    --mp: #3a8bff;

    /* Loot tiers */
    --junk:      #6b6b6b;
    --normal:    #e8e8e8;
    --uncommon:  #44bb44;
    --rare:      #4488ff;
    --epic:      #aa44ff;
    --legendary: #ff8800;
    --unique:    #ff2222;
  }

  body {
    background:
      radial-gradient(circle at 50% -10%, #2a2148 0%, #150f26 55%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px 14px;
    padding: 6px 10px;
    background: linear-gradient(180deg, #2c2344, #1a1430);
    border-bottom: 2px solid var(--frame);
    box-shadow: inset 0 1px 0 rgba(232,194,103,0.25), 0 2px 6px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  #header h1 { color: var(--gold); font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 6px rgba(232,194,103,0.5); }
  #stats { display: flex; gap: 14px; font-size: 11px; }
  .stat-bar { display: flex; align-items: center; gap: 4px; }
  .bar-track { width: 74px; height: 13px; background: #45455e; border: 1px solid #000; border-radius: 4px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.6); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.2s; }
  .hp-fill  { background: linear-gradient(180deg, #ff6b78, var(--hp)); box-shadow: 0 0 7px var(--hp), inset 0 1px 0 rgba(255,255,255,0.4); }
  .mp-fill  { background: linear-gradient(180deg, #7db4ff, var(--mp)); box-shadow: 0 0 7px var(--mp), inset 0 1px 0 rgba(255,255,255,0.4); }
  #gold-display { color: var(--gold); font-size: 11px; }

  /* Header HUD chips: floor, level/XP, enemies remaining */
  .hud-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text); }
  .hud-item .hud-val { font-weight: bold; }
  #floor-hud { color: #9fd0ff; }
  #enemies-hud { color: #ff9a9a; }
  #level-hud { color: var(--gold); }
  #power-hud { color: #ffd24b; }
  #pact-hud { color: #7fe0d0; }
  .xp-track { width: 46px; height: 6px; background: #45455e; border: 1px solid #000; border-radius: 3px; overflow: hidden; }
  .xp-fill { height: 100%; background: linear-gradient(180deg, #ffe9a0, var(--gold)); box-shadow: 0 0 5px var(--gold); transition: width 0.2s; }

  /* Persistent red vignette when health is critical */
  #low-hp-vignette { position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: 0; box-shadow: inset 0 0 90px 28px rgba(220,0,30,0.55); transition: opacity 0.3s; }
  #low-hp-vignette.active { opacity: 1; animation: hpPulse 1.1s ease-in-out infinite; }
  @keyframes hpPulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.9; } }

  /* Heal button nudges you when you're hurt and holding potions */
  .heal-btn.urgent { animation: healPulse 0.85s ease-in-out infinite; }
  @keyframes healPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,60,80,0); } 50% { box-shadow: 0 0 10px 2px rgba(255,60,80,0.85); } }

  /* Big center-screen LEVEL UP banner — impossible to miss, points you to the bag */
  #levelup-banner {
    position: fixed; left: 0; right: 0; top: 32%;
    pointer-events: none; z-index: 320; text-align: center;
    opacity: 0; transform: scale(0.6);
  }
  #levelup-banner.show { animation: levelupPop 2.6s ease-out forwards; }
  #levelup-banner .lvl-title {
    font-family: 'Courier New', monospace; font-weight: bold;
    font-size: 40px; letter-spacing: 3px; color: #ffd24b;
    text-shadow: 0 0 14px rgba(255,210,75,0.9), 0 2px 4px #000, 0 0 30px rgba(255,160,0,0.7);
  }
  #levelup-banner .lvl-sub {
    font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 1px;
    color: #fff; margin-top: 8px;
    text-shadow: 0 0 8px rgba(255,210,75,0.8), 0 1px 3px #000;
  }
  @keyframes levelupPop {
    0%   { opacity: 0; transform: scale(0.5); }
    12%  { opacity: 1; transform: scale(1.12); }
    22%  { transform: scale(1); }
    78%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1); }
  }

  /* Persistent badge on the BAG button counting unspent attribute points */
  .bag-btn { position: relative; }
  #bag-points-badge {
    position: absolute; top: -5px; right: -5px;
    min-width: 16px; height: 16px; padding: 0 3px; box-sizing: border-box;
    border-radius: 9px; background: #d8362e; color: #fff;
    font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold;
    line-height: 16px; text-align: center; border: 1px solid #fff3d0;
    box-shadow: 0 0 6px rgba(255,210,75,0.9); z-index: 2; display: none;
  }
  #bag-points-badge.show { display: block; animation: bagBadgePulse 1.1s ease-in-out infinite; }
  @keyframes bagBadgePulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 4px rgba(255,210,75,0.7); }
    50%     { transform: scale(1.18); box-shadow: 0 0 11px rgba(255,210,75,1); }
  }

  /* ── MAIN LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── GAME CANVAS ── */
  #game-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    width: 100%;
    flex: 1;
    min-height: 0;
    touch-action: none;
  }

  /* ── BOTTOM CONTROL BAR (thumb zone) ── */
  #control-bar {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 8px;
    background: linear-gradient(180deg, #1a1430, #2c2344);
    border-top: 2px solid var(--frame);
    box-shadow: inset 0 1px 0 rgba(232,194,103,0.2), 0 -2px 6px rgba(0,0,0,0.5);
    flex-shrink: 0;
    /* Stay above the bag overlay so the d-pad and action buttons remain usable. */
    position: relative;
    z-index: 210;
  }

  #action-buttons {
    display: flex;
    flex-direction: column;
    gap: 6px;
    justify-content: center;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    width: 58px;
    flex: 1;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: 'Courier New', monospace;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .action-icon { font-size: 18px; line-height: 1; display:flex; align-items:center; justify-content:center; }
  .action-icon svg { display:block; }
  .action-label { font-size: 9px; letter-spacing: 1px; }

  .heal-btn {
    background: #6a1a2a;
    border-color: #a03048;
    color: #ffd5dd;
  }
  .heal-btn:active { background: #c02040; }
  .heal-btn.empty { background: #2a1a1f; border-color: #3a2a2f; color: #6a4a52; }

  .bag-btn {
    background: #4a3520;
    border-color: #6b4f2f;
    color: #e8d5b5;
  }
  .bag-btn:active { background: #6b4f2f; }
  .bag-btn.open { background: #6b4f2f; border-color: var(--gold); color: #fff; }

  .sound-action {
    background: #1f2a3a;
    border-color: #2f4a6b;
    color: #bcd5ff;
  }
  .sound-action:active { background: #2f4a6b; }
  .sound-action.muted { background: #262626; border-color: #444; color: #888; }

  .newgame-action {
    background: #2a1a1a;
    border-color: #4a2a2a;
    color: #c89090;
  }
  .newgame-action:active { background: var(--hp); color: #fff; }
  .newgame-action.armed { background: var(--hp); color: #fff; border-color: #fff; }

  .skill-btn {
    background: #2a1f4a;
    border-color: #4a3a7a;
    color: #cbb8ff;
  }
  .skill-btn:active { background: #4a3a7a; }
  /* Greyed when on cooldown or short on mana; pulses when ready to fire. */
  .skill-btn.disabled { background: #211c2a; border-color: #33304a; color: #6a647a; }
  .skill-btn.ready { box-shadow: 0 0 8px rgba(140,110,255,0.55); }

  /* ── SIDE PANEL ── */
  /* Overlays the map (absolutely positioned) so opening it doesn't resize the
     game canvas. The control bar sits above it via a higher z-index. */
  #side-panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 160px;
    z-index: 200;
    background: linear-gradient(180deg, #241c38, #181226);
    border-left: 2px solid var(--frame);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: -4px 0 14px rgba(0,0,0,0.55), inset 1px 0 0 rgba(232,194,103,0.2);
    transition: transform 0.18s ease, opacity 0.18s ease;
  }
  #side-panel.collapsed {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  .panel-tab {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 5px 0;
    background: none;
    border: none;
    color: #666;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  /* HERO tab glows gold while unspent attribute points are waiting. */
  .tab-btn.has-points { color: #ffe9a0; animation: tabGlow 1.1s ease-in-out infinite; }
  @keyframes tabGlow { 0%,100% { text-shadow: 0 0 0 rgba(255,210,75,0); } 50% { text-shadow: 0 0 8px rgba(255,210,75,0.95); } }

  /* ── HERO / ATTRIBUTES PANEL ── */
  .hero-power { text-align: center; padding: 8px 4px; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 6px; background: #14140f; }
  .hero-power .hp-label { font-size: 10px; color: #888; letter-spacing: 1px; }
  .hero-power .hp-value { font-size: 22px; font-weight: bold; color: #ffd24b; text-shadow: 0 0 10px rgba(255,210,75,0.6); }
  .hero-sub { font-size: 10px; color: #888; text-align: center; margin-bottom: 8px; line-height: 1.5; }
  .hero-points { text-align: center; font-size: 11px; color: #ffe9a0; margin-bottom: 8px; font-weight: bold; }
  .hero-class { border: 1px solid var(--border); border-left-width: 3px; border-radius: 6px; padding: 7px 9px; margin-bottom: 8px; background: #14140f; }
  .hero-class .hc-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .hero-class .hc-icon { font-size: 16px; }
  .hero-class .hc-name { font-size: 13px; font-weight: bold; letter-spacing: 1px; }
  .hero-class .hc-line { font-size: 10px; color: #b9a98a; line-height: 1.5; }
  .attr-row { display: flex; align-items: center; gap: 6px; padding: 5px 4px; border: 1px solid var(--border); border-radius: 5px; margin-bottom: 5px; }
  .attr-info { flex: 1; min-width: 0; }
  .attr-name { font-size: 11px; font-weight: bold; color: #d8d8e0; }
  .attr-desc { font-size: 9px; color: #777; line-height: 1.3; }
  .attr-val { font-size: 14px; font-weight: bold; color: #ffd24b; width: 24px; text-align: center; flex-shrink: 0; }
  .attr-plus { flex-shrink: 0; width: 30px; height: 30px; border: none; border-radius: 5px; background: #2e7d32; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; line-height: 1; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .attr-plus:active { background: #44bb44; }
  .attr-plus:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; }

  #panel-content { flex: 1; overflow-y: auto; padding: 6px; }
  #panel-content::-webkit-scrollbar { width: 4px; }
  #panel-content::-webkit-scrollbar-track { background: var(--bg); }
  #panel-content::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── LOOT LIST ── */
  .loot-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    margin-bottom: 3px;
    border: 1px solid transparent;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.3;
    transition: background 0.1s;
  }
  .loot-item:hover { background: #1e1e2e; border-color: var(--border); }
  .loot-item.selected { background: #1e1e30; border-color: #444; }
  /* Upgrade highlight: this item has more power than what's in its slot. */
  .loot-item.upgrade { border-color: #2e7d32; background: rgba(46,125,50,0.12); box-shadow: 0 0 6px rgba(68,187,68,0.25); }
  .loot-item.upgrade:hover { background: rgba(46,125,50,0.2); }
  .up-arrow { color: #5ee08a; font-weight: bold; }
  .equip-row-btn.upgrade-btn { background: #1b8f3a; box-shadow: 0 0 8px rgba(68,187,68,0.6); animation: upgPulse 1.3s ease-in-out infinite; }
  .equip-row-btn.upgrade-btn:active { background: #44bb44; }
  @keyframes upgPulse { 0%,100% { box-shadow: 0 0 4px rgba(68,187,68,0.4); } 50% { box-shadow: 0 0 11px rgba(68,187,68,0.85); } }
  .loot-info { flex: 1; cursor: pointer; min-width: 0; }
  .loot-info .item-name { overflow: hidden; text-overflow: ellipsis; }
  /* Little item picture shown at the start of each loot / gear / shop row. */
  .loot-icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 16px;
    line-height: 1;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6));
  }
  .slot-icon { width: 18px; height: 18px; font-size: 14px; }
  /* Vector item icons: silhouettes tinted to rarity, sized to their container. */
  .svg-icon { width: 18px; height: 18px; display: block; }
  .slot-icon .svg-icon { width: 16px; height: 16px; }
  .cos-chip .svg-icon { width: 18px; height: 18px; }
  .cos-preview .svg-icon { width: 20px; height: 20px; margin: 0 auto; }

  /* ── COSMETICS / APPEARANCE ── */
  .cos-head { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 8px; }
  .cos-title { font-size: 11px; color: #c9a84a; letter-spacing: 1px; margin-bottom: 2px; }
  .cos-sub { font-size: 9px; color: #555; margin-bottom: 8px; line-height: 1.4; }
  .cos-block { margin-bottom: 8px; }
  .cos-blk-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .cos-preview { width: 24px; text-align: center; font-size: 18px; line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6)); }
  .cos-slot-label { color: #999; font-size: 10px; }
  .cos-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .cos-chip {
    flex-shrink: 0;
    min-width: 30px;
    height: 30px;
    padding: 0 4px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: #16161f;
    color: #ddd;
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .cos-chip.gear { font-family: 'Courier New', monospace; font-size: 9px; font-weight: bold; letter-spacing: 1px; color: #aaa; }
  .cos-chip:active { background: #2a2a3c; }
  .cos-chip.sel { border-color: #c9a84a; background: #2c2616; box-shadow: 0 0 6px rgba(201,168,74,0.5); }
  .cos-empty { font-size: 9px; color: #555; font-style: italic; padding: 2px 0; }

  /* Inline action buttons on loot/gear rows */
  .row-btn {
    flex-shrink: 0;
    border: none;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .equip-row-btn {
    background: #2e7d32;
    color: #fff;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 7px 9px;
  }
  .equip-row-btn:active { background: #44bb44; }
  .unequip-row-btn {
    background: #5a2a2a;
    color: #fff;
    font-size: 12px;
    width: 28px;
    height: 28px;
    line-height: 1;
  }
  .unequip-row-btn:active { background: var(--hp); }
  .locked-row-btn {
    background: #2a2420;
    color: #8a7a5a;
    font-size: 12px;
    width: 28px;
    height: 28px;
    line-height: 1;
    border: 1px solid #4a3f2a;
  }
  .locked-row-btn:active { background: #3a3228; }

  .item-junk      { color: var(--junk); }
  .item-normal    { color: var(--normal); }
  .item-uncommon  { color: var(--uncommon); }
  .item-rare      { color: var(--rare); }
  .item-epic      { color: var(--epic); }
  .item-legendary { color: var(--legendary); }
  .item-unique    { color: var(--unique); }

  .item-name { font-weight: bold; }
  .item-type { font-size: 10px; opacity: 0.7; }
  /* Item power badge — a single gold number shown alongside an item's stats. */
  .item-power { color: #ffd24b; font-weight: bold; opacity: 0.95; margin-left: 5px; white-space: nowrap; }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    display: none;
    background: #0e0e1a;
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-size: 11px;
    min-width: 160px;
    max-width: 220px;
    /* Above the side panel (200) and control bar (210) so it never hides
       behind the drawer; below the non-interactive screen flash (300). */
    z-index: 250;
    pointer-events: auto;
    cursor: pointer;
    line-height: 1.6;
  }
  #tooltip .tt-name { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
  #tooltip .tt-stat { color: #8899bb; }
  #tooltip .tt-flavor { color: #666; font-style: italic; margin-top: 4px; font-size: 10px; }
  #tooltip .tt-tier { font-size: 10px; opacity: 0.7; }
  /* Side-by-side compare: hovered item next to the currently-equipped piece. */
  #tooltip.comparing { max-width: 440px; }
  #tooltip .tt-compare { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
  #tooltip .tt-card { flex: 1 1 150px; min-width: 150px; }
  #tooltip .tt-card-equipped { border-left: 1px solid var(--border); padding-left: 10px; opacity: 0.9; }
  #tooltip .tt-cardlabel { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 3px; }

  /* Styled hover popup for enchanter buttons — mirrors the gear tooltip look so
     hovering a reroll button reads like hovering a piece of gear (no native
     browser title boxes). */
  #hovertip {
    position: fixed;
    display: none;
    background: #0e0e1a;
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-size: 11px;
    min-width: 160px;
    max-width: 240px;
    z-index: 420; /* above every town/shop modal */
    pointer-events: none;
    line-height: 1.6;
    /* A soft drop shadow lifts it off the drawer so it reads as a floating
       card the moment it appears, not a flat patch of background. */
    box-shadow: 0 6px 20px rgba(0,0,0,0.55);
  }
  #hovertip .ht-name { font-weight: bold; font-size: 12px; margin-bottom: 4px; color: #e6c34a; }
  #hovertip .ht-line { color: #8899bb; }
  #hovertip .ht-sub  { color: #7a8499; font-size: 10px; margin-top: 3px; }
  /* Wraps a (possibly disabled) reroll button so the hover popup still fires —
     disabled buttons swallow mouse events on their own. */
  .ench-tipwrap { display: inline-flex; flex-shrink: 0; }

  /* ── EQUIPMENT ── */
  .equip-slot {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 4px;
    min-height: 30px;
    font-size: 10px;
  }
  .slot-info { display: flex; align-items: center; gap: 6px; flex: 1; cursor: pointer; min-width: 0; }
  .slot-label { color: #555; width: 36px; flex-shrink: 0; }
  .slot-item { flex: 1; font-size: 10px; overflow: hidden; text-overflow: ellipsis; }
  .slot-empty { color: #333; }

  /* ── LOG ── */
  /* ── BOTTOM ROW: log (left) + dpad (right) ── */
  #bottom-row {
    display: flex;
    align-items: stretch;
    border-top: 1px solid var(--border);
    flex: 0 0 130px;
    min-height: 90px;
    max-height: 28vh;
    overflow: hidden;
  }

  #log {
    background: var(--panel);
    padding: 6px 8px;
    font-size: 12px;
    flex: 1;
    overflow-y: auto;
  }
  #log::-webkit-scrollbar { width: 3px; }
  #log::-webkit-scrollbar-thumb { background: var(--border); }
  .log-line { color: #b8b8c8; line-height: 1.55; }
  .log-line.important { color: #ffffff; }
  .log-line.loot { color: #6fe06f; }

  /* ── CONTROLS (mobile) ── */
  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
    flex-shrink: 0;
  }
  .dpad-btn {
    background: #1a1a2a;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .dpad-btn:active { background: #2a2a3a; }
  .dpad-center {
    background: #1e1e2e;
    border-color: var(--gold);

    font-size: 12px;

  #empty-panel { color: #333; text-align: center; padding: 20px 0; font-size: 11px; }

  /* ── SHOP MODAL ── */
  #shop-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 210; /* above the town hub menu, which can stay open behind it */
    padding: 16px;
  }
  #shop-overlay.open { display: flex; }
  #shop-modal {
    background: #14101c;
    border: 2px solid #6b4f9f;
    border-radius: 10px;
    width: 100%;
    max-width: 340px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(140,90,255,0.4);
  }
  #shop-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: linear-gradient(90deg,#3a2a5a,#5a3a7a);
    border-bottom: 1px solid #6b4f9f;
  }
  #shop-title { color: #e8d5ff; font-size: 14px; font-weight: bold; }
  #shop-close {
    background: none; border: none; color: #c8b5e8;
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  #shop-back {
    background: none; border: none; color: #c8b5e8;
    font-size: 18px; cursor: pointer; padding: 0 8px 0 0; line-height: 1;
  }
  #shop-gold {
    padding: 8px 12px; font-size: 12px; color: var(--gold);
    border-bottom: 1px solid var(--border);
  }
  #shop-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .shop-tab {
    flex: 1; padding: 8px 0; background: none; border: none;
    color: #777; font-family: 'Courier New', monospace; font-size: 12px;
    letter-spacing: 2px; cursor: pointer; border-bottom: 2px solid transparent;
  }
  .shop-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  #shop-content { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px; }

  .shop-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px; margin-bottom: 4px;
    border: 1px solid var(--border); border-radius: 5px;
  }
  /* Upgrade highlight: this wares is better than what fills its slot. */
  .shop-row.upgrade { border-color: #2e7d32; background: rgba(46,125,50,0.12); box-shadow: 0 0 6px rgba(68,187,68,0.25); }
  .shop-row-info { flex: 1; min-width: 0; }
  .shop-row-name { font-weight: bold; font-size: 12px; }
  .shop-row-sub { font-size: 10px; opacity: 0.7; }
  .shop-row-stats { font-size: 10px; color: #8899bb; margin-top: 2px; line-height: 1.3; }
  .shop-price { color: var(--gold); font-size: 11px; flex-shrink: 0; }
  .shop-buy-btn, .shop-sell-btn {
    flex-shrink: 0; border: none; border-radius: 5px; cursor: pointer;
    font-family: 'Courier New', monospace; font-weight: bold;
    font-size: 11px; padding: 8px 10px; color: #fff;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .shop-buy-btn { background: #2e7d32; }
  .shop-buy-btn:active { background: #44bb44; }
  .shop-buy-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .shop-sell-btn { background: #8a6a1a; }
  /* Enchanter: two compact reroll buttons per property (value vs modifier). */
  .ench-btn { padding: 7px 8px; font-size: 10px; background: #355a8a; }
  .ench-btn:active { background: #4a78b3; }
  .ench-legend { font-size: 9px; color: #7a8499; margin: 2px 0 6px; line-height: 1.4; }
  /* Reference panel listing every modifier this slot can roll, with value bands. */
  .ench-pool { margin-top: 10px; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 5px; background: rgba(255,255,255,0.02); }
  .ench-pool-head { font-size: 10px; color: #b9a98a; margin-bottom: 5px; }
  .ench-pool-grp { font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    color: #6a7180; margin: 5px 0 2px; }
  .ench-pool-line { font-size: 11px; color: #6a7180; line-height: 1.5; }
  .ench-pool-line.on { color: #cdd3df; }
  .ench-pool-range { float: right; color: #7fb0ff; font-size: 10px; }
  .shop-sell-btn:active { background: var(--gold); }
  .shop-empty { color: #555; text-align: center; padding: 24px 0; font-size: 12px; }
  .shop-sell-all-bar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .shop-sell-all-btn {
    border: none; border-radius: 5px; cursor: pointer;
    font-family: 'Courier New', monospace; font-weight: bold;
    font-size: 11px; padding: 8px 12px; color: #fff; background: #8a6a1a;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .shop-sell-all-btn:active { background: var(--gold); }

  /* ── MYSTIC MODAL ── (the Wandering Mystic sells floor-spanning pacts) */
  #mystic-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 210; /* above the town hub menu, which can stay open behind it */ padding: 16px;
  }
  #mystic-overlay.open { display: flex; }
  #mystic-modal {
    background: #0c1418; border: 2px solid #2f7f8a; border-radius: 10px;
    width: 100%; max-width: 340px; max-height: 80vh;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 0 30px rgba(60,220,210,0.35);
  }
  #mystic-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: linear-gradient(90deg,#143a44,#1d5a66);
    border-bottom: 1px solid #2f7f8a;
  }
  #mystic-title { color: #cffaf2; font-size: 14px; font-weight: bold; }
  #mystic-close {
    background: none; border: none; color: #a5e8e0;
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  #mystic-back {
    background: none; border: none; color: #a5e8e0;
    font-size: 18px; cursor: pointer; padding: 0 8px 0 0; line-height: 1;
  }
  #mystic-gold {
    padding: 8px 12px; font-size: 12px; color: var(--gold);
    border-bottom: 1px solid var(--border);
  }
  #mystic-active {
    padding: 8px 12px; font-size: 11px; color: #7fe0d0; line-height: 1.4;
    border-bottom: 1px solid var(--border); background: rgba(60,220,210,0.06);
  }
  #mystic-content { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px; }
  .pact-card {
    padding: 8px; margin-bottom: 8px;
    border: 1px solid #2f5f66; border-radius: 6px; background: rgba(60,220,210,0.04);
  }
  .pact-name { font-weight: bold; font-size: 12px; color: #cffaf2; }
  .pact-desc { font-size: 10px; opacity: 0.8; margin: 2px 0 6px; line-height: 1.35; }
  .pact-durations { display: flex; gap: 6px; }
  .pact-buy-btn {
    flex: 1; border: none; border-radius: 5px; cursor: pointer;
    font-family: 'Courier New', monospace; font-weight: bold; font-size: 10px;
    padding: 7px 4px; color: #fff; background: #1d6a72; line-height: 1.3;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .pact-buy-btn:active { background: #2fb0a8; }
  .pact-buy-btn:disabled { background: #2a2a2a; color: #666; cursor: not-allowed; }
  .pact-buy-btn .pact-floors { display: block; font-size: 11px; }
  .pact-buy-btn .pact-cost { display: block; opacity: 0.85; font-size: 10px; }

  /* ── TOWN MODAL ── (craftsman / healer / trainer / enchanter / dungeon gate) */
  #town-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 16px;
  }
  #town-overlay.open { display: flex; }
  #town-modal {
    background: #16120c; border: 2px solid #9f7a3f; border-radius: 10px;
    width: 100%; max-width: 340px; max-height: 80vh;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 0 30px rgba(255,200,100,0.3);
  }
  #town-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: linear-gradient(90deg,#3a2e14,#5a4520);
    border-bottom: 1px solid #9f7a3f;
  }
  #town-title { color: #ffe9b0; font-size: 14px; font-weight: bold; }
  #town-close {
    background: none; border: none; color: #e8d5a8;
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  #town-gold {
    padding: 8px 12px; font-size: 12px; color: var(--gold);
    border-bottom: 1px solid var(--border);
  }
  #town-content { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px; }
  #town-back {
    background: none; border: none; color: #e8d5a8;
    font-size: 18px; cursor: pointer; padding: 0 8px 0 0; line-height: 1;
  }
  /* Town hub menu — town is a menu of services, not a walkable plaza. */
  .town-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .town-menu-btn {
    display: flex; align-items: center; gap: 9px; text-align: left;
    padding: 11px 11px; border: 1px solid var(--border); border-radius: 8px;
    background: #1b160f; color: #e8d5a8; font-family: 'Courier New', monospace;
    cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .town-menu-btn:active { background: #2a2113; }
  .town-menu-btn .tm-icon { font-size: 20px; flex: 0 0 auto; width: 24px; text-align: center; }
  .town-menu-btn .tm-text { display: flex; flex-direction: column; min-width: 0; }
  .town-menu-btn .tm-name { font-size: 13px; font-weight: bold; letter-spacing: .5px; }
  .town-menu-btn .tm-desc { font-size: 9px; color: #8a7d63; line-height: 1.3; }
  .town-menu-btn.tm-gate {
    grid-column: 1 / -1; border-color: #9f7a3f; background: #261c0d;
    box-shadow: 0 0 10px rgba(255,200,100,0.15);
  }

  /* ── CLASS-PICK OVERLAY ── shown on a new game (and for classless saves). */
  #class-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 400; padding: 16px;
  }
  #class-overlay.open { display: flex; }
  #class-modal {
    background: #16120c; border: 2px solid #9f7a3f; border-radius: 10px;
    width: 100%; max-width: 380px; max-height: 88vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch; padding: 14px;
    box-shadow: 0 0 30px rgba(255,200,100,0.3);
  }
  #class-title { color: #ffe9b0; font-size: 16px; font-weight: bold; display: block; text-align: center; }
  #class-sub { color: #b9a98a; font-size: 11px; text-align: center; margin: 6px 0 12px; line-height: 1.4; }
  #class-cards { display: flex; flex-direction: column; gap: 8px; }
  .class-card {
    border: 1px solid var(--border); border-left-width: 4px; border-radius: 8px;
    padding: 9px 11px; background: #1b160f; cursor: pointer; text-align: left;
    font-family: 'Courier New', monospace; color: #e8d5a8; width: 100%;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .class-card:active { background: #2a2113; }
  .class-card .cc-head { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
  .class-card .cc-icon { font-size: 18px; }
  .class-card .cc-name { font-size: 14px; font-weight: bold; letter-spacing: 1px; }
  .class-card .cc-blurb { font-size: 10px; color: #b9a98a; line-height: 1.4; margin-bottom: 3px; }
  .class-card .cc-detail { font-size: 9px; color: #8a7d63; line-height: 1.5; }
  .town-blurb { font-size: 11px; color: #b9a98a; margin-bottom: 8px; line-height: 1.4; }
  /* Stash vault — gold deposit/withdraw bar and section headings. */
  .stash-gold-bar { display: flex; gap: 6px; margin: 6px 0; align-items: stretch; }
  .stash-gold-bar input {
    flex: 1 1 auto; min-width: 0; background: #221a10; border: 1px solid var(--border);
    border-radius: 5px; color: #ffe9b0; font-family: 'Courier New', monospace;
    font-size: 12px; padding: 6px 8px;
  }
  .stash-gold-bar .shop-buy-btn, .stash-gold-bar .shop-sell-all-btn { flex: 0 0 auto; }
  .stash-gold-bar .shop-sell-all-btn { flex: 1 1 0; }
  .stash-section-title {
    color: #ffe9b0; font-size: 12px; font-weight: bold; letter-spacing: 1px;
    margin: 12px 0 4px; padding-bottom: 3px; border-bottom: 1px solid var(--border);
  }
  .gate-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .gate-floor {
    padding: 10px 0; border: 1px solid var(--border); border-radius: 5px;
    background: #221a10; color: #ffe9b0; font-family: 'Courier New', monospace;
    font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .gate-floor:active { background: #5a4520; }
  .gate-floor.current { border-color: var(--gold); color: var(--gold); }

  /* Crafting materials — the compact wallet strip (bag + town) and the
     Craftsman's slot/base/rarity pickers. */
  .mat-strip {
    display: flex; flex-wrap: wrap; gap: 6px 10px; padding: 6px 8px; margin-bottom: 6px;
    background: #1b160f; border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; line-height: 1.2;
  }
  .mat-chip { font-weight: bold; white-space: nowrap; }
  #town-mats { padding: 4px 12px 8px; border-bottom: 1px solid var(--border); }
  #town-mats .mat-strip { margin-bottom: 0; }
  .forge-label {
    color: #ffe9b0; font-size: 11px; font-weight: bold; letter-spacing: 1px; margin: 9px 0 4px;
  }
  .forge-grid { display: grid; gap: 5px; }
  .forge-slots, .forge-bases { grid-template-columns: repeat(2, 1fr); }
  .forge-tiers { grid-template-columns: repeat(5, 1fr); }
  .forge-opt {
    padding: 7px 6px; border: 1px solid var(--border); border-radius: 5px;
    background: #221a10; color: #e8d5a8; font-family: 'Courier New', monospace;
    font-size: 11px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .forge-opt:active { background: #2a2113; }
  .forge-opt.on { border-color: var(--gold); color: var(--gold); background: #2a2113; }
  .forge-tiers .forge-opt { flex-direction: column; gap: 1px; padding: 6px 2px; }

  /* Brief full-screen colour flash for crits, low HP, and big events. */
  #screen-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 300;
    opacity: 0; transition: opacity 0.1s ease;
  }
  #screen-flash.active { opacity: 0.5; }

  /* ── WEB / DESKTOP LAYOUT ──
     On keyboard + mouse devices with room to spare, rearrange the play area:
     the log sits in a full-height column on the LEFT, a big SQUARE map fills
     the middle, and the loot drawer becomes a permanent right-hand column so
     the inventory list can scroll the full height and is never covered. The
     d-pad and bag toggle are dropped (keyboard moves; the drawer stays open),
     and heal / new-game float over the map's top-left corner.
     This block is intentionally gated to pointer:fine + hover so the stacked
     mobile/touch layout above is left completely untouched. */
  @media (min-width: 760px) and (hover: hover) and (pointer: fine) {
    /* Loot drawer: a real column in the flow (not an overlay), always open.
       It grows with the viewport so wide screens don't leave dead space beside
       the square map — the panel expands to absorb the right-hand slack. */
    #side-panel {
      position: relative; /* relative + z-index so it stays above town/shop menus */
      z-index: 250;
      flex: 0 0 clamp(210px, 22vw, 440px);
      width: clamp(210px, 22vw, 440px);
      transform: none;
      opacity: 1;
      pointer-events: auto;
      box-shadow: none;
    }
    #side-panel.collapsed { transform: none; opacity: 1; pointer-events: auto; }

    /* Town / shop / mystic menus REPLACE the map on web: they sit inside #main
       and occupy exactly the map column — left edge starts after the log,
       right edge stops before the loot drawer. The header, log, and
       LOOT / GEAR / HERO tabs stay fully visible and usable (no backdrop, no
       blur), so the menu reads as the map area swapping to a menu rather than a
       window popping up over everything. */
    #town-overlay, #shop-overlay, #mystic-overlay {
      position: absolute;
      top: 0; bottom: 0;
      left: clamp(250px, 24vw, 480px);
      right: clamp(210px, 22vw, 440px);
      padding: 0;
      background: #120e08;
      z-index: 240;
    }
    /* Shop / mystic still stack above the town menu when opened from a service. */
    #shop-overlay, #mystic-overlay { z-index: 245; }
    #town-modal, #shop-modal, #mystic-modal {
      width: 100%;
      max-width: none;
      height: 100%;
      max-height: none;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    /* Header reserves room on the right for the floating action buttons that
       move up into it on web, and stays tall enough to seat them. */
    #header {
      min-height: 46px;
      padding-right: 178px;
    }

    #game-wrap {
      position: relative;
      display: grid;
      /* Log column also grows with the viewport so the left-hand slack beside
         the centered map is filled too. The map ('1fr') keeps the remainder. */
      grid-template-columns: clamp(250px, 24vw, 480px) 1fr;
      grid-template-rows: 1fr;
    }
    /* Log: full-height left column. */
    #bottom-row {
      grid-column: 1;
      grid-row: 1;
      flex: none;
      max-height: none;
      min-height: 0;
      border-top: none;
      border-right: 1px solid var(--border);
    }
    /* Map: the largest square that fits its cell, centered. */
    canvas {
      grid-column: 2;
      grid-row: 1;
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
      justify-self: center;
      align-self: center;
      flex: none;
    }
    /* No bottom bar on web — the heal / sound / new-game buttons move up into
       the header bar's top-right corner (fixed to the viewport). */
    #control-bar {
      position: fixed;
      top: 5px;
      right: 12px;
      left: auto;
      padding: 0;
      background: none;
      border-top: none;
      width: auto;
      z-index: 230;
    }
    #action-buttons { flex-direction: row; gap: 8px; }
    .action-btn { width: 46px; flex: none; }
    /* Keyboard replaces the d-pad; the drawer stays open so no bag toggle. */
    #dpad { display: none; }
    .bag-btn { display: none; }
  }

  /* ── MOBILE LANDSCAPE LAYOUT ──
     On a touch device held sideways the vertical stack wastes the width and
     squashes the map, so mirror the roomy web layout instead: the log becomes
     a full-height LEFT column, the largest possible SQUARE map fills the
     middle, and the controls move into a RIGHT-hand column rather than a
     bottom bar. Unlike the web layout (which leans on a keyboard) the move
     d-pad is KEPT here so the game stays fully thumb-playable. The loot drawer
     remains an overlay toggled by BAG — a phone has no room to spare for a
     permanent panel column. Gated to pointer:coarse so it never touches the
     desktop/web layout (which requires pointer:fine). */
  @media (orientation: landscape) and (pointer: coarse) {
    #game-wrap {
      display: grid;
      /* Log column on the left, map takes the remaining middle, controls
         size to their content on the right. */
      grid-template-columns: clamp(110px, 20vw, 240px) 1fr auto;
      grid-template-rows: 1fr;
    }
    /* Log: full-height left column instead of a short bottom strip. */
    #bottom-row {
      grid-column: 1;
      grid-row: 1;
      flex: none;
      max-height: none;
      min-height: 0;
      border-top: none;
      border-right: 1px solid var(--border);
    }
    /* Map: the largest square that fits its cell, centered. */
    canvas {
      grid-column: 2;
      grid-row: 1;
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
      justify-self: center;
      align-self: center;
      flex: none;
    }
    /* Controls: a vertical right-hand column (d-pad on top, actions below)
       instead of the full-width bottom bar. */
    #control-bar {
      grid-column: 3;
      grid-row: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-top: none;
      border-left: 2px solid var(--frame);
      box-shadow: inset 1px 0 0 rgba(232,194,103,0.2), -2px 0 6px rgba(0,0,0,0.5);
      overflow-y: auto;
    }
    /* Slightly smaller d-pad so it plus the action buttons fit a short screen. */
    #dpad {
      grid-template-columns: repeat(3, 46px);
      grid-template-rows: repeat(3, 46px);
    }
    /* Action buttons pack into a compact 3-wide grid under the d-pad. */
    #action-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .action-btn { width: 46px; flex: none; }
  }
</style>

<!-- HEADER -->
<div id="header">

function matColor(m) { return MATERIALS[m] || m; }
// Inline-SVG markup for a vector icon key: each layer drawn in its own material
// colour, with a dark edge for definition. When `frame` is on, a rounded rarity
// frame is drawn behind it (the `color`) so deeper loot reads as rarer without
// recolouring the object. Non-key values (potion or other emoji) pass straight
// through, so the same call sites render both.
function iconMarkup(val, color, frame = true) {
  const layers = ICON_PATHS[val];
  if (!layers) return val || '';
  const c = color || ICON_EMPTY_COLOR;
  const paths = layers.map(([d, m]) => {
    const f = matColor(m);
    return `<path d="${d}" fill="${f}" stroke="${shadeColor(f, 0.55)}" stroke-width="2" stroke-linejoin="round" fill-rule="evenodd"/>`;
  }).join('');
  const rim = frame
    ? `<rect x="3" y="3" width="94" height="94" rx="16" fill="${c}" fill-opacity="0.14" stroke="${c}" stroke-width="4" stroke-opacity="0.9"/>`
    : '';
  return `<svg class="svg-icon" viewBox="0 0 100 100" aria-hidden="true">${rim}${paths}</svg>`;
}
// Scale a #rrggbb colour toward black (f<1) for shading; passes other formats through.
function shadeColor(hex, f) {
  const m = /^#?([0-9a-f]{6})$/i.exec(hex || '');
  if (!m) return hex;
  const n = parseInt(m[1], 16);
  return `rgb(${Math.round(((n>>16)&255)*f)},${Math.round(((n>>8)&255)*f)},${Math.round((n&255)*f)})`;
}
// Draw a vector icon key onto the canvas, centred at (cx,cy) and `size` px wide.
// Each layer is filled in its own material colour; when `color` is given it is
// stroked first as a fat halo so the piece's rarity still reads on the hero.
function drawIconPath(key, cx, cy, size, color) {
  const layers = ICON_PATHS[key];
  if (!layers) { ctx.fillStyle = '#fff'; ctx.fillText(key, cx, cy); return; } // legacy emoji fallback
  const s = size / 100;
  ctx.save();
  ctx.translate(cx - size/2, cy - size/2);
  ctx.scale(s, s);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if (color) {
    // Rarity halo: trace every layer with a thick stroke in the rarity colour.
    ctx.strokeStyle = color; ctx.lineWidth = 7; ctx.globalAlpha = 0.9;
    for (const [d] of layers) ctx.stroke(new Path2D(d));
    ctx.globalAlpha = 1;
  }
  for (const [d, m] of layers) {
    const f = matColor(m), p = new Path2D(d);
    ctx.fillStyle = f; ctx.fill(p, 'evenodd');
    ctx.strokeStyle = shadeColor(f, 0.5); ctx.lineWidth = 2; ctx.stroke(p);
  }
  ctx.restore();
}

// ── Emoji sprite cache ───────────────────────────────────────────────────
// Colour emoji (food, enemies, NPCs, item glyphs…) come from a system font the
// browser loads lazily. The first `ctx.fillText` of a given emoji can paint
// nothing — a fully transparent blank — until that glyph is resident, and since
// the game only repaints on events, the blank sticks around (the "assets render
// transparent" bug). We rasterise each emoji once into an offscreen canvas and
// blit that bitmap forever after, so a glyph that has drawn once stays drawn.
// Until a glyph is ready we skip caching and keep nudging a redraw, so it heals
// in on its own a frame or two later.
const _emojiCache = new Map();
let _emojiRedrawQueued = false;
function _queueEmojiRedraw() {
  if (_emojiRedrawQueued) return;
  _emojiRedrawQueued = true;
  requestAnimationFrame(() => { _emojiRedrawQueued = false; draw(); });
}
// Bake an emoji to its own canvas; returns null if the font glyph isn't ready
// yet (the render came back fully transparent) so the caller can retry later.
function _buildEmojiSprite(emoji, fontPx) {
  const pad = Math.ceil(fontPx * 0.35);
  const size = Math.ceil(fontPx) + pad * 2;
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const c = cv.getContext('2d');
  c.font = `${Math.round(fontPx)}px serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#fff';
  c.fillText(emoji, size / 2, size / 2);
  const data = c.getImageData(0, 0, size, size).data;
  for (let i = 3; i < data.length; i += 4) {
    if (data[i] !== 0) return cv; // found an opaque pixel → real glyph rendered
  }
  return null;
}
// Draw an emoji centred at (x,y) at height `fontPx`, honouring the live ctx
// filter/shadow state (so poison tints and glows still apply to the bitmap).
// Drop-in for `ctx.fillText(emoji, x, y)` with center/middle alignment.
function drawEmoji(emoji, x, y, fontPx) {
  const key = emoji + '@' + Math.round(fontPx);
  let cv = _emojiCache.get(key);
  if (!cv) {
    cv = _buildEmojiSprite(emoji, fontPx);
    if (cv) _emojiCache.set(key, cv);
  }
  if (cv) {
    ctx.drawImage(cv, x - cv.width / 2, y - cv.height / 2);
  } else {
    // Font not resident yet: best-effort live draw, then ask for a repaint so
    // the sprite can bake in once the glyph finishes loading.
    ctx.fillText(emoji, x, y);
    _queueEmojiRedraw();
  }
}

// Slots that actually change how the hero sprite looks.
const VISUAL_SLOTS = ['head','chest','weapon'];

// Resolve an emoji picture for any item. New items carry a stored `icon`; older
// saved items are matched by the base word in their name, falling back to a
// generic per-slot icon (or a potion flask for non-gear).
function iconKeyFromName(name, slot) {
  for (const base of Object.keys(ITEM_ICONS)) {
    if (new RegExp('\\b' + base + '\\b').test(name || '')) return ITEM_ICONS[base];
  }
  return SLOT_ICONS[slot] || 'amulet';
}
// Potions (and other slotless items) keep their emoji flask.
function potionIcon(item) { return /\bMana\b/i.test((item && item.name) || '') ? '🔷' : '🧪'; }
function itemIcon(item) {
  if (!item) return '';
  // Trust a stored icon only if it's a known vector key; otherwise re-resolve by
  // name so gear saved under the old emoji system heals to the right vector icon.
  if (item.icon && ICON_PATHS[item.icon]) return item.icon;
  if (!item.slot) return potionIcon(item);
  return iconKeyFromName(item.name, item.slot);
}

// Remember every distinct look the player has discovered, per visual slot, so
// the wardrobe (cosmetics) can offer it later — even after the item is sold.
function recordWardrobe(item) {
  if (!item || !item.slot || !VISUAL_SLOTS.includes(item.slot)) return;
  if (!player.wardrobe) player.wardrobe = { head:[], chest:[], weapon:[] };
  const list = player.wardrobe[item.slot] || (player.wardrobe[item.slot] = []);
  const icon = itemIcon(item);
  if (!list.some(w => w.icon === icon)) list.push({ icon, name: (item.name || '').replace(/^☠\s*/, '') });
}

// The emoji actually drawn on the sprite for a visual slot: a chosen cosmetic
// look wins; otherwise it mirrors whatever is equipped there; null = nothing.
function visualIcon(slot) {
  const cos = player.cosmetics && player.cosmetics[slot];
  if (cos) return cos;
  const it = equipped[slot];
  return it ? itemIcon(it) : null;
}

// ── CRAFTING MATERIALS ──
// A second class of currency beyond gold. Enemies drop these; each material has
// its own role rather than being a generic resource: Scrap is the bulk crafting
// material, Core the high-rarity crafting material, Glimmer the Enchanter's fuel,
// and Chaos Orbs the premium "top end" material (legendary crafts & big reforges).
// They live on player.materials and are saved with the player.
const CRAFT_MATERIALS = {
  scrap:   { emoji: '🔩', name: 'Scrap',     color: '#c0a06a', desc: 'Common. The bulk material for crafting any item.' },
  core:    { emoji: '🔆', name: 'Core',      color: '#ffb24b', desc: 'Rare. Needed to craft higher-rarity items.' },
  glimmer: { emoji: '✨', name: 'Glimmer',   color: '#7fd0ff', desc: 'The Enchanter\'s fuel for adding & rerolling modifiers.' },
  chaos:   { emoji: '🌀', name: 'Chaos Orb', color: '#c87bff', desc: 'Very rare. Powers legendary crafts & big reforges.' },
};
const CRAFT_MAT_KEYS = Object.keys(CRAFT_MATERIALS);

// A "cost" is a plain object like { gold, scrap, core, glimmer, chaos } (any
// subset). These three helpers let the Forge and Enchanter share one currency
// model for checking, spending, and labelling mixed gold+material prices.
function canAfford(cost) {
  if ((cost.gold || 0) > player.gold) return false;
  const m = player.materials || {};
  return CRAFT_MAT_KEYS.every(k => (cost[k] || 0) <= (m[k] || 0));
}
function spendCost(cost) {
  if (cost.gold) player.gold -= cost.gold;
  if (!player.materials) player.materials = freshMaterials();
  for (const k of CRAFT_MAT_KEYS) if (cost[k]) player.materials[k] = Math.max(0, (player.materials[k] || 0) - cost[k]);
}
function costLabel(cost) {
  const parts = [];
  if (cost.gold) parts.push(`${cost.gold}g`);
  for (const k of CRAFT_MAT_KEYS) if (cost[k]) parts.push(`${cost[k]}${CRAFT_MATERIALS[k].emoji}`);
  return parts.join('  ');
}
function freshMaterials() { return { scrap: 0, core: 0, glimmer: 0, chaos: 0 }; }
function gainMaterial(k, n) {
  if (!player.materials) player.materials = freshMaterials();
  player.materials[k] = (player.materials[k] || 0) + n;
}
// Compact inline display of all four material counts, used in the bag and town.
function matStripHTML() {
  const m = player.materials || {};
  const chips = CRAFT_MAT_KEYS.map(k =>
    `<span class="mat-chip" title="${CRAFT_MATERIALS[k].name} — ${CRAFT_MATERIALS[k].desc}" style="color:${CRAFT_MATERIALS[k].color}">${CRAFT_MATERIALS[k].emoji} ${m[k] || 0}</span>`
  ).join('');
  return `<div class="mat-strip">${chips}</div>`;
}
// Small badge marking player-forged gear so it always reads as crafted, on top
// of its normal rarity colour.
function craftedMark(item) {
  return item && item.crafted ? ' <span style="color:#7fd0ff;font-size:9px">🔨</span>' : '';
}

const PREFIXES = ['Ancient','Cursed','Blazing','Frozen','Runic','Shadow','Divine','Storm','Iron','Blood','Soul','Void'];
const SUFFIXES = ['of Power','of Doom','of the Fallen','of Light','of Ages','of Chaos','of the Ancients','of Fury'];

const FLAVOR = {

  epic:      ['Power radiates from within.','Whispers of forgotten gods.','Even dragons fear this.'],

  unique:    ['Only one exists. You found it.','The world trembles.','Destiny has chosen you.'],

// Gear stats. These are no longer the *only* source of these numbers — every one
// of them is now a derived player stat fed by attributes too (see derivedStat /
// the playerXxx helpers). CRITDMG (bonus crit damage %) is an equipment-only
// stat: nothing but gear raises it, so loot drives the crit-damage side of a build.
const STAT_NAMES = ['ATK','DEF','SPD','LCK','HP','MP','CRIT','CRITDMG','REGEN'];
// Friendly labels for stats in tooltips/the hero sheet (CRIT/CRITDMG read as %).
// LCK is a legacy gear stat (functions as bonus crit chance). It's labelled
// "Fortune" so it never reads as the new Luck *attribute*; it no longer rolls on
// new gear and survives only on older items.
const STAT_LABELS = { ATK:'Attack', DEF:'Defense', SPD:'Speed', LCK:'Fortune', HP:'Max HP',
  MP:'Max MP', CRIT:'Crit %', CRITDMG:'Crit Dmg %', REGEN:'Regen', DMG:'Damage' };
const HERO = '🧙';

// ── POWER & ATTRIBUTES ──
// Every equippable item has a single "power" number summarising how strong it is:
// each stat is worth a weighted amount, plus a flat bonus for its rarity tier.
// The player's overall power is built from their level, attributes, and gear.
const STAT_POWER_WEIGHTS = { ATK:3, DEF:2, SPD:2, LCK:2, HP:1, MP:1, CRIT:4, CRITDMG:1, REGEN:5, DMG:3 };
// Per-point power weight of a raised attribute carried on an item (e.g. +13 Might).
const ATTR_POWER_WEIGHT = 6;
// A small flat nudge per rarity — kept low on purpose so an item's power is
// driven mostly by its (item-level-scaled) stats. This is what lets a deep
// common eventually out-power an early legendary instead of the tier bonus
// permanently outranking it.
const TIER_POWER_BONUS = { junk:0, normal:1, uncommon:2, rare:4, epic:7, legendary:11, unique:16 };

// Hero attributes — the only thing you spend points on. Every class now starts
// with the SAME spread (ATTR_BASE in each) and differs only in how its points
// convert into power: each attribute feeds a family of derived stats (see
// derivedStat), and damage in particular scales off each class's primary/
// secondary attribute (see CLASSES[*].dmgAttrs). You earn a generous handful of
// points per level, and each point is correspondingly small, so the per-level
// power gain — and thus the difficulty curve — stays close to the old design.
const ATTRIBUTES = {
  might:    { label: '💪 Might',    short: 'MIG', desc: 'raises Attack power (most for Warrior & Rogue)' },
  vitality: { label: '❤️ Vitality', short: 'VIT', desc: 'raises max HP, Defense & HP regen' },
  agility:  { label: '🎯 Agility',  short: 'AGI', desc: 'raises Speed (dodge)' },
  spirit:   { label: '✨ Spirit',   short: 'SPR', desc: 'raises max MP, MP regen & spell power' },
  luck:     { label: '🍀 Luck',     short: 'LUK', desc: 'raises Crit chance & loot quality' },
};
const ATTR_KEYS = Object.keys(ATTRIBUTES);
// Every hero starts with this many points already in each attribute, so a fresh
// character has a real stat baseline rather than near-zero attributes.
const ATTR_BASE = 10;
// Points granted per level. Higher than the old 3 (paired with smaller per-point
// effects) so the power-per-level slope matches the old curve while giving more
// to spread across the five attributes.
const ATTR_POINTS_PER_LEVEL = 5;

// How one point in an attribute converts into each derived stat. Tuned so that
// dumping a level's worth of points (5) into one attribute grants roughly what
// the old design's 3 points did, keeping the difficulty curve intact. Damage is
// NOT here — it scales per class via CLASSES[*].dmgAttrs and ATTR_DMG_*.
const ATTR_FX = {
  atkPerMight:   0.6,    // Might → flat Attack power for EVERY class (see attrDamage)
  hpPerVit:      11,     // Vitality → max HP
  defPerVit:     0.5,    // Vitality → Defense
  hpRegenPerVit: 0.16,   // Vitality → HP regen / turn
  mpPerSpr:      6,      // Spirit → max MP
  mpRegenPerSpr: 0.16,   // Spirit → MP regen / turn
  spellPerSpr:   3,      // Spirit → spell skill power (Firebolt/Mend)
  dodgePerAgi:   0.0072, // Agility → dodge chance
  critPerLuck:   0.009,  // Luck → crit chance
};
// Damage scaling off the class's primary / secondary attribute (per point).
const ATTR_DMG_PRIMARY   = 2.4;
const ATTR_DMG_SECONDARY = 0.8;
// A fresh attribute block — every attribute starts at ATTR_BASE. Used for new
// heroes, respecs (reset to base), and migrating older saves.
function baseAttributes() {
  const a = {};
  for (const k of ATTR_KEYS) a[k] = ATTR_BASE;
  return a;
}
// Points the player has actually spent (everything above the starting ATTR_BASE).
// This is what a respec refunds — the base block is never given back.
function spentAttrPoints() {
  return ATTR_KEYS.reduce((s, k) => s + Math.max(0, (player.attributes?.[k] || 0) - ATTR_BASE), 0);
}

// ── DEPTH THREAT ──
// The single most important difficulty lever: enemy power keeps climbing with
// depth. On top of the linear (per-floor) base stats, every floor multiplies
// enemy HP and damage by a growing factor.
//
// This curve is *polynomial*, not exponential — a deliberate choice. It starts
// gentle (an easy on-ramp), rises forever so every floor is strictly harder
// than the last, but grows slowly enough that the player's (linear) level,
// attribute, and gear growth can always catch up with enough grinding. The gap
// you must close keeps widening, so it gets harder and harder to push the next
// floor — but there is intentionally NO hard wall: a pure exponential curve
// would eventually outrun any possible build and make some floor mathematically
// impossible, whereas this one stays beatable at every depth given the effort.
//   floor 1 → 1.0x   floor 10 → ~1.9x   floor 20 → ~3.3x   floor 30 → ~4.8x
//   floor 50 → ~8x   floor 100 → ~18x   (keeps rising, no ceiling)
function depthThreat(level) {
  // 1 + (depth-1)^1.2 / 15 — gentle start, steady polynomial climb, no cap.
  const d = Math.max(0, (level || 1) - 1);
  return 1 + Math.pow(d, 1.2) / 15;
}

// Total power of a single item: weighted sum of its stats + a rarity bonus.
function itemPower(item) {
  if (!item || !item.stats) return 0;
  let p = 0;
  for (const [k, v] of Object.entries(item.stats)) {
    if (k === 'DMG') {
      const [lo, hi] = String(v).split('-').map(Number);
      p += ((lo + hi) / 2) * STAT_POWER_WEIGHTS.DMG;
    } else if (typeof v === 'number') {
      p += v * (STAT_POWER_WEIGHTS[k] || 1);
    }
  }
  // Attribute affixes (+Might, +Luck, …) add to an item's power too.
  if (item.attrs) for (const v of Object.values(item.attrs)) {
    if (typeof v === 'number') p += v * ATTR_POWER_WEIGHT;
  }
  p += TIER_POWER_BONUS[item.tier] || 0;
  return Math.max(0, Math.round(p));
}

// Effective value of an attribute: the points spent (including the ATTR_BASE
// every hero starts with) plus any bonus carried on equipped gear (+13 Might,
// etc.). This — not the raw spent value — is what every derived stat reads.
function totalAttr(key) {
  let sum = (player.attributes?.[key] || 0);
  for (const slot of SLOT_KEYS) {
    const it = equipped[slot];
    if (it && it.attrs && typeof it.attrs[key] === 'number') sum += it.attrs[key];
  }
  return sum;
}

// The primary/secondary attributes a class deals damage with. Classless heroes
// (legacy saves mid-prompt) fall back to Might.
function classDmgAttrs() {
  const cls = playerClass();
  return (cls && cls.dmgAttrs) || { primary: 'might', secondary: null };
}
// Bonus attack damage contributed by the class's damage attributes — plus a
// small universal Might bonus so no class ever has a fully dead attribute.
function attrDamage() {
  const { primary, secondary } = classDmgAttrs();
  let d = totalAttr(primary) * ATTR_DMG_PRIMARY;
  if (secondary) d += totalAttr(secondary) * ATTR_DMG_SECONDARY;
  // Might always lends a little raw Attack power to EVERY class. Classes that
  // already scale damage off Might (Warrior primary / Rogue secondary) get far
  // more from it above, so this only matters when Might is otherwise off-class
  // (Mage, Templar) — there it's a weak-but-real contribution instead of zero.
  if (primary !== 'might' && secondary !== 'might') d += totalAttr('might') * ATTR_FX.atkPerMight;
  return d;
}
// Crit damage multiplier — equipment-only beyond the base, so gear (CRITDMG)
// drives how hard your crits land. Crit damage can swing freely up or down, but
// the multiplier never drops below 0 (no stat should ever read negative).
function critDamageMult() { return Math.max(0, 2.0 + totalStat('CRITDMG') / 100); }

// The player's overall power: a blend of level, spent attributes, and equipped gear.
function playerPower() {
  let p = player.level * 10;
  for (const slot of SLOT_KEYS) if (equipped[slot]) p += itemPower(equipped[slot]);
  const spent = ATTR_KEYS.reduce((s, k) => s + (player.attributes?.[k] || 0), 0);
  p += spent * 3;
  return Math.round(p);
}

// Max HP/MP are derived from level + attributes so the formula stays consistent
// across level ups, attribute spends, and loading an older save. Vitality drives
// HP and Spirit drives MP (each via ATTR_FX), and gear HP/MP add on top.
function baseMaxHp() {
  let hp = player.level*8 + totalAttr('vitality') * ATTR_FX.hpPerVit + totalStat('HP');
  if (player.class === 'templar') hp = hp * 1.20; // Templar: hardier body
  return Math.max(1, Math.round(hp));
}
function baseMaxMp() {
  let mp = player.level*4 + totalAttr('spirit') * ATTR_FX.mpPerSpr + totalStat('MP');
  if (player.class === 'mage') mp = mp * 1.30; // Mage: deeper mana pool
  return Math.max(0, Math.round(mp));
}

// Total Defense: gear DEF plus a contribution from Vitality.
function playerDefense() {
  return totalStat('DEF') + totalAttr('vitality') * ATTR_FX.defPerVit;
}

// Crit chance — driven by Luck (and gear CRIT/LCK). Crit chance only ever ranges
// 0–100% in play, so it's clamped to [0%, 60%]: capped so you can't become a
// guaranteed-crit machine, and floored at 0 so a cursed item can never push it
// negative (no stat should ever read below 0).
function playerCritChance() {
  const rogueCrit = player.class === 'rogue' ? 0.08 : 0;
  return Math.max(0, Math.min(0.6, 0.04 + rogueCrit
    + (totalStat('CRIT') + totalStat('LCK')) * 0.01
    + totalAttr('luck') * ATTR_FX.critPerLuck));
}

// Chance to completely avoid an incoming hit, driven by Agility and gear SPD.
// Capped so you can never become untouchable — depth threat still outpaces it.
function playerDodge() {
  const base = totalAttr('agility') * ATTR_FX.dodgePerAgi + totalStat('SPD') * 0.006;
  // Rogues are slipperier: a flat dodge bump and a slightly higher ceiling.
  if (player.class === 'rogue') return Math.min(0.45, base + 0.08);
  return Math.min(0.35, base);
}
function recomputeMaxStats() {
  player.maxHp = baseMaxHp();
  player.maxMp = baseMaxMp();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  if (player.mp > player.maxMp) player.mp = player.maxMp;
}

// Per-turn HP/MP regeneration. Defined here as the single source of truth so the
// Stats panel can display the exact value applyRegen() applies each turn.
function hpRegenPerTurn() {
  let r = totalStat('REGEN') + Math.floor(totalAttr('vitality') * ATTR_FX.hpRegenPerVit);
  if (player.class === 'templar') r += 2; // Templar mends faster between fights
  return r;
}
function mpRegenPerTurn() {
  return 1 + Math.floor(totalAttr('spirit') * ATTR_FX.mpRegenPerSpr);
}

  return (enemies || []).filter(e => !e.dead && !e.isGoblin).length;

// A short, themed description of what bars the stairs on this floor.
function clearConditionLabel() {
  const n = hostilesRemaining();
  if (dungeonLevel % 5 === 0) return 'Slay the floor guardian and its minions to descend.';
  if (n === 0) return 'The way down is already open.';
  return `Defeat all ${n} foes on this floor to unseal the stairs down.`;
}

function rollFloorMod() {
  // First two floors are always normal so players learn the ropes.
  if (dungeonLevel <= 2) { floorMod = FLOOR_MODS[0]; return; }
  // The deeper you go, the less often a floor is plain — danger creeps in.
  const calmChance = Math.max(0.3, 0.6 - dungeonLevel * 0.015);
  if (Math.random() < calmChance) { floorMod = FLOOR_MODS[0]; return; }
  // Nightmare floors are a rare spike that grows slightly more common with
  // depth — the "you just can't clear this yet" moments the dungeon needs.
  const nightmareChance = Math.min(0.22, 0.04 + dungeonLevel * 0.012);
  if (dungeonLevel >= 6 && Math.random() < nightmareChance) {
    floorMod = FLOOR_MODS[FLOOR_MODS.length - 1];
    return;
  }
  // Otherwise a random non-nightmare theme.
  floorMod = pick(FLOOR_MODS.slice(1, FLOOR_MODS.length - 1));
}

// AUDIO  (sound effects + background music)
// ══════════════════════════════════════════
// Everything here is synthesized live with the Web Audio API — no asset files —
// so the game stays a single self-contained, trivially shareable HTML file.
// The whole module is defensive: if audio is unavailable for any reason, the
// game keeps running silently rather than throwing.
const AUDIO_KEY = 'dungeonLootAudio';
const audio = {
  ctx: null, master: null, musicGain: null, sfxGain: null,
  muted: false, started: false,
};
try { audio.muted = localStorage.getItem(AUDIO_KEY) === 'off'; } catch (e) {}

// Lazily create the AudioContext and the gain graph (master → sfx / music).
function audioInit() {
  if (audio.ctx) return audio.ctx;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    audio.ctx = new AC();
    audio.master = audio.ctx.createGain();
    audio.master.gain.value = audio.muted ? 0 : 0.9;
    audio.master.connect(audio.ctx.destination);
    audio.sfxGain = audio.ctx.createGain();
    audio.sfxGain.gain.value = 0.6;
    audio.sfxGain.connect(audio.master);
    audio.musicGain = audio.ctx.createGain();
    audio.musicGain.gain.value = 0.22;
    audio.musicGain.connect(audio.master);
  } catch (e) { audio.ctx = null; }
  return audio.ctx;
}

// Browsers block audio until a user gesture — call this from the first input to
// resume the context and kick off the looping background music.
function audioUnlock() {
  const ctx = audioInit();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} }
  if (!audio.started) { audio.started = true; startMusic(); }
}

// A single shaped blip — the building block for every sound effect.
function tone(freq, dur, when, type = 'square', vol = 0.5, slideTo = null) {
  const ctx = audio.ctx;
  if (!ctx) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, when);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), when + dur);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(vol, when + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
  o.connect(g); g.connect(audio.sfxGain);
  o.start(when); o.stop(when + dur + 0.02);
}

// A burst of decaying white noise — used for impacts, traps, and death.
function noise(dur, when, vol = 0.4) {
  const ctx = audio.ctx;
  if (!ctx) return;
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(audio.sfxGain);
  src.start(when); src.stop(when + dur);
}

// Named sound effects, each keyed to a game event.
function sfx(name) {
  if (audio.muted) return;
  const ctx = audioInit();
  if (!ctx || ctx.state === 'suspended') return;
  const t = ctx.currentTime;
  switch (name) {
    case 'attack':  tone(220, 0.09, t, 'square', 0.4, 140); noise(0.05, t, 0.16); break;
    case 'crit':    tone(330, 0.13, t, 'sawtooth', 0.5, 660); tone(660, 0.13, t + 0.02, 'square', 0.3); noise(0.09, t, 0.25); break;
    case 'hurt':    tone(200, 0.18, t, 'sawtooth', 0.45, 70); break;
    case 'kill':    tone(160, 0.18, t, 'square', 0.4, 50); noise(0.16, t, 0.28); break;
    case 'boss':    tone(90, 0.5, t, 'sawtooth', 0.5, 40); tone(120, 0.5, t + 0.05, 'square', 0.3, 55); noise(0.3, t, 0.2); break;
    case 'loot':    [523, 659, 784].forEach((f, i) => tone(f, 0.1, t + i * 0.06, 'square', 0.4)); break;
    case 'gold':    tone(880, 0.06, t, 'square', 0.35); tone(1175, 0.07, t + 0.05, 'square', 0.3); break;
    case 'potion':  tone(440, 0.1, t, 'sine', 0.4, 880); tone(660, 0.12, t + 0.08, 'sine', 0.3, 990); break;
    case 'levelup': [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.16, t + i * 0.09, 'square', 0.45)); break;
    case 'stairs':  [392, 330, 262].forEach((f, i) => tone(f, 0.14, t + i * 0.08, 'triangle', 0.4)); break;
    case 'shrine':  tone(523, 0.4, t, 'sine', 0.35, 784); tone(659, 0.4, t + 0.04, 'sine', 0.25, 988); break;
    case 'equip':   tone(330, 0.05, t, 'square', 0.3); tone(494, 0.07, t + 0.04, 'square', 0.3); break;
    case 'buy':     tone(659, 0.07, t, 'square', 0.35); tone(988, 0.09, t + 0.06, 'square', 0.3); break;
    case 'sell':    tone(494, 0.07, t, 'square', 0.35); tone(740, 0.08, t + 0.05, 'square', 0.3); break;
    case 'death':   tone(330, 0.6, t, 'sawtooth', 0.5, 55); noise(0.5, t, 0.25); break;
    case 'trap':    noise(0.3, t, 0.4); tone(140, 0.3, t, 'sawtooth', 0.4, 60); break;
    case 'click':   tone(660, 0.04, t, 'square', 0.22); break;
  }
}

// ── Background music ──
// A looping minor-key dungeon theme: a wandering lead over a steady bass,
// scheduled a fraction of a second ahead of the playhead so it never glitches.
let musicTimer = null, musicStep = 0, musicNext = 0;
const MUSIC_TEMPO = 0.26;   // seconds per eighth-note step (~115 BPM feel)
// Frequencies in Hz; 0 = a rest. The lead wanders an A-minor scale.
const MUSIC_LEAD = [
  440, 523, 587, 659, 587, 523, 440, 392,
  440, 523, 659, 587, 523, 440, 392, 330,
  392, 440, 523, 440, 587, 523, 440, 330,
  440, 392, 330, 392, 440, 523, 587, 659,
];
const MUSIC_BASS = [
  110, 0, 165, 0, 110, 0, 147, 0,
  110, 0, 165, 0, 98, 0, 131, 0,
];
function musicTone(freq, dur, when, type, vol) {
  const ctx = audio.ctx;
  if (!ctx) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, when);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(vol, when + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
  o.connect(g); g.connect(audio.musicGain);
  o.start(when); o.stop(when + dur + 0.02);
}
function scheduleMusic() {
  const ctx = audio.ctx;
  if (!ctx || audio.muted || ctx.state === 'suspended') return;
  // Schedule every step that falls inside the next 0.2s look-ahead window.
  while (musicNext < ctx.currentTime + 0.2) {
    const lead = MUSIC_LEAD[musicStep % MUSIC_LEAD.length];
    const bass = MUSIC_BASS[musicStep % MUSIC_BASS.length];
    if (lead) musicTone(lead, MUSIC_TEMPO * 0.9, musicNext, 'triangle', 0.5);
    if (bass) musicTone(bass, MUSIC_TEMPO * 1.8, musicNext, 'square', 0.32);
    musicStep++;
    musicNext += MUSIC_TEMPO;
  }
}
function startMusic() {
  const ctx = audioInit();
  if (!ctx) return;
  musicNext = ctx.currentTime + 0.1;
  if (musicTimer) clearInterval(musicTimer);
  musicTimer = setInterval(scheduleMusic, 60);
  scheduleMusic();
}

// Toggle all audio on/off, persist the choice, and refresh the button.
function toggleSound() {
  audio.muted = !audio.muted;
  try { localStorage.setItem(AUDIO_KEY, audio.muted ? 'off' : 'on'); } catch (e) {}
  if (audio.master) audio.master.gain.value = audio.muted ? 0 : 0.9;
  if (!audio.muted) { audioUnlock(); sfx('click'); }
  updateSoundButton();
}
function updateSoundButton() {
  const ic = document.getElementById('sound-icon');
  const lbl = document.getElementById('sound-label');
  if (ic) ic.textContent = audio.muted ? '🔇' : '🔊';
  if (lbl) lbl.textContent = audio.muted ? 'OFF' : 'ON';
  const btn = document.querySelector('.sound-action');
  if (btn) btn.classList.toggle('muted', audio.muted);
}
