  // Rarely the chest is a Mimic — it springs to life and attacks.
  if (Math.random() < 0.10) {
    const mLevel = dungeonLevel + 1;
    const mThreat = depthThreat(mLevel);
    const hp = Math.round((16 + mLevel * 9) * mThreat * 2.4);
    const dmg = Math.round((5 + mLevel * 2.1) * mThreat * 1.4);
    // Find an open tile next to the player for the mimic to lunge from.
    let placed = false;
    const spots = [[1,0],[-1,0],[0,1],[0,-1]].sort(() => Math.random() - 0.5);
    for (const [ox, oy] of spots) {
      const mx = player.x + ox, my = player.y + oy;
      if (mx>=0 && my>=0 && mx<MAP_W && my<MAP_H && mapData[my][mx]===0 && !getEnemyAt(mx,my)) {
        enemies.push({ x: mx, y: my, hp, maxHp: hp, dmg, type: '🧰', name: 'Mimic', level: mLevel, dead: false, isElite: true });
        placed = true; break;
      }
    }
    if (!placed) {
      // No room to spawn — it just bites you on the spot instead.
      const bite = mitigateDamage(dmg, mLevel);
      player.hp = Math.max(1, player.hp - bite);
      spawnFloatingText(player.x, player.y, `${bite}`, '#ff3344');
    }
    sfx('trap');
    log('🧰 It\'s a MIMIC! The chest lunges at you!', 'important');
    screenFlash('#cc0000');
    updateBars();
    saveGame();
    draw();
    return;
  }

  // Very small chance the chest is trapped.
  if (Math.random() < 0.07) {
    sfx('trap');
    if (Math.random() < 0.5) {
      const dmg = 4 + dungeonLevel * 2;
      player.hp = Math.max(1, player.hp - dmg);
      spawnFloatingText(player.x, player.y, `${dmg}`, '#ff3344');
      log(`💥 It was a trapped chest! It explodes for ${dmg} damage!`, 'important');
    } else {
      applyStatusEffect('player', 'poison', 3, null);
      log('☠️ A trapped chest bursts with poison gas!', 'important');
    }
    updateBars();
    saveGame();
    draw();
    return;
  }

  // Otherwise it rolls fresh loot when opened — luckier chests roll richer.
  const luck = chest.luck || 1;
  collectChestLoot(luck, chest.ilvl || dungeonLevel, chest.x, chest.y);
  renderPanel();
  saveGame();
  draw();
}

// XP needed to advance FROM a given level. Quadratic, so leveling slows sharply
// as you climb: a level is now a rare milestone, not something you trip over
// every few kills. Combined with kill XP that only scales linearly with depth,
// this means you can't out-level the dungeon — depth always pulls ahead.
//   Lv1→2: 150   Lv5→6: 1,310   Lv10→11: 4,560   Lv20→21: 17,060
function xpForLevel(level) {
  return Math.round(40 * level * level + 50 * level + 60);
}

function checkLevelUp() {
  const needed = xpForLevel(player.level);
  if (player.xp >= needed) {
    player.xp -= needed;
    player.level++;
    player.attrPoints = (player.attrPoints || 0) + ATTR_POINTS_PER_LEVEL;
    recomputeMaxStats();        // level grants more base HP/MP
    player.hp = player.maxHp;   // a level up fully restores you
    player.mp = player.maxMp;
    sfx('levelup');
    showLevelUpBanner(player.level);
    log(`⭐ LEVEL UP! You are now level ${player.level}!`, 'important');
    log(`💠 +${ATTR_POINTS_PER_LEVEL} attribute points — open the 🎒 bag's HERO tab to spend them.`, 'important');
    updateBars();
    renderPanel();
    saveGame();
    // Recurse in case multiple levels were gained from one big XP haul.
    checkLevelUp();
  }
}

// Spend one earned point to permanently raise a hero attribute.
function spendAttr(key) {
  if (!ATTRIBUTES[key]) return;
  if (!player.attrPoints || player.attrPoints <= 0) { log('No attribute points to spend.'); return; }
  if (!player.attributes) player.attributes = baseAttributes();
  player.attributes[key] = (player.attributes[key] || 0) + 1;
  player.attrPoints--;
  // Raising Vitality/Spirit immediately grants the extra HP/MP it unlocks.
  if (key === 'vitality') { const before = player.maxHp; recomputeMaxStats(); player.hp += (player.maxHp - before); }
  else if (key === 'spirit') { const before = player.maxMp; recomputeMaxStats(); player.mp += (player.maxMp - before); }
  log(`${ATTRIBUTES[key].label} raised to ${player.attributes[key]}.`, 'loot');
  updateBars();
  renderPanel();
  saveGame();
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════

function updateBars() {
  document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100)+'%';
  document.getElementById('hp-text').textContent = `${player.hp}/${player.maxHp}`;
  document.getElementById('mp-bar').style.width = (player.mp/player.maxMp*100)+'%';
  document.getElementById('mp-text').textContent = `${player.mp}/${player.maxMp}`;
  document.getElementById('gold-count').textContent = player.gold;

  // Header HUD: current floor, level + XP progress, enemies remaining.
  const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  setText('floor-num', dungeonLevel);
  setText('level-num', player.level);
  const xpBar = document.getElementById('xp-bar');
  if (xpBar) xpBar.style.width = Math.min(100, player.xp / xpForLevel(player.level) * 100) + '%';
  setText('enemies-num', (enemies || []).filter(e => !e.dead).length);
  // Seal indicator: 🔒 while hostiles block the exit, 🔓 once the floor is clear.
  const clearEl = document.getElementById('clear-status');
  if (clearEl) clearEl.textContent = floorCleared ? '🔓' : '🔒';
  setText('power-num', playerPower());

  // Active mystic pact indicator (hidden when no pact is in effect).
  const pactHud = document.getElementById('pact-hud');
  if (pactHud) {
    if (pact) {
      pactHud.style.display = '';
      pactHud.firstChild.textContent = pact.icon + ' ';
      setText('pact-num', pact.floors);
      pactHud.title = `${pact.name} — ${pact.floors} floor${pact.floors === 1 ? '' : 's'} left`;
    } else {
      pactHud.style.display = 'none';
    }
  }

  // Nudge the HERO tab when there are unspent attribute points to spend.
  const pts = player.attrPoints || 0;
  const heroTab = document.getElementById('tab-hero');
  if (heroTab) {
    heroTab.textContent = pts > 0 ? `HERO (${pts})` : 'HERO';
    heroTab.classList.toggle('has-points', pts > 0);
  }
  // The HERO tab glow only shows once the bag is open, so also surface a
  // pulsing badge on the always-visible BAG button as a persistent reminder.
  const bagBadge = document.getElementById('bag-points-badge');
  if (bagBadge) {
    bagBadge.textContent = pts;
    bagBadge.classList.toggle('show', pts > 0);
  }

  const healLabel = document.getElementById('heal-label');
  const healBtn = document.querySelector('.heal-btn');
  if (healLabel) healLabel.textContent = player.healPotions || 0;
  if (healBtn) {
    healBtn.classList.toggle('empty', !player.healPotions);
    // Pulse the heal button when you're hurt and actually have a potion to use.
    healBtn.classList.toggle('urgent', player.healPotions > 0 && player.hp < player.maxHp * 0.35);
  }
  // Class-skill button: shows the skill icon, and its cooldown / mana cost.
  const skillBtn = document.getElementById('skill-btn');
  if (skillBtn) {
    const cls = playerClass();
    if (cls && cls.skill) {
      const sk = cls.skill;
      skillBtn.style.display = '';
      const icon = document.getElementById('skill-icon');
      const label = document.getElementById('skill-label');
      if (icon) icon.textContent = sk.icon;
      const cd = player.skillCd || 0;
      const ready = cd === 0 && player.mp >= sk.mp && !inTown;
      if (label) label.textContent = cd > 0 ? `${cd}` : `${sk.mp}MP`;
      skillBtn.title = `${sk.name} — ${sk.desc} (${sk.mp} MP, ${sk.cd}-turn cooldown) · press R`;
      skillBtn.classList.toggle('disabled', !ready);
      skillBtn.classList.toggle('ready', ready && player.hp > 0);
    } else {
      skillBtn.style.display = 'none';
    }
  }

  // Red vignette warns when health is critical.
  const vig = document.getElementById('low-hp-vignette');
  if (vig) vig.classList.toggle('active', player.hp > 0 && player.hp < player.maxHp * 0.25);
}

// Health potions restore a percentage of max HP, so they scale with you
// instead of becoming useless at high levels.
const HEAL_PERCENT = 0.30;
function healPotionAmount() { return Math.max(1, Math.round(player.maxHp * HEAL_PERCENT)); }
function useHealthPotion() {
  if (!player.healPotions) { log('No health potions! Buy some from a merchant.'); return; }
  if (player.hp >= player.maxHp) { log('Already at full health.'); return; }
  player.healPotions--;
  const heal = Math.min(player.maxHp - player.hp, healPotionAmount());
  player.hp += heal;
  sfx('potion');
  log(`❤️ Drank a ${logPotion('Health Potion')}. +${heal} HP (${player.healPotions} left)`, 'loot');
  updateBars();
  saveGame();
}

const MANA_AMOUNT = 40;
function useManaPotion() {
  if (!player.manaPotions) { log('No mana potions! Buy some from a merchant or the healer.'); return; }
  if (player.mp >= player.maxMp) { log('Already at full mana.'); return; }
  player.manaPotions--;
  player.mp = Math.min(player.maxMp, player.mp + MANA_AMOUNT);
  sfx('potion');
  log(`🔷 Drank a ${logPotion('Mana Potion')}. +${MANA_AMOUNT} MP (${player.manaPotions} left)`, 'loot');
  updateBars();
  saveGame();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-inv').classList.toggle('active', tab==='inv');
  document.getElementById('tab-equip').classList.toggle('active', tab==='equip');
  document.getElementById('tab-hero').classList.toggle('active', tab==='hero');
  renderPanel();
}

function renderPanel() {
  const el = document.getElementById('panel-content');
  if (currentTab === 'inv') {
    const strip = matStripHTML();
    if (inventory.length === 0) {
      el.innerHTML = strip + '<div id="empty-panel">No items yet.<br>Explore!</div>';
      return;
    }
    // Sort the displayed list by slot (head, chest, hands, …) while keeping each
    // row's original inventory index so equip/select still target the right item.
    const slotOrder = {};
    SLOT_KEYS.forEach((s, idx) => { slotOrder[s] = idx; });
    const rows = inventory
      .map((item, i) => ({ item, i }))
      .sort((a, b) => {
        const oa = a.item.slot in slotOrder ? slotOrder[a.item.slot] : 99;
        const ob = b.item.slot in slotOrder ? slotOrder[b.item.slot] : 99;
        return oa - ob;
      });
    el.innerHTML = strip + rows.map(({ item, i }) => {
      const equipable = !!item.slot;
      const slotName = item.slot ? SLOTS[item.slot].label.replace(/^\S+\s/, '') : 'potion';
      // Compare this item's power to whatever currently fills its slot, so we can
      // flag upgrades and show the power swing (▲+5 / ▼-2).
      const ip = equipable ? itemPower(item) : 0;
      const equippedHere = equipable ? equipped[item.slot] : null;
      const delta = equipable ? ip - (equippedHere ? itemPower(equippedHere) : 0) : 0;
      const isUpgrade = equipable && delta > 0;
      let deltaTag = '';
      if (equippedHere) {
        const basePower = itemPower(equippedHere);
        const c = delta > 0 ? '#5ee08a' : (delta < 0 ? '#e0556b' : '#888');
        const arrow = delta > 0 ? '▲' : (delta < 0 ? '▼' : '=');
        // Show the swing as a percentage so it matches the compare tooltip.
        const pct = basePower > 0 ? Math.round(delta / basePower * 100) : 100;
        deltaTag = ` <span style="color:${c}">${arrow}${delta>0?'+':''}${pct}%</span>`;
      }
      const pwr = equipable ? `<span class="item-power">⚡${ip}${deltaTag}</span>` : '';
      return `
      <div class="loot-item item-${item.tier} ${selectedItem===i?'selected':''} ${isUpgrade?'upgrade':''}">
        <span class="loot-icon">${iconMarkup(itemIcon(item), tierColor(item))}</span>
        <div class="loot-info" onclick="selectItem(${i}, this)"
             onmouseenter="showTooltip(event,${i})" onmouseleave="hideTooltip()">
          <div class="item-name">${isUpgrade?'<span class="up-arrow">▲</span> ':''}${item.name}${craftedMark(item)}</div>
          <div class="item-type">${slotName}${pwr}</div>
        </div>
        ${equipable
          ? (canEquipItem(item)
              ? `<button class="row-btn equip-row-btn ${isUpgrade?'upgrade-btn':''}" onclick="quickEquip(${i})">${equippedHere && isUpgrade?'SWAP':'EQUIP'}</button>`
              : `<button class="row-btn locked-row-btn" title="Your class can't wield this weapon" onclick="quickEquip(${i})">🔒</button>`)
          : ''}
      </div>`;
    }).join('');
  } else if (currentTab === 'equip') {
    el.innerHTML = SLOT_KEYS.map(s => renderSlot(s, SLOTS[s].label)).join('') +
      `<div style="margin-top:8px;font-size:10px;color:#555">Tap EQUIP on any loot<br>item to gear up.</div>` +
      renderCosmetics();
  } else {
    renderHero(el);
  }
}

// HERO tab: overall power, derived stats, and the attributes you can raise.
function renderHero(el) {
  const pts = player.attrPoints || 0;
  const gearPower = SLOT_KEYS.reduce((s, k) => s + (equipped[k] ? itemPower(equipped[k]) : 0), 0);
  const dmgA = classDmgAttrs();
  // Each attribute row shows base+spent plus any gear bonus, tags the class's
  // damage attributes, and offers a + to raise it.
  const rows = ATTR_KEYS.map(key => {
    const at = ATTRIBUTES[key];
    const own = player.attributes?.[key] || 0;
    const gear = totalAttr(key) - own;
    const tag = key === dmgA.primary ? ' <span style="color:#ffd24b">★dmg</span>'
              : key === dmgA.secondary ? ' <span style="color:#c8a84b">☆dmg</span>' : '';
    const gearStr = gear ? ` <span style="color:#5ee08a">+${gear}</span>` : '';
    return `<div class="attr-row">
      <div class="attr-info">
        <div class="attr-name">${at.label}${tag}</div>
        <div class="attr-desc">${at.desc}</div>
      </div>
      <span class="attr-val">${own}${gearStr}</span>
      <button class="attr-plus" ${pts > 0 ? '' : 'disabled'} onclick="spendAttr('${key}')">+</button>
    </div>`;
  }).join('');
  // Derived combat stats so the player can see what their attributes/gear produce.
  const stat = (label, val) => `<div class="hc-line" style="display:flex;justify-content:space-between"><span style="opacity:0.8">${label}</span><b>${val}</b></div>`;
  const derived = `<div class="hero-class" style="border-color:#445">
      <div class="hc-head"><span class="hc-name">📊 Stats</span></div>
      ${stat('⚔️ Attack power', Math.round(totalStat('ATK') + attrDamage()))}
      ${stat('🛡 Defense', Math.round(playerDefense()))}
      ${stat('❤️ Max HP', player.maxHp)}
      ${stat('✨ Max MP', player.maxMp)}
      ${stat('💚 HP regen', '+' + hpRegenPerTurn() + '/turn')}
      ${stat('🔷 MP regen', '+' + mpRegenPerTurn() + '/turn')}
      ${stat('🎯 Crit chance', Math.round(playerCritChance()*100) + '%')}
      ${stat('💥 Crit damage', Math.round(critDamageMult()*100) + '%')}
      ${stat('💨 Dodge', Math.round(playerDodge()*100) + '%')}
    </div>`;
  const cls = playerClass();
  const classBlock = cls ? `
    <div class="hero-class" style="border-color:${cls.color}">
      <div class="hc-head"><span class="hc-icon">${cls.icon}</span>
        <span class="hc-name" style="color:${cls.color}">${cls.name}</span></div>
      <div class="hc-line">${cls.passive}</div>
      <div class="hc-line">⚔️ Damage scales with <b>${ATTRIBUTES[dmgA.primary].label}</b>${dmgA.secondary ? ` & ${ATTRIBUTES[dmgA.secondary].label}` : ''}</div>
      <div class="hc-line">${cls.skill.icon} <b>${cls.skill.name}</b> — ${cls.skill.desc} <span style="opacity:0.7">(${cls.skill.mp} MP)</span></div>
      <div class="hc-line" style="opacity:0.75">Weapons: ${cls.weapons.join(', ')}</div>
      <div class="hc-line" style="opacity:0.6">Change class at the town Trainer 🎓</div>
    </div>` : '';
  el.innerHTML = `
    <div class="hero-power">
      <div class="hp-label">⚡ POWER</div>
      <div class="hp-value">${playerPower()}</div>
    </div>
    <div class="hero-sub">Level ${player.level} · ${gearPower} from gear</div>
    ${classBlock}
    ${derived}
    <div class="hero-points">${pts > 0 ? `${pts} point${pts>1?'s':''} to spend!` : 'No points to spend — level up for more.'}</div>
    ${rows}`;
}

// ── CLASS SELECTION ──
// The mandatory pick shown on a new game (and once for saves that predate
// classes). Building the cards from CLASSES keeps it in sync with the data.
function showClassPick() {
  const ov = document.getElementById('class-overlay');
  const sub = document.getElementById('class-sub');
  const cards = document.getElementById('class-cards');
  if (!ov) return;
  sub.textContent = 'Pick a class — it shapes which attributes your damage scales off, the weapons you can wield, and the special skill you cast. You can retrain later at the town Trainer.';
  cards.innerHTML = CLASS_KEYS.map(k => {
    const c = CLASSES[k];
    return `<button class="class-card" style="border-left-color:${c.color}" onclick="chooseClass('${k}')">
      <div class="cc-head"><span class="cc-icon">${c.icon}</span><span class="cc-name" style="color:${c.color}">${c.name}</span></div>
      <div class="cc-blurb">${c.blurb}</div>
      <div class="cc-detail">Passive: ${c.passive}<br>${c.skill.icon} ${c.skill.name}: ${c.skill.desc}<br>Weapons: ${c.weapons.join(', ')}</div>
    </button>`;
  }).join('');
  ov.classList.add('open');
}

// Lock in a class from the new-game pick. All classes start with the same
// attributes (ATTR_BASE in each) — class identity comes from how those points
// scale into damage (dmgAttrs), not a starting stat bias.
function chooseClass(key) {
  const cls = CLASSES[key];
  if (!cls) return;
  player.class = key;
  player.skillCd = 0;
  recomputeMaxStats();
  player.hp = player.maxHp;
  player.mp = player.maxMp;
  revalidateWeapon(cls);
  const ov = document.getElementById('class-overlay');
  if (ov) ov.classList.remove('open');
  log(`${cls.icon} You are a ${cls.name}! ${cls.passive}. Skill: ${cls.skill.icon} ${cls.skill.name} — press R to cast.`, 'important');
  sfx('levelup');
  updateBars(); renderPanel(); draw(); saveGame();
}

// If the (new) class can't wield the equipped weapon, stow it in the bag.
function revalidateWeapon(cls) {
  if (equipped.weapon && !canEquipItem(equipped.weapon)) {
    log(`🔒 You stow the ${equipped.weapon.name} — a ${cls.name} can't wield it.`);
    inventory.push(equipped.weapon);
    equipped.weapon = null;
  }
}

// Retraining at the town Trainer: change class for gold. Attributes are kept.
function classChangeCost() { return 80 + (player.maxFloor || 1) * 10; }
function changeClass(key) {
  const cls = CLASSES[key];
  if (!cls || player.class === key) return;
  const cost = classChangeCost();
  if (player.gold < cost) { log('Not enough gold to retrain.'); return; }
  player.gold -= cost;
  player.class = key;
  player.skillCd = 0;
  recomputeMaxStats();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  if (player.mp > player.maxMp) player.mp = player.maxMp;
  revalidateWeapon(cls);
  sfx('shrine');
  log(`${cls.icon} You retrain as a ${cls.name}! Skill: ${cls.skill.icon} ${cls.skill.name}.`, 'important');
  updateBars(); renderPanel(); renderTrainer(); draw(); saveGame();
}

function renderSlot(slot, label) {
  const item = equipped[slot];
  return `<div class="equip-slot">
    <div class="slot-info" onclick="tapSlot('${slot}', this)"
         onmouseenter="hoverSlot(event,'${slot}')" onmouseleave="hideTooltip()">
      <span class="slot-label">${label}</span>
      <span class="loot-icon slot-icon">${item ? iconMarkup(itemIcon(item), tierColor(item)) : iconMarkup(SLOT_ICONS[slot], ICON_EMPTY_COLOR)}</span>
      <span class="slot-item ${item ? 'item-'+item.tier : ''}">
        ${item ? item.name + ` <span class="item-power">⚡${itemPower(item)}</span>` : '<span class="slot-empty">— empty —</span>'}
      </span>
    </div>
    ${item ? `<button class="row-btn unequip-row-btn" onclick="unequip('${slot}')">✕</button>` : ''}
  </div>`;
}

// COSMETICS: change how the hero *looks* without changing what's equipped. Pick
// from the wardrobe of looks you've found, per visual slot (head / chest / weapon).
const COS_LABELS = { head: '🪖 Head', chest: '🛡 Chest', weapon: '⚔ Weapon' };
function renderCosmetics() {
  if (!player.cosmetics) player.cosmetics = { head:null, chest:null, weapon:null };
  if (!player.wardrobe) player.wardrobe = { head:[], chest:[], weapon:[] };
  const blocks = VISUAL_SLOTS.map(slot => {
    const looks = player.wardrobe[slot] || [];
    const override = player.cosmetics[slot] || null;
    const shown = visualIcon(slot);
    // "Match gear" chip (clears any override) is always offered first.
    let chips = `<button class="cos-chip gear ${override ? '' : 'sel'}"
        title="Match your equipped gear" onclick="pickCosmetic('${slot}','')">GEAR</button>`;
    // One tappable chip per discovered look.
    chips += looks.map(l =>
      `<button class="cos-chip ${override === l.icon ? 'sel' : ''}"
         title="${(l.name || '').replace(/"/g,'')}" onclick="pickCosmetic('${slot}','${l.icon}')">${iconMarkup(l.icon, '#dddde6', false)}</button>`
    ).join('');
    const empty = looks.length ? '' :
      `<div class="cos-empty">Find ${COS_LABELS[slot].replace(/^\S+\s/, '').toLowerCase()} loot to unlock looks.</div>`;
    return `<div class="cos-block">
      <div class="cos-blk-head">
        <span class="cos-preview">${shown ? iconMarkup(shown, '#cfcfe0', false) : '—'}</span>
        <span class="cos-slot-label">${COS_LABELS[slot]}</span>
      </div>
      <div class="cos-chips">${chips}</div>
      ${empty}
    </div>`;
  }).join('');
  return `<div class="cos-head">
    <div class="cos-title">👁 APPEARANCE</div>
    <div class="cos-sub">Tap a look to wear it — your sprite changes, but your equipped gear and stats don't.</div>
    ${blocks}
  </div>`;
}

// Wear a chosen look for a visual slot. An empty icon clears the override so the
// slot mirrors equipped gear again.
function pickCosmetic(slot, icon) {
  if (!VISUAL_SLOTS.includes(slot)) return;
  if (!player.cosmetics) player.cosmetics = { head:null, chest:null, weapon:null };
  player.cosmetics[slot] = icon || null;
  renderPanel();
  draw();         // restyle the sprite immediately
  saveGame();
}

// One-tap equip: route an item straight to its own slot.
function quickEquip(i) {
  const item = inventory[i];
  if (!item) return;
  const slot = item.slot;
  if (!slot) { log(`${logItem(item)} can't be equipped.`); return; }
  if (!canEquipItem(item)) {
    const cls = playerClass();
    log(`🔒 A ${cls.name} can't wield that — ${cls.name}s use ${cls.weapons.join(', ')}.`);
    return;
  }
  if (equipped[slot]) inventory.push(equipped[slot]); // swap old back into bag
  equipped[slot] = item;
  inventory.splice(i, 1);
  selectedItem = null;
  hideTooltip();
  sfx('equip');
  log(`Equipped: ${logItem(item)}`, 'loot');
  recordWardrobe(item);
  renderPanel();
  draw();          // re-skin the sprite with the newly worn gear
  saveGame();
}

function unequip(slot) {
  const item = equipped[slot];
  if (!item) return;
  inventory.push(item);
  equipped[slot] = null;
  hideTooltip();
  log(`Unequipped: ${logItem(item)}`);
  renderPanel();
  draw();          // sprite drops the gear it was wearing
  saveGame();
}

function tapSlot(slot, el) {
  // Toggle the equipped item's stat tooltip.
  if (tooltipShowing === 'slot:'+slot) { hideTooltip(); return; }
  const item = equipped[slot];
  if (item) {
    showTooltipForItem(item, el);
    tooltipShowing = 'slot:'+slot;
  }
}

// Desktop hover for gear slots (mirrors the loot list). Doesn't set
// tooltipShowing so it stays a transient preview that clears on mouseleave.
function hoverSlot(e, slot) {
  if (tooltipShowing) return; // don't fight a tapped-open tooltip
  const item = equipped[slot];
  if (item) showTooltipForItem(item, e.currentTarget);
}

function selectItem(i, el) {
  // Toggle: tapping the already-open item again closes its tooltip.
  if (selectedItem === i && tooltipShowing === 'item:'+i) {
    selectedItem = null;
    hideTooltip();
    renderPanel();
    return;
  }
  selectedItem = i;
  // Capture the row's screen position before renderPanel() rebuilds (detaches) it.
  const anchorTop = el ? el.getBoundingClientRect().top : null;
  renderPanel();
  showTooltipForItem(inventory[i], anchorTop);
  tooltipShowing = 'item:'+i;
}

// ── TOOLTIP ──
const ttEl = document.getElementById('tooltip');
let tooltipShowing = null; // 'item:N' or 'slot:weapon' etc, or null

function showTooltip(e, i) {
  showTooltipForItem(inventory[i], e.currentTarget);
}

// Place the tooltip just left of the side panel, vertically aligned with the
// row/slot it describes, so it never overlaps the drawer or floats in the
// middle of the screen. Falls back to a centered position when there isn't
// room to the left (narrow / mobile screens) or no anchor is given.
function positionTooltip(anchor) {
  const gap = 8;
  const tt = ttEl.getBoundingClientRect();
  const panel = document.getElementById('side-panel');
  const pr = panel.getBoundingClientRect();
  // anchor may be a live element, a captured top coordinate (number), or null.
  let anchorTop = null;
  if (typeof anchor === 'number') {
    anchorTop = anchor;
  } else if (anchor && typeof anchor.getBoundingClientRect === 'function') {
    const r = anchor.getBoundingClientRect();
    // A re-rendered row leaves a detached element with an all-zero rect; ignore it.
    if (r.width || r.height || r.top) anchorTop = r.top;
  }
  let left, top;
  if (anchorTop !== null) {
    left = pr.left - tt.width - gap; // tuck it to the left of the open drawer
    top = anchorTop;
    if (left < gap) left = Math.max(gap, (window.innerWidth - tt.width) / 2);
  } else {
    left = Math.max(gap, (window.innerWidth - tt.width) / 2);
    top = 70;
  }
  // Keep the whole tooltip on screen.
  left = Math.min(left, window.innerWidth - tt.width - gap);
  left = Math.max(gap, left);
  top = Math.min(top, window.innerHeight - tt.height - gap);
  top = Math.max(gap, top);
  ttEl.style.left = left + 'px';
  ttEl.style.top = top + 'px';
}

// Build the inner markup for a single item's tooltip card. `opts.label` adds a
// small heading ("Hovered"/"Equipped"); `opts.compareTo` renders the power
// difference vs that item as a percentage change.
function itemCardHTML(item, opts = {}) {
  const tier = TIERS[item.tier];
  const statRows = Object.entries(item.stats).map(([k,v]) => {
    // DMG is a range string like "8-12"; others are flat numbers (negative on a curse).
    const negative = (typeof v === 'number') && v < 0;
    const val = (typeof v === 'string') ? v : (v < 0 ? '' : '+') + v;
    const style = negative ? ' style="color:#e0556b"' : '';
    return `<div class="tt-stat"${style}>${val} ${STAT_LABELS[k] || k}</div>`;
  });
  // Attribute affixes (+Might, +Luck, …) get their own coloured rows.
  if (item.attrs) for (const [k, v] of Object.entries(item.attrs)) {
    statRows.push(`<div class="tt-stat" style="color:#e6c34a">+${v} ${ATTRIBUTES[k].label}</div>`);
  }
  const stats = statRows.join('') || '<div class="tt-stat" style="color:#666">No bonuses</div>';
  const power = item.slot ? itemPower(item) : 0;
  // Power difference vs the comparison item, shown as a percentage so a +1 over a
  // 10-power item reads as a meaningful +10% rather than a flat +1.
  let powerDelta = '';
  if (opts.compareTo && opts.compareTo !== item) {
    const basePower = itemPower(opts.compareTo);
    const d = power - basePower;
    if (d !== 0) {
      const pct = basePower > 0 ? Math.round(d / basePower * 100) : 100;
      powerDelta = ` <span style="color:${d>0?'#5ee08a':'#e0556b'}">(${d>0?'+':''}${pct}%)</span>`;
    }
  }
  // Item level: drives raw stat size, so it's worth surfacing alongside power.
  const ilvlLine = (item.slot && item.ilvl)
    ? `<span style="color:#7fb0ff;font-weight:bold">ilvl ${item.ilvl}</span>` : '';
  const label = opts.label ? `<div class="tt-cardlabel">${opts.label}</div>` : '';
  return `
    ${label}
    <div class="tt-name" style="color:${tier.color}">${item.name}</div>
    <div class="tt-tier" style="color:${tier.color}">${item.slot ? SLOTS[item.slot].label : 'potion'}${ilvlLine ? ' · ' + ilvlLine : ''}</div>
    ${item.slot ? `<div style="color:#ffd24b;font-weight:bold;font-size:11px;margin:3px 0">⚡ Power: ${power}${powerDelta}</div>` : ''}
    ${stats}
    <div style="color:#c8a84b;font-size:10px;margin-top:3px">Value: ${item.value}g</div>
    <div class="tt-flavor">${item.flavor}</div>`;
}

function showTooltipForItem(item, anchor) {
  if (!item) return;
  // If the hovered/selected item slots into gear that's already filled with a
  // different piece, show a side-by-side compare card for the equipped item.
  const equippedHere = item.slot ? equipped[item.slot] : null;
  const comparing = equippedHere && equippedHere !== item;
  const mainCard = `<div class="tt-card">${itemCardHTML(item, comparing ? { label: 'Hovered', compareTo: equippedHere } : {})}</div>`;
  const compareCard = comparing
    ? `<div class="tt-card tt-card-equipped">${itemCardHTML(equippedHere, { label: 'Equipped' })}</div>`
    : '';
  ttEl.classList.toggle('comparing', !!comparing);
  ttEl.innerHTML = `
    <div class="tt-compare">${mainCard}${compareCard}</div>
    <div style="color:#555;font-size:9px;margin-top:5px">Tap anywhere to close</div>`;
  ttEl.style.display = 'block';
  // Measure after it's visible, then anchor it relative to the panel/row.
  positionTooltip(anchor);
}

function hideTooltip() { ttEl.style.display = 'none'; tooltipShowing = null; }

// ── HOVER POPUP ── styled tooltip for enchanter reroll buttons, shaped like the
// gear hover card. The content lives in the element's data-tip attribute; the
// wrapper carries the handlers so it fires even when the button is disabled.
const hoverTipEl = document.getElementById('hovertip');
function showHoverTip(e, el) {
  const html = el && el.dataset ? el.dataset.tip : '';
  if (!html) return;
  hoverTipEl.innerHTML = html;
  hoverTipEl.style.display = 'block';
  // Sit above the hovered button, centred; drop below if there's no room above.
  const r = el.getBoundingClientRect();
  const tip = hoverTipEl.getBoundingClientRect();
  const gap = 8;
  let left = r.left + r.width / 2 - tip.width / 2;
  let top = r.top - tip.height - gap;
  if (top < gap) top = r.bottom + gap;
  left = Math.max(gap, Math.min(left, window.innerWidth - tip.width - gap));
  top = Math.max(gap, Math.min(top, window.innerHeight - tip.height - gap));
  hoverTipEl.style.left = left + 'px';
  hoverTipEl.style.top = top + 'px';
}
function hideHoverTip() { hoverTipEl.style.display = 'none'; }

// Dismiss the tooltip when tapping anywhere (the tooltip, the map, the log, etc.),
// except when tapping a loot item or gear slot (those manage it themselves).
document.addEventListener('click', (e) => {
  if (ttEl.style.display === 'block' &&
      !e.target.closest('.loot-info') &&
      !e.target.closest('.slot-info') &&
      !e.target.closest('.row-btn') &&
      !e.target.closest('.tab-btn')) {
    hideTooltip();
    if (selectedItem !== null) { selectedItem = null; renderPanel(); }
  }
}, true);

// ── LOG ──
function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="log-line ${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// Potions get their own signature colour wherever they're named in the log.
const POTION_COLOR = '#ff5ec4';
// Wrap an item's name in its rarity tier colour for chat-log mentions.
function logItem(item) {
  const c = (TIERS[item.tier] || TIERS.normal).color;
  return `<span style="color:${c}">${item.name}</span>`;
}
// Wrap a potion label in the shared potion colour for chat-log mentions.
function logPotion(label) {
  return `<span style="color:${POTION_COLOR}">${label}</span>`;
}

// ══════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const handler = () => {
    const dir = btn.dataset.dir;
    if (dir === 'up')     move(0,-1);
    if (dir === 'down')   move(0, 1);
    if (dir === 'left')   move(-1,0);
    if (dir === 'right')  move(1, 0);
    if (dir === 'pickup') pickup();
  };
  btn.addEventListener('click', handler);
});

document.addEventListener('keydown', e => {
  // Block gameplay keys while the mandatory class-pick overlay is open.
  const cov = document.getElementById('class-overlay');
  if (cov && cov.classList.contains('open')) return;
  if (e.key==='ArrowUp'||e.key==='w')    move(0,-1);
  if (e.key==='ArrowDown'||e.key==='s')  move(0,1);
  if (e.key==='ArrowLeft'||e.key==='a')  move(-1,0);
  if (e.key==='ArrowRight'||e.key==='d') move(1,0);
  if (e.key===' '||e.key==='f')          pickup();
  if (e.key==='q'||e.key==='Q')          useHealthPotion();
  if (e.key==='e'||e.key==='E')          useManaPotion();
  if (e.key==='r'||e.key==='R')          castSkill();
  if (e.key==='t'||e.key==='T')          enterTown();
  if (e.key==='b'||e.key==='B'||e.key==='i'||e.key==='I') togglePanel();
});

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════

function rnd(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ══════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════

const SAVE_KEY = 'dungeonLoot_save_v1';

function saveGame() {
  try {
    const data = {
      player, inventory, equipped, dungeonLevel, buffs, pact,
      inTown, dungeonReturn, stash,
      ts: Date.now(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {
    // localStorage unavailable (e.g. inside artifact preview) — fail silently
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.player) return false;
    player = data.player;
    if (player.gold == null) player.gold = 0;
    if (player.healPotions == null) player.healPotions = 0;
    if (player.healthPotionsBought == null) player.healthPotionsBought = 0;
    if (player.manaPotions == null) player.manaPotions = 0;
    // Migrate saves that predate crafting materials: seed an empty wallet and
    // ensure every material key exists on partial saves.
    if (!player.materials || typeof player.materials !== 'object') player.materials = freshMaterials();
    for (const k of CRAFT_MAT_KEYS) if (player.materials[k] == null) player.materials[k] = 0;
    // Migrate saves that predate hero attributes.
    if (!player.attributes) player.attributes = baseAttributes();
    if (player.attrPoints == null) player.attrPoints = 0;
    // Migrate to the attribute-driven-stats schema (v2): every attribute now
    // starts at ATTR_BASE and there's a new Luck attribute, and the derived-stat
    // formulas are completely different. Old saves stored attributes with a zero
    // base, so we refund all previously-spent points, reset everyone to the base
    // block (including Luck), and let the player re-allocate under the new rules.
    if (player.attrSchema !== 2) {
      let refund = 0;
      for (const k of ['might','vitality','agility','spirit','luck']) refund += (player.attributes[k] || 0);
      player.attributes = baseAttributes();
      player.attrPoints = (player.attrPoints || 0) + refund;
      player.attrSchema = 2;
    }
    // Defensive: ensure every attribute key exists (incl. Luck on any save).
    for (const k of ATTR_KEYS) if (player.attributes[k] == null) player.attributes[k] = ATTR_BASE;
    // Migrate saves that predate the class system. A null class is fine — the
    // init flow prompts the player to choose one. Drop any unknown class id.
    if (player.class && !CLASSES[player.class]) player.class = null;
    if (player.skillCd == null) player.skillCd = 0;
    // Migrate saves that predate the deepest-floor tracker / town hub.
    if (player.maxFloor == null) player.maxFloor = data.dungeonLevel || 1;
    // Migrate saves that predate cleared-floor tracking.
    if (!player.clearedFloors || typeof player.clearedFloors !== 'object') player.clearedFloors = {};
    inTown = !!data.inTown;
    dungeonReturn = data.dungeonReturn || data.dungeonLevel || 1;
    inventory = (data.inventory || []).filter(it => it && it.slot); // drop legacy typeKey-only items
    // Restore the town stash, tolerating saves that predate it.
    stash = { gold: 0, items: [] };
    if (data.stash && typeof data.stash === 'object') {
      stash.gold = Math.max(0, Math.floor(data.stash.gold) || 0);
      stash.items = (data.stash.items || []).filter(it => it && it.slot);
    }
    // Rebuild equipped into the new 7-slot shape; salvage any still-valid pieces into the bag.
    const freshEquipped = { head:null, chest:null, hands:null, legs:null, weapon:null, ring:null, amulet:null };
    const old = data.equipped || {};
    Object.values(old).forEach(it => {
      if (it && it.slot && freshEquipped.hasOwnProperty(it.slot) && !freshEquipped[it.slot]) {
        freshEquipped[it.slot] = it;
      } else if (it && it.slot) {
        inventory.push(it);
      }
    });
    equipped = freshEquipped;
    // Migrate saves that predate cosmetics: ensure the shape exists, then seed the
    // wardrobe from whatever gear the player is already carrying or wearing.
    if (!player.cosmetics) player.cosmetics = { head:null, chest:null, weapon:null };
    if (!player.wardrobe) player.wardrobe = { head:[], chest:[], weapon:[] };
    for (const s of VISUAL_SLOTS) if (!player.wardrobe[s]) player.wardrobe[s] = [];
    // Migrate icons from the old emoji system to vector-icon keys: re-stamp gear,
    // rebuild each saved wardrobe look from its name (deduping by key), and convert
    // any chosen cosmetic. Gear without a recognised key heals on next access.
    inventory.forEach(it => { if (it.slot) it.icon = itemIcon(it); });
    Object.values(equipped).forEach(it => { if (it && it.slot) it.icon = itemIcon(it); });
    stash.items.forEach(it => { if (it.slot) it.icon = itemIcon(it); });
    // Older items predate attribute affixes — give them an empty attrs block so
    // the affix/enchant code can treat every item uniformly.
    inventory.forEach(it => { if (it && !it.attrs) it.attrs = {}; });
    Object.values(equipped).forEach(it => { if (it && !it.attrs) it.attrs = {}; });
    stash.items.forEach(it => { if (it && !it.attrs) it.attrs = {}; });
    for (const slot of VISUAL_SLOTS) {
      const seen = new Set();
      player.wardrobe[slot] = (player.wardrobe[slot] || [])
        .map(w => ({ icon: iconKeyFromName(w.name, slot), name: w.name }))
        .filter(w => w.icon && !seen.has(w.icon) && seen.add(w.icon));
      const cur = player.cosmetics[slot];
      if (cur && !ICON_PATHS[cur]) player.cosmetics[slot] = LEGACY_EMOJI_KEYS[cur] || null;
    }
    inventory.forEach(recordWardrobe);
    Object.values(equipped).forEach(recordWardrobe);
    dungeonLevel = data.dungeonLevel || 1;
    // Restore shrine buffs, tolerating older saves that predate them.
    buffs = Object.assign({ power: 0, guard: 0, fortune: 0 }, data.buffs || {});
    // Restore an active mystic pact, tolerating older saves (and dropping a
    // malformed one rather than letting it break floor generation).
    pact = (data.pact && data.pact.fx && data.pact.floors > 0) ? data.pact : null;
    // Recompute derived max HP/MP from the (possibly updated) formula so older
    // saves line up with the current attribute system, then clamp current values.
    recomputeMaxStats();
    if (player.hp == null || player.hp > player.maxHp) player.hp = player.maxHp;
    if (player.mp == null || player.mp > player.maxMp) player.mp = player.maxMp;
    // Always spawn at the safe start tile on a freshly generated floor
    player.x = 5; player.y = 5;
    return true;
  } catch (e) {
    return false;
  }
}

function wipeSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  location.reload();
}

let newGameArmed = false;
function confirmNewGame() {
  const btn = document.querySelector('.newgame-action');
  const label = btn.querySelector('.action-label');
  if (!newGameArmed) {
    newGameArmed = true;
    btn.classList.add('armed');
    label.textContent = 'SURE?';
    log('Tap SURE? again to wipe your save and start over.', 'important');
    setTimeout(() => {
      newGameArmed = false;
      btn.classList.remove('armed');
      label.textContent = 'NEW';
    }, 3000);
    return;
  }
  wipeSave();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

const hadSave = loadGame();
// Resume in town if that's where the save left off; otherwise build the floor.
if (inTown) { buildTown(); openTownHub(); } else generateMap();
draw();
updateBars();
renderPanel();

// New game (or a save from before classes existed) — make the player pick a class.
if (!player.class) showClassPick();

if (hadSave) {
  log(`Welcome back, level ${player.level} adventurer.`, 'important');
  if (inTown) log('You are in town. Pick a service from the menu, or take the 🌀 Dungeon Gate back into the dungeon.');
  else log(`Resuming on dungeon level ${dungeonLevel}. Your gear is intact.`);
} else {
  log('Welcome to the dungeon. Move to explore. USE to open chests.', 'important');
  log('🔒 Clear a floor of its foes to unseal the ▼ stairs, then descend.', 'important');
  log('⚠️ The deep scales faster than you can — grind lower floors from 🏰 TOWN when you hit a wall.');
}
log('Progress auto-saves automatically as you play.');
log('Tap 🎒 BAG (bottom-right) to open your loot.');
log(`Tap the ❤️ flask to drink a ${logPotion('Health Potion')} when you're hurt. Enemies hit hard!`);
log('⌨️ Keys: Q drink potion · E mana · R class skill · T town · B open bag · Space/F use.');
log('⚡ Your class grants a special skill — tap the ⚡ button (or press R) to spend mana on it.');
log('⚡ Each item has a Power value; your total Power blends level, gear, and attributes.');
log('💠 Level up to earn points, then raise attributes in the bag\'s HERO tab.');
log('🗡️ Every weapon fights differently — axes cleave, daggers flurry, bows & staves strike at range, maces stun, scythes drain. Try them all!');
log('🏰 Tap TOWN (or press T) to warp to the safe hub: craftsman, healer, trainer, enchanter, and a gate to re-enter any floor you\'ve reached.');
log('🧰 Foes drop crafting materials — 🔩 Scrap, 🔆 Core, ✨ Glimmer, 🌀 Chaos Orb. The 🔨 Craftsman forges blank gear; the 🪄 Enchanter fills in its modifiers.');
log('⚔️ Each move OR attack passes a turn — get surrounded and every foe piles on, so don\'t let them encircle you.');

// Reflect any saved mute preference on the SOUND button, then arm the audio:
// browsers won't let sound start until the player interacts, so the first
// gesture resumes the context and kicks off the looping music.
updateSoundButton();
['pointerdown', 'keydown', 'touchstart'].forEach(ev =>
  window.addEventListener(ev, audioUnlock, { passive: true }));

// Redraw once layout has settled so the camera fits the real canvas size.
// On the web layout, also open + populate the permanent loot drawer.
syncWebPanel();
requestAnimationFrame(() => { resizeCanvas(); draw(); });
window.addEventListener('load', () => { syncWebPanel(); resizeCanvas(); draw(); });
// Once the emoji/icon fonts have finished loading, repaint so any glyphs that
// weren't yet resident on the first frame bake into the sprite cache and show.
if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => draw());

// Gentle animation loop: only repaints while a merchant is on the floor,
// so their robe glow pulses. Idle otherwise to save battery.
let lastPulse = 0;
function pulseLoop(ts) {
  const hasElite = enemies.some(e => !e.dead && e.isElite);
  const hasShrine = Object.keys(shrineData).length > 0;
  if ((inTown || merchant || mystic || hasFountain || hasShrine || quest || floatingTexts.length || statusEffects.length || hasElite) && ts - lastPulse > 60) { lastPulse = ts; draw(); }
  requestAnimationFrame(pulseLoop);
}
requestAnimationFrame(pulseLoop);
</script>
