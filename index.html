  } else if (slot === 'head' || slot === 'chest' || slot === 'hands' || slot === 'legs') {
    // Bigger armor pieces give more DEF than smaller ones.
    const slotDef = { chest: 1.3, legs: 1.0, head: 0.8, hands: 0.7 }[slot];
    stats.DEF = Math.max(1, Math.floor((1 + lvl + rnd(0,2)) * mult * slotDef));
    // Gloves also grant a little attack power — far less than a weapon.
    if (slot === 'hands') {
      stats.ATK = Math.max(1, Math.floor((1 + lvl * 0.35) * mult * 0.6));
    }
  }
  // ring/amulet have no fixed headline — they roll pure bonus stats below.

  const extraCount = (slot === 'ring' || slot === 'amulet')
    ? statCount + 1        // jewelry gets an extra rolled stat instead of a headline
    : Math.max(0, statCount - 1);
  const statPool = STAT_NAMES.filter(s => !(s in stats))
    .sort(() => Math.random()-0.5).slice(0, extraCount);
  statPool.forEach(s => {
    let v = Math.max(1, Math.floor((1 + lvl * 0.6 + rnd(0,2)) * mult));
    // Regen is applied every step, so keep the per-item value modest.
    if (s === 'REGEN') v = Math.max(1, Math.round(v * 0.4));
    stats[s] = v;
  });

  // Base value by rarity, lifted by item level so deeper gear is worth more.
  const baseValue = { junk:1, normal:5, uncommon:20, rare:80, epic:300, legendary:1200, unique:5000 }[tier];
  let value = Math.round(baseValue * (1 + lvl * 0.12));

  const item = { id: Math.random(), name, tier, slot, ilvl: lvl, stats, value,
    flavor: pick(FLAVOR[tier]), icon: ITEM_ICONS[baseName] || SLOT_ICONS[slot] };

  // Cursed items (~12% of uncommon+): a big stat boost paired with a penalty.
  // The negative stat flows straight through totalStat(), so the drawback is real.
  const tierRank = Object.keys(TIERS).indexOf(tier);
  if (tierRank >= 2 && Math.random() < 0.12) {
    const boostStat = pick(STAT_NAMES.filter(s => s !== 'DMG'));
    const curseStat = pick(STAT_NAMES.filter(s => s !== boostStat && s !== 'DMG'));
    stats[boostStat] = (stats[boostStat] || 0) + Math.round((10 + lvl*2) * mult);
    stats[curseStat] = -(Math.round((6 + lvl) * mult)); // negative = penalty
    item.cursed = true;
    item.name = '☠ ' + item.name;
    item.flavor = 'Cursed: great power at a price.';
    item.value = Math.round(value * 1.5);
  }
  return item;
}

function weighted(obj) {
  const total = Object.values(obj).reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for (const [k,v] of Object.entries(obj)) { r-=v; if(r<=0) return k; }
  return Object.keys(obj)[0];
}

// ══════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════

// Each dungeon depth cycles through a visual theme so floors don't all look
// alike. Every theme defines the full palette used by the tile renderer.
const THEMES = [
  { name: 'the Stone Crypt',
    floor:'#2e2e42', floorAlt:'#26263a', wall:'#4a4a66', wallTop:'#64648a',
    brickA:'#56567a', brickB:'#4e4e70', mortar:'#33334a', crack:'#2a2a3c',
    seam:'#1c1c2c', speckle:'#3a3a52', accent:'rgba(90,140,70,0.3)', stairsGlow:'#ffd24b' },
  { name: 'the Mossy Caverns',
    floor:'#243524', floorAlt:'#1d2b1d', wall:'#3a5236', wallTop:'#557a4e',
    brickA:'#436147', brickB:'#3a5640', mortar:'#243a26', crack:'#1c2c1e',
    seam:'#142016', speckle:'#3a5236', accent:'rgba(150,200,90,0.32)', stairsGlow:'#ffe24b' },
  { name: 'the Lava Depths',
    floor:'#3a221c', floorAlt:'#2c1916', wall:'#5a2c22', wallTop:'#8a3e2c',
    brickA:'#6e3326', brickB:'#5e2c20', mortar:'#3a1c14', crack:'#ff6a2a',
    seam:'#241310', speckle:'#7a3a20', accent:'rgba(255,120,40,0.35)', stairsGlow:'#ff9a3b' },
  { name: 'the Frozen Halls',
    floor:'#2a3a4a', floorAlt:'#22303e', wall:'#3e5a72', wallTop:'#6a90ad',
    brickA:'#4a6a86', brickB:'#3e5c76', mortar:'#283a4a', crack:'#1e2c38',
    seam:'#16222c', speckle:'#5a7a96', accent:'rgba(150,220,255,0.3)', stairsGlow:'#bfe8ff' },
  { name: 'the Sunken Tombs',
    floor:'#4a4026', floorAlt:'#3e351f', wall:'#6e5d36', wallTop:'#9a8550',
    brickA:'#7e6c40', brickB:'#6e5d36', mortar:'#4a3e22', crack:'#34291a',
    seam:'#241c10', speckle:'#8a7548', accent:'rgba(220,200,120,0.3)', stairsGlow:'#ffe07a' },
  { name: 'the Void Sanctum',
    floor:'#2e2440', floorAlt:'#251d34', wall:'#4a3a6a', wallTop:'#6e54a0',
    brickA:'#56447e', brickB:'#4a3a6e', mortar:'#332a4a', crack:'#22182c',
    seam:'#1a1226', speckle:'#5a4a82', accent:'rgba(190,120,255,0.3)', stairsGlow:'#d9a0ff' },
];
function currentTheme() { return THEMES[(dungeonLevel - 1) % THEMES.length]; }

// Rounded-rect helper (older canvases lack ctx.roundRect).
function roundRectPath(x, y, w, h, r) {
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// Draw the hero as a small composed adventurer instead of a single emoji, so the
// equipped (or cosmetic) head / chest / weapon visibly change the sprite. Each
// gear piece sits in its own clear zone: a helm on the head, armor on the torso,
// a weapon held to the side. Empty slots fall back to plain hair / tunic / hand.
function drawHeroSprite(px, py, tw, th, scale) {
  const cx = px + tw/2;
  const headCY  = py + th*0.30, headR = tw*0.155;
  const torsoTop = py + th*0.44, torsoW = tw*0.42, torsoH = th*0.30;
  const torsoX = cx - torsoW/2;

  const headIcon  = visualIcon('head');
  const chestIcon = visualIcon('chest');
  const weaponIcon = visualIcon('weapon');
  const chestTier = equipped.chest ? (TIERS[equipped.chest.tier]?.color || '#6d5a44') : null;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';

  // ── legs + boots ──
  const legW = torsoW*0.30, legY = torsoTop + torsoH - th*0.01, legH = th*0.13;
  ctx.fillStyle = '#3f3550';
  ctx.fillRect(cx - torsoW*0.30, legY, legW, legH);
  ctx.fillRect(cx + torsoW*0.00, legY, legW, legH);
  ctx.fillStyle = '#241d30';
  ctx.fillRect(cx - torsoW*0.32, legY + legH, legW*1.1, th*0.04);
  ctx.fillRect(cx - torsoW*0.02, legY + legH, legW*1.1, th*0.04);

  // ── torso (armor if a chest piece is worn, plain tunic otherwise) ──
  ctx.fillStyle = chestTier || '#6d5a44';
  roundRectPath(torsoX, torsoTop, torsoW, torsoH, Math.max(2, 4*scale));
  ctx.fill();
  ctx.lineWidth = Math.max(1, 1.4*scale);
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.stroke();

  // ── arms ──
  ctx.fillStyle = '#e8b48c';
  ctx.fillRect(torsoX - tw*0.06, torsoTop + torsoH*0.10, tw*0.07, torsoH*0.55);
  ctx.fillRect(torsoX + torsoW - tw*0.01, torsoTop + torsoH*0.10, tw*0.07, torsoH*0.55);

  // ── head (skin) ──
  ctx.fillStyle = '#e8b48c';
  ctx.beginPath();
  ctx.arc(cx, headCY, headR, 0, Math.PI*2);
  ctx.fill();
  ctx.lineWidth = Math.max(1, 1.2*scale);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  // Default hair only when no headgear hides it.
  if (!headIcon) {
    ctx.fillStyle = '#5a3a22';
    ctx.beginPath();
    ctx.arc(cx, headCY - headR*0.25, headR, Math.PI*1.05, Math.PI*1.95);
    ctx.fill();
  }
  // Simple eyes for a bit of character.
  ctx.fillStyle = '#2a1d14';
  const eY = headCY + headR*0.08, eDx = headR*0.38, eR = Math.max(1, headR*0.16);
  ctx.beginPath(); ctx.arc(cx - eDx, eY, eR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + eDx, eY, eR, 0, Math.PI*2); ctx.fill();

  // ── worn gear emoji, each in its zone ──
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 2*scale;

  if (chestIcon) {
    ctx.font = `${Math.round(tw*0.34)}px serif`;
    ctx.fillText(chestIcon, cx, torsoTop + torsoH*0.46);
  }
  if (headIcon) {
    // Sit the helm on the crown of the head, overlapping the top slightly.
    ctx.font = `${Math.round(tw*0.42)}px serif`;
    ctx.fillText(headIcon, cx, headCY - headR*0.62);
  }
  if (weaponIcon) {
    // Held in the right hand, tilted so it reads as a wielded weapon.
    ctx.save();
    ctx.translate(torsoX + torsoW + tw*0.10, torsoTop + torsoH*0.42);
    ctx.rotate(-0.5);
    ctx.font = `${Math.round(tw*0.46)}px serif`;
    ctx.fillText(weaponIcon, 0, 0);
    ctx.restore();
  }
  ctx.restore();
}

function draw() {
  const W = canvas.width, H = canvas.height;
  const C = currentTheme();
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // ── FOLLOW CAMERA ──
  // Aim to show ~VIEW_TILES across the shorter axis, so tiles are large.
  const VIEW_TILES = 11;
  const tw = Math.ceil(Math.min(W, H) / VIEW_TILES);
  const th = tw;

  // Center the camera on the player, then clamp so we never scroll past edges.
  let camX = player.x * tw + tw/2 - W/2;
  let camY = player.y * th + th/2 - H/2;
  const maxCamX = MAP_W * tw - W;
  const maxCamY = MAP_H * th - H;
  // If the map is smaller than the viewport on an axis, center it instead.
  camX = (MAP_W * tw <= W) ? -(W - MAP_W*tw)/2 : Math.max(0, Math.min(camX, maxCamX));
  camY = (MAP_H * th <= H) ? -(H - MAP_H*th)/2 : Math.max(0, Math.min(camY, maxCamY));

  const offX = Math.round(-camX);
  const offY = Math.round(-camY);
  const scale = tw / TILE; // for glow blur sizing, relative to base tile

  // Only draw tiles within the visible window (perf + clean edges)
  const x0 = Math.max(0, Math.floor(camX / tw));
  const y0 = Math.max(0, Math.floor(camY / th));
  const x1 = Math.min(MAP_W, Math.ceil((camX + W) / tw));
  const y1 = Math.min(MAP_H, Math.ceil((camY + H) / th));

  // Draw tiles
  for (let y = y0; y < y1; y++) {
    for (let x = x0; x < x1; x++) {
      const px = offX + x * tw, py = offY + y * th;
      const t = mapData[y][x];
      const seed = (x * 73856093) ^ (y * 19349663); // deterministic per-tile

      if (t === 1) {
        // Wall base
        ctx.fillStyle = C.wall;
        ctx.fillRect(px, py, tw, th);
        // Brick rows with mortar lines
        const rows = 3;
        const rh = th / rows;
        for (let r = 0; r < rows; r++) {
          const ry = py + r * rh;
          const offset = (r % 2) * (tw / 2);
          // brick face shading
          ctx.fillStyle = (r % 2 === 0) ? C.brickA : C.brickB;
          ctx.fillRect(px, ry + 1, tw, rh - 1.5);
          // vertical mortar gap
          ctx.fillStyle = C.mortar;
          ctx.fillRect(px + (offset % tw), ry, Math.max(1, tw*0.06), rh);
          ctx.fillRect(px + ((offset + tw/2) % tw), ry, Math.max(1, tw*0.06), rh);
          // horizontal mortar
          ctx.fillRect(px, ry, tw, Math.max(1, th*0.05));
        }
        // top highlight ridge
        ctx.fillStyle = C.wallTop;
        ctx.fillRect(px, py, tw, Math.max(1, th*0.12));
        // occasional crack
        if (seed % 5 === 0) {
          ctx.fillStyle = C.crack;
          ctx.fillRect(px + tw*0.5, py + th*0.3, Math.max(1,tw*0.06), th*0.4);
        }
      } else if (t === 2) {
        // Stair pit
        ctx.fillStyle = '#0d0d14';
        ctx.fillRect(px, py, tw, th);
        // descending steps
        const steps = 4;
        for (let s = 0; s < steps; s++) {
          const shade = 20 + s * 14;
          ctx.fillStyle = `rgb(${shade+30},${shade+22},${Math.floor(shade*0.4)})`;
          const inset = (s / steps) * tw * 0.4;
          const sy = py + (s / steps) * th * 0.5;
          ctx.fillRect(px + inset, sy, tw - inset*2, th * (0.5/steps) + 1);
        }
        // glow
        ctx.fillStyle = C.stairsGlow + '33';
        ctx.fillRect(px, py + th*0.55, tw, th*0.45);
        ctx.fillStyle = C.stairsGlow;
        ctx.font = `bold ${Math.round(tw*0.42)}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText('▼', px + tw/2, py + th*0.85);
        // Pulsing ring so the exit is easy to spot from across the room.
        const sp = 0.5 + 0.5*Math.sin(Date.now()/350);
        ctx.save();
        ctx.strokeStyle = C.stairsGlow;
        ctx.globalAlpha = 0.35 + 0.4*sp;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px + tw/2, py + th/2, tw*(0.4 + 0.08*sp), 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      } else if (t === 3) {
        // Fountain of Healing — stone basin with glowing blue water
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        // stone rim
        ctx.fillStyle = '#5a5a72';
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*0.42, 0, Math.PI*2);
        ctx.fill();
        // water, gently pulsing
        const wp = 0.5 + 0.5*Math.sin(Date.now()/400);
        ctx.fillStyle = `rgba(90,180,255,${0.7+0.3*wp})`;
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*0.32, 0, Math.PI*2);
        ctx.fill();
        // glow
        ctx.save();
        ctx.shadowColor = '#8ad0ff';
        ctx.shadowBlur = 10 * (tw/TILE);
        ctx.fillStyle = '#bfe8ff';
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*0.14, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      } else if (t === 5) {
        // Shrine — a glowing pillar that pulses to draw the eye.
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        const sp = 0.5 + 0.5*Math.sin(Date.now()/350);
        ctx.save();
        ctx.shadowColor = '#d8a8ff';
        ctx.shadowBlur = (6 + 6*sp) * (tw/TILE);
        ctx.fillStyle = '#6a5a8a';
        ctx.fillRect(px+tw*0.38, py+th*0.25, tw*0.24, th*0.55); // pillar
        ctx.fillStyle = `rgba(216,168,255,${0.6+0.4*sp})`;
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th*0.28, tw*0.16, 0, Math.PI*2); // glowing orb
        ctx.fill();
        ctx.restore();
      } else if (t === 6) {
        // Water — deep, impassable, gently rippling.
        ctx.fillStyle = '#0e2a40';
        ctx.fillRect(px, py, tw, th);
        const wp = 0.5 + 0.5*Math.sin(Date.now()/600 + seed);
        ctx.fillStyle = `rgba(40,120,190,${0.6 + 0.2*wp})`;
        ctx.fillRect(px+1, py+1, tw-2, th-2);
        ctx.fillStyle = 'rgba(150,210,255,0.5)';
        ctx.fillRect(px+tw*0.2, py+th*(0.3+0.1*wp), tw*0.35, Math.max(1, th*0.07));
        ctx.fillRect(px+tw*0.5, py+th*(0.6-0.1*wp), tw*0.28, Math.max(1, th*0.07));
      } else if (t === 7) {
        // Lava — passable but it burns; molten glow pulses.
        const lp = 0.5 + 0.5*Math.sin(Date.now()/280 + seed);
        ctx.fillStyle = '#3a0f06';
        ctx.fillRect(px, py, tw, th);
        ctx.fillStyle = `rgba(255,${70 + Math.floor(70*lp)},20,0.95)`;
        ctx.fillRect(px+1, py+1, tw-2, th-2);
        ctx.fillStyle = `rgba(255,220,90,${0.5 + 0.4*lp})`;
        ctx.fillRect(px+tw*0.25, py+th*0.3, tw*0.18, th*0.4);
        ctx.fillRect(px+tw*0.6, py+th*0.55, tw*0.15, th*0.25);
      } else if (t === 8) {
        // Spike trap — floor studded with metal spikes.
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        ctx.fillStyle = '#c4c4d2';
        for (let s = 0; s < 3; s++) {
          const sx = px + tw*(0.2 + s*0.3);
          ctx.beginPath();
          ctx.moveTo(sx, py + th*0.8);
          ctx.lineTo(sx + tw*0.1, py + th*0.3);
          ctx.lineTo(sx + tw*0.2, py + th*0.8);
          ctx.closePath();
          ctx.fill();
        }
        ctx.fillStyle = '#7a7a8a';
        ctx.fillRect(px+tw*0.1, py+th*0.78, tw*0.8, Math.max(1, th*0.1));
      } else if (t === 9) {
        // Teleporter pad — a swirling purple portal.
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        const tp = 0.5 + 0.5*Math.sin(Date.now()/300 + seed);
        ctx.save();
        ctx.shadowColor = '#bb66ff';
        ctx.shadowBlur = (5 + 6*tp) * (tw/TILE);
        ctx.strokeStyle = `rgba(190,110,255,${0.6 + 0.4*tp})`;
        ctx.lineWidth = Math.max(1.5, tw*0.08);
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*(0.18 + 0.12*tp), 0, Math.PI*2);
        ctx.stroke();
        ctx.fillStyle = `rgba(225,190,255,${0.5 + 0.4*tp})`;
        ctx.beginPath();
        ctx.arc(px+tw/2, py+th/2, tw*0.1, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      } else if (t === 10) {
        // Cracked wall — a normal wall with an obvious fracture (breakable).
        ctx.fillStyle = C.wall;
        ctx.fillRect(px, py, tw, th);
        ctx.fillStyle = C.brickB;
        ctx.fillRect(px+1, py+1, tw-2, th-2);
        ctx.strokeStyle = '#15151c';
        ctx.lineWidth = Math.max(1.5, tw*0.07);
        ctx.beginPath();
        ctx.moveTo(px+tw*0.5, py);
        ctx.lineTo(px+tw*0.38, py+th*0.4);
        ctx.lineTo(px+tw*0.6, py+th*0.6);
        ctx.lineTo(px+tw*0.45, py+th);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px+tw*0.55, py+th*0.55);
        ctx.lineTo(px+tw*0.85, py+th*0.7);
        ctx.stroke();
      } else if (t === 11) {
        // Locked vault door — heavy timber with a brass lock.
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        ctx.fillStyle = '#5a3a1c';
        ctx.fillRect(px+tw*0.18, py+th*0.1, tw*0.64, th*0.8);
        ctx.fillStyle = '#3f2813';
        ctx.fillRect(px+tw*0.46, py+th*0.1, Math.max(1, tw*0.06), th*0.8);
        ctx.fillStyle = '#caa15a';
        ctx.beginPath();
        ctx.arc(px+tw*0.66, py+th*0.5, tw*0.08, 0, Math.PI*2);
        ctx.fill();
      } else {
        // Floor base with subtle checker
        ctx.fillStyle = (x+y)%2===0 ? C.floor : C.floorAlt;
        ctx.fillRect(px, py, tw, th);
        // flagstone seams
        ctx.fillStyle = C.seam;
        ctx.fillRect(px, py, tw, 1);
        ctx.fillRect(px, py, 1, th);
        // speckle / rubble (deterministic)
        const speckles = (seed % 4);
        ctx.fillStyle = C.speckle;
        for (let s = 0; s < speckles; s++) {
          const sx = px + ((seed >> (s*3+1)) % tw);
          const sy = py + ((seed >> (s*2+2)) % th);
          ctx.fillRect(sx, sy, Math.max(1, tw*0.08), Math.max(1, th*0.08));
        }
        // occasional accent tint (moss/embers/frost depending on theme)
        if (seed % 11 === 0) {
          ctx.fillStyle = C.accent;
          ctx.fillRect(px+tw*0.2, py+th*0.2, tw*0.5, th*0.5);
        }
      }
    }
  }

  // Ground chests — a classic brown chest with gold trim, drawn by hand so it
  // looks the same on every device. Lucky chests glow brighter gold.
  groundItems.forEach(({ x, y, luck }) => {
    const lucky = (luck || 1) > 1;
    const px = offX + x * tw, py = offY + y * th;
    const cx = px + tw/2, cy = py + th/2;
    const w = tw * 0.58, h = th * 0.46;
    const bx = cx - w/2, by = cy - h/2;
    const gold = lucky ? '#ffd24b' : '#d9a441';
    ctx.save();
    ctx.shadowColor = lucky ? '#ffe066' : '#caa24a';
    ctx.shadowBlur = (lucky ? 14 : 7) * scale;
    // wooden body
    ctx.fillStyle = '#7a4a22';
    ctx.fillRect(bx, by, w, h);
    ctx.shadowBlur = 0;
    // lid (slightly lighter band across the top)
    ctx.fillStyle = '#8a5628';
    ctx.fillRect(bx, by, w, h * 0.42);
    // lid top highlight
    ctx.fillStyle = '#a36c36';
    ctx.fillRect(bx, by, w, Math.max(1, h * 0.1));
    // gold trim: lid seam + bottom edge
    ctx.fillStyle = gold;
    ctx.fillRect(bx, by + h * 0.38, w, Math.max(1, h * 0.1));
    ctx.fillRect(bx, by + h - Math.max(1, h * 0.1), w, Math.max(1, h * 0.1));
    // vertical gold straps
    ctx.fillRect(bx + w * 0.14, by, Math.max(1, w * 0.09), h);
    ctx.fillRect(bx + w * 0.77, by, Math.max(1, w * 0.09), h);
    // lock plate
    ctx.fillStyle = lucky ? '#fff0a0' : '#e8c050';
    ctx.fillRect(cx - w * 0.09, by + h * 0.32, w * 0.18, h * 0.3);
    // keyhole
    ctx.fillStyle = '#4a2f15';
    ctx.fillRect(cx - w * 0.025, by + h * 0.42, w * 0.05, h * 0.13);
    ctx.restore();
  });

  // Ground food
  groundFood.forEach(f => {
    const px = offX + f.x * tw, py = offY + f.y * th;
    ctx.font = `${Math.round(tw * 0.6)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.emoji, px + tw/2, py + th/2);
  });

  // Coin piles — a soft golden glow so loose gold catches the eye.
  groundGold.forEach(g => {
    const px = offX + g.x * tw, py = offY + g.y * th;
    ctx.save();
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur = 8 * scale;
    ctx.font = `${Math.round(tw * 0.52)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🪙', px + tw/2, py + th/2);
    ctx.restore();
  });

  // Vault key — glints on the floor until grabbed.
  if (groundKey) {
    const px = offX + groundKey.x * tw, py = offY + groundKey.y * th;
    ctx.save();
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur = 10 * scale;
    ctx.font = `${Math.round(tw * 0.5)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🗝️', px + tw/2, py + th/2);
    ctx.restore();
  }

  // Merchant (roaming trader in bright robes)
  if (merchant) {
    const px = offX + merchant.x * tw, py = offY + merchant.y * th;
    // pulsing rainbow-ish glow so they stand out as special
    const t = (Date.now() % 2000) / 2000;
    const hue = Math.floor(t * 360);
    ctx.save();
    ctx.fillStyle = `hsla(${hue},90%,60%,0.35)`;
    ctx.beginPath();
    ctx.arc(px + tw/2, py + th/2, tw*0.55, 0, Math.PI*2);
    ctx.fill();
    // bright robe body
    ctx.fillStyle = `hsl(${hue},85%,55%)`;
    ctx.fillRect(px + tw*0.28, py + tw*0.4, tw*0.44, tw*0.5);
    ctx.fillStyle = `hsl(${(hue+60)%360},85%,60%)`;
    ctx.fillRect(px + tw*0.34, py + tw*0.5, tw*0.32, tw*0.18);
    ctx.restore();
    // merchant sprite on top
    ctx.font = `${Math.round(tw * 0.74)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧙‍♂️', px + tw/2, py + th/2 + th*0.02);
    // little "$" tag above
    ctx.fillStyle = '#ffd24b';
    ctx.font = `bold ${Math.round(tw*0.34)}px serif`;
    ctx.fillText('💰', px + tw/2, py - th*0.02);
  }

  // Wandering Mystic (hooded pact-vendor with a teal mystical aura)
  if (mystic) {
    const px = offX + mystic.x * tw, py = offY + mystic.y * th;
    // slow breathing teal glow so they read as arcane, distinct from the merchant
    const t = (Date.now() % 2600) / 2600;
    const pulse = 0.22 + 0.16 * (0.5 + 0.5 * Math.sin(t * Math.PI * 2));
    ctx.save();
    ctx.fillStyle = `rgba(70,225,210,${pulse})`;
    ctx.beginPath();
    ctx.arc(px + tw/2, py + th/2, tw*0.55, 0, Math.PI*2);
    ctx.fill();
    // dark hooded robe
    ctx.fillStyle = '#1d4a52';
    ctx.fillRect(px + tw*0.3, py + tw*0.4, tw*0.4, tw*0.5);
    ctx.fillStyle = '#2fb0a8';
    ctx.fillRect(px + tw*0.36, py + tw*0.5, tw*0.28, tw*0.16);
    ctx.restore();
    // mystic sprite on top
    ctx.font = `${Math.round(tw * 0.74)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧙', px + tw/2, py + th/2 + th*0.02);
    // crystal-ball tag above
    ctx.font = `bold ${Math.round(tw*0.34)}px serif`;
    ctx.fillText('🔮', px + tw/2, py - th*0.02);
  }

  // Enemies
  enemies.filter(e => !e.dead).forEach(e => {
    const px = offX + e.x * tw, py = offY + e.y * th;
    // boss aura
    if (e.isBoss) {
      ctx.fillStyle = 'rgba(255,50,50,0.2)';
      ctx.beginPath();
      ctx.arc(px + tw/2, py + th/2, tw * 0.6, 0, Math.PI*2);
      ctx.fill();
    } else if (e.isElite) {
      // golden glow marking the elite
      const pulse = 0.18 + 0.1 * (0.5 + 0.5 * Math.sin(Date.now() / 300));
      ctx.save();
      ctx.shadowColor = '#ffd24b';
      ctx.shadowBlur = 16 * scale;
      ctx.fillStyle = `rgba(255,210,75,${pulse})`;
      ctx.beginPath();
      ctx.arc(px + tw/2, py + th/2, tw * 0.56, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.font = `${Math.round(tw * (e.isBoss ? 0.95 : (e.isElite ? 0.86 : 0.78)))}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Status shows in the sprite's colour instead of a floating icon:
    // green = poisoned, gold = stunned.
    const eStatus = statusEffects.filter(s => s.target === e);
    const poisoned = eStatus.some(s => s.effect === 'poison');
    const stunned = eStatus.some(s => s.effect === 'stun');
    if (poisoned) {
      ctx.filter = 'grayscale(1) sepia(1) saturate(6) hue-rotate(60deg) brightness(1.05)';
    } else if (stunned) {
      ctx.filter = 'grayscale(1) sepia(1) saturate(7) hue-rotate(-15deg) brightness(1.25)';
    }
    ctx.fillText(e.type, px + tw/2, py + th/2 + th*0.04);
    ctx.filter = 'none';

    // Affix badge (Tough/Fierce/Venomous) or goblin loot tag, floated above.
    if (e.affixIcon || e.isGoblin) {
      ctx.font = `${Math.round(tw * 0.34)}px serif`;
      ctx.fillText(e.isGoblin ? '💰' : e.affixIcon, px + tw/2, py - th*0.02);
    }

    // HP bar
    if (e.hp < e.maxHp) {
      const bw = tw - 2, bh = Math.max(2, th * 0.14);
      ctx.fillStyle = '#000';
      ctx.fillRect(px, py, bw+2, bh+1);
      ctx.fillStyle = '#3a0000';
      ctx.fillRect(px+1, py, bw, bh);
      ctx.fillStyle = e.isBoss ? '#ff6622' : (e.isElite ? '#ffaa22' : '#ff3344');
      ctx.fillRect(px+1, py, bw * (e.hp/e.maxHp), bh);
    }
  });

  // Quest NPC — a friendly soul ringed in green with a quest marker.
  if (quest && quest.npc) {
    const n = quest.npc;
    const nx2 = offX + n.x * tw, ny2 = offY + n.y * th;
    const sp = 0.5 + 0.5*Math.sin(Date.now()/300);
    ctx.save();
    ctx.fillStyle = `rgba(80,220,120,${0.18 + 0.14*sp})`;
    ctx.beginPath();
    ctx.arc(nx2 + tw/2, ny2 + th/2, tw*0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.font = `${Math.round(tw * 0.74)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.emoji, nx2 + tw/2, ny2 + th/2 + th*0.04);
    ctx.font = `bold ${Math.round(tw * 0.4)}px serif`;
    ctx.fillStyle = '#7CFFB0';
    ctx.fillText((quest.type === 'escort' && n.following) ? '⬆' : '❗', nx2 + tw/2, ny2 - th*0.02);
  }

  // Player
  const px = offX + player.x * tw, py = offY + player.y * th;
  // glowing aura ring
  ctx.fillStyle = 'rgba(255,225,120,0.18)';
  ctx.beginPath();
  ctx.arc(px + tw/2, py + th/2, tw*0.5, 0, Math.PI*2);
  ctx.fill();
  // dark backing disc
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.arc(px + tw/2, py + th/2, tw*0.42, 0, Math.PI*2);
  ctx.fill();
  // Composite the hero as a little adventurer that visibly wears its equipped
  // (or cosmetic) head / chest / weapon — replacing the old single emoji.
  drawHeroSprite(px, py, tw, th, scale);

  // Player status effect icons
  const pEffects = statusEffects.filter(s => s.target === 'player');
  if (pEffects.length) {
    ctx.font = `${Math.round(tw * 0.28)}px serif`;
    ctx.textAlign = 'center';
    pEffects.forEach((s, i) => {
      ctx.fillText(s.effect === 'poison' ? '🧪' : '⚡', px + tw * 0.15 + i * tw * 0.25, py + th * 0.92);
    });
  }

  // Floating damage numbers
  const now = Date.now();
  floatingTexts = floatingTexts.filter(ft => now - ft.start < ft.duration);
  floatingTexts.forEach(ft => {
    const t = (now - ft.start) / ft.duration;
    const px = offX + ft.x * tw + tw / 2;
    const py = offY + ft.y * th - t * tw * 0.8;
    const alpha = 1 - t * t;
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.font = `${Math.round(tw * 0.28)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeText(ft.text, px, py);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, px, py);
    ctx.restore();
  });

  // Atmospheric colour wash for this floor, if any.
  if (floorTint) {
    ctx.fillStyle = floorTint;
    ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  }
}

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, start: Date.now(), duration: 800 });
}

// ══════════════════════════════════════════
// STATUS EFFECTS
// ══════════════════════════════════════════

function applyStatusEffect(target, effect, turns, source) {
  const existing = statusEffects.find(s => s.target === target && s.effect === effect);
  if (existing) { existing.turns = Math.max(existing.turns, turns); return; }
  statusEffects.push({ target, effect, turns, source });
}

function tickStatusEffects() {
  statusEffects = statusEffects.filter(s => {
    if (s.target === 'player') {
      if (s.effect === 'poison') {
        const dmg = 2 + dungeonLevel;
        player.hp = Math.max(1, player.hp - dmg);
        spawnFloatingText(player.x, player.y, `${dmg}`, '#44dd44');
        log(`🧪 Poison deals ${dmg} damage!`);
        updateBars();
      }
      if (s.effect === 'stun') {
        log('⚡ You are stunned and cannot move!');
      }
    } else {
      const e = s.target;
      if (e.dead) return false;
      if (s.effect === 'poison') {
        const dmg = 2 + dungeonLevel;
        e.hp -= dmg;
        spawnFloatingText(e.x, e.y, `${dmg}`, '#44dd44');
        log(`🧪 Poison deals ${dmg} to ${e.isBoss ? e.name : e.type}!`);
        if (e.hp <= 0) { e.dead = true; log(`${e.isBoss ? e.name : e.type} succumbed to poison!`, 'important'); }
      }
    }
    s.turns--;
    return s.turns > 0;
  });
}

function isPlayerStunned() {
  return statusEffects.some(s => s.target === 'player' && s.effect === 'stun');
}

function tryBossStatusProc(e) {
  if (!e.statusChance) return;
  if (Math.random() < e.statusChance) {
    const effect = Math.random() < 0.6 ? 'poison' : 'stun';
    const turns = effect === 'poison' ? 3 : 1;
    applyStatusEffect('player', effect, turns, e);
    const icon = effect === 'poison' ? '🧪' : '⚡';
    log(`${icon} ${e.name} inflicts ${effect}!`, 'important');
  }
}

function tryPlayerStatusProc(e) {
  const w = equipped.weapon;
  if (!w) return;
  const tierOrder = Object.keys(TIERS);
  const tierIdx = tierOrder.indexOf(w.tier);
  if (tierIdx >= 4 && Math.random() < 0.15) {
    const effect = Math.random() < 0.5 ? 'poison' : 'stun';
    const turns = effect === 'poison' ? 3 : 1;
    applyStatusEffect(e, effect, turns, 'player');
    const icon = effect === 'poison' ? '🧪' : '⚡';
    const label = e.isBoss ? e.name : e.type;
    log(`${icon} Your ${w.name} inflicts ${effect} on ${label}!`, 'loot');
  }
}

// ══════════════════════════════════════════
// SHRINES & BUFFS
// ══════════════════════════════════════════

// Brief full-screen colour flash for crits, low HP, and big events.
let flashTimer = null;
function screenFlash(color) {
  const el = document.getElementById('screen-flash');
  if (!el) return;
  el.style.background = `radial-gradient(circle, transparent 30%, ${color} 100%)`;
  el.classList.add('active');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('active'), 140);
}

// Shrines grant a temporary buff (lasts a few floors) or an instant effect.
function activateShrine(nx, ny) {
  const info = shrineData[ny+','+nx];
  mapData[ny][nx] = 0;            // shrine is spent
  delete shrineData[ny+','+nx];
  player.x = nx; player.y = ny;
  const kind = info ? info.kind : 'power';
  sfx(kind === 'blood' ? 'hurt' : 'shrine');
  switch (kind) {
    case 'power':
      buffs.power = 3;
      log('🔥 Shrine of Power! +50% damage for 3 floors.', 'important');
      screenFlash('#ff6600'); break;
    case 'guard':
      buffs.guard = 3;
      log('🛡 Shrine of Warding! Incoming damage −40% for 3 floors.', 'important');
      screenFlash('#3366ff'); break;
    case 'fortune':
      buffs.fortune = 3;
      log('🍀 Shrine of Fortune! Better loot for 3 floors.', 'important');
      screenFlash('#22cc66'); break;
    case 'blood': {
      // Risky: costs HP now, big XP reward.
      const cost = Math.floor(player.hp * 0.3);
      player.hp = Math.max(1, player.hp - cost);
      const xp = 30 * dungeonLevel;
      player.xp += xp;
      log(`🩸 Blood Shrine! Sacrificed ${cost} HP for ${xp} XP.`, 'important');
      screenFlash('#cc0000'); checkLevelUp(); break;
    }
    case 'wisdom': {
      const heal = Math.floor(player.maxHp * 0.5);
      player.hp = Math.min(player.maxHp, player.hp + heal);
      player.mp = player.maxMp;
      log(`📖 Shrine of Wisdom! Restored ${heal} HP and full MP.`, 'important');
      screenFlash('#aa66ff'); break;
    }
  }
  updateBars();
  saveGame();
  draw();
}

// Random one-off event when you step onto a new floor (~40% of the time).
// Small spontaneous twists — a windfall, a scare, or a fleeting blessing.
function maybeFloorEvent() {
  if (dungeonLevel <= 1) return;
  if (Math.random() >= 0.4) return;
  const roll = rnd(1, 6);
  switch (roll) {
    case 1: {
      const g = rnd(10, 25) + dungeonLevel * 3;
      player.gold += g;
      log(`💰 You stumble on a hidden coin cache — +${g} gold!`, 'important');
      break;
    }
    case 2: {
      const dmg = Math.min(player.hp - 1, rnd(5, 12) + dungeonLevel);
      if (dmg > 0) { player.hp -= dmg; spawnFloatingText(player.x, player.y, `${dmg}`, '#ff3344'); }
      log(`🪤 A hidden trap snaps shut — you take ${dmg} damage!`, 'important');
      screenFlash('#cc0000');
      break;
    }
    case 3: {
      const heal = Math.floor(player.maxHp * 0.2);
      player.hp = Math.min(player.maxHp, player.hp + heal);
      spawnFloatingText(player.x, player.y, `+${heal}`, '#44dd44');
      log(`🌿 An eerie calm settles over you — +${heal} HP.`, 'important');
      break;
    }
    case 4: {
      const xp = 15 * dungeonLevel;
      player.xp += xp;
      log(`💡 A flash of insight — +${xp} XP!`, 'important');
      checkLevelUp();
      break;
    }
    case 5:
      buffs.fortune = Math.max(buffs.fortune, 2);
      log('🍀 You feel lucky — better loot for the next 2 floors!', 'important');
      screenFlash('#22cc66');
      break;
    case 6:
      buffs.power = Math.max(buffs.power, 2);
      log('🔥 Battle fury surges — +50% damage for the next 2 floors!', 'important');
      screenFlash('#ff6600');
      break;
  }
}

// Count active shrine buffs down by one floor (called on descent).
function tickBuffs() {
  for (const k of Object.keys(buffs)) if (buffs[k] > 0) buffs[k]--;
}

// Consume one floor from the active pact. Called after a new floor is generated
// so the floor just entered still gets the effect, then expires cleanly.
function tickPact() {
  if (!pact) return;
  pact.floors--;
  if (pact.floors <= 0) {
    log(`${pact.icon} The ${pact.name} fades — the depths return to their natural state.`, 'important');
    pact = null;
  }
}

// ══════════════════════════════════════════
// MOVEMENT & COMBAT
// ══════════════════════════════════════════

// Heal a little each turn based on equipped REGEN, up to max HP.
function applyRegen() {
  // Spirit grants a small passive regen on top of any REGEN rolled on gear.
  const r = totalStat('REGEN') + Math.floor((player.attributes?.spirit||0) / 3);
  if (r > 0 && player.hp > 0 && player.hp < player.maxHp) {
    player.hp = Math.min(player.maxHp, player.hp + r);
    updateBars();
  }
}

function move(dx, dy) {
  if (isPlayerStunned()) {
    tickStatusEffects();
    applyRegen();
    draw();
    return;
  }
  tickStatusEffects();
  applyRegen();
  const nx = player.x + dx, ny = player.y + dy;
  if (nx < 0 || ny < 0 || nx >= MAP_W || ny >= MAP_H) return;

  const tile = mapData[ny][nx];
  if (tile === 1) return; // wall
  if (tile === 6) return; // deep water — impassable

  // Cracked wall → smash through it (opens a shortcut), then step in.
  if (tile === 10) {
    mapData[ny][nx] = 0;
    log('🧱 You smash through a cracked wall!', 'loot');
  }
  // Locked door → needs a key; otherwise it bars the way.
  if (tile === 11) {
    if (!hasKey) { log('🔒 A locked door bars the way — find its key.'); return; }
    hasKey = false;
    mapData[ny][nx] = 0;
    log('🔑 You unlock the vault door!', 'important');
  }

  // Enemy collision → attack
  const enemy = getEnemyAt(nx, ny);
  if (enemy) {
    attackEnemy(enemy);
    return;
  }

  // Merchant → open shop (don't step onto them)
  if (merchant && merchant.x === nx && merchant.y === ny) {
    openShop();
    return;
  }

  // Mystic → open the pact menu (don't step onto them)
  if (mystic && mystic.x === nx && mystic.y === ny) {
    openMystic();
    return;
  }

  // Shrine → activate it (grants a buff or instant effect), then stand on it.
  if (tile === 5) {
    activateShrine(nx, ny);
    return;
  }

  // Stairs
  if (tile === 2) {
    // Resolve an escort quest before leaving the floor.
    if (quest && quest.type === 'escort') {
      const near = (Math.abs(quest.npc.x - player.x) + Math.abs(quest.npc.y - player.y)) <= 3;
      if (quest.npc.following && near) {
        const r = questReward();
        const reward = generateItem(4, dungeonLevel + 1);
        inventory.push(reward);
        log(`✅ ${quest.npc.name} reached the stairs safely! +${r.gold}g, +${r.xp} XP, reward: ${logItem(reward)}`, 'important');
        screenFlash('#22cc66'); sfx('levelup'); checkLevelUp();
      } else {
        log(`😟 You descended without ${quest.npc.name} — the escort failed.`);
      }
      quest = null;
    }
    dungeonLevel++;
    statusEffects = [];
    tickBuffs();
    sfx('stairs');
    log(`Descended to dungeon level ${dungeonLevel}! You enter ${currentTheme().name}.`, 'important');
    player.x = 5; player.y = 5;
    generateMap();
    tickPact();   // floor just entered keeps the pact, then it counts down
    maybeFloorEvent();
    updateBars();
    saveGame();
    draw();
    return;
  }

  // Fountain of Healing → full heal + bonus potions, then dries up.
  if (tile === 3) {
    player.hp = player.maxHp;
    player.mp = player.maxMp;
    player.healPotions += 2;
    mapData[ny][nx] = 0; // fountain is spent
    hasFountain = false;
    player.x = nx; player.y = ny;
    sfx('potion');
    log(`⛲ The Fountain of Healing restores you fully! +2 ${logPotion('Health Potions')}.`, 'important');
    updateBars();
    saveGame();
    draw();
    return;
  }

  player.x = nx;
  player.y = ny;

  // Quest NPC contact: rescue/free them, or pick up an escort.
  if (quest && quest.npc.x === nx && quest.npc.y === ny) {
    if (quest.type === 'rescue') completeQuest('is safe and slips away with thanks!');
    else if (quest.type === 'jailbreak') completeQuest('is free and flees for the surface!');
    else if (quest.type === 'escort' && !quest.npc.following) {
      quest.npc.following = true;
      log(`🧭 ${quest.npc.name} falls in behind you — lead them to the stairs!`, 'important');
    }
  }

  // Auto-pickup food
  const fi = groundFood.findIndex(f => f.x === nx && f.y === ny);
  if (fi !== -1) {
    const f = groundFood.splice(fi, 1)[0];
    const healed = Math.min(f.heal, player.maxHp - player.hp);
    player.hp = Math.min(player.maxHp, player.hp + f.heal);
    if (healed > 0) spawnFloatingText(player.x, player.y, `+${healed}`, '#44dd44');
    log(`${f.emoji} Ate ${f.name}! +${healed} HP`, 'loot');
    updateBars();
  }

  // Auto-pickup coin piles
  const gi = groundGold.findIndex(g => g.x === nx && g.y === ny);
  if (gi !== -1) {
    const g = groundGold.splice(gi, 1)[0];
    player.gold += g.amount;
    sfx('gold');
    spawnFloatingText(player.x, player.y, `+${g.amount}g`, '#ffd24b');
    log(`🪙 Picked up ${g.amount} gold!`, 'loot');
    updateBars();
  }

  // Auto-pickup the vault key
  if (groundKey && groundKey.x === nx && groundKey.y === ny) {
    groundKey = null; hasKey = true;
    spawnFloatingText(player.x, player.y, '🗝️', '#ffd24b');
    log('🗝️ You found a vault key! Seek the locked door.', 'important');
  }

  // Lava → burns you (never lethal on its own).
  if (tile === 7) {
    const burn = 4 + dungeonLevel;
    player.hp = Math.max(1, player.hp - burn);
    spawnFloatingText(player.x, player.y, `${burn}`, '#ff7733');
    log(`🔥 The lava scorches you for ${burn}!`, 'important');
    updateBars();
  }
  // Spikes → stab you (never lethal on their own).
  if (tile === 8) {
    const stab = 3 + Math.floor(dungeonLevel / 2);
    player.hp = Math.max(1, player.hp - stab);
    spawnFloatingText(player.x, player.y, `${stab}`, '#ff3344');
    log(`🩸 Spikes stab you for ${stab}!`);
    updateBars();
  }
  // Teleporter → warp to its partner pad.
  if (tile === 9) {
    const dest = teleporters[ny + ',' + nx];
    if (dest) {
      player.x = dest.x; player.y = dest.y;
      spawnFloatingText(player.x, player.y, '🌀', '#bb88ff');
      log('🌀 A teleporter whisks you across the floor!', 'important');
    }
  }

  // Enemy AI
  enemies.filter(e => !e.dead).forEach(e => {
    const dist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
    if (dist <= 6) enemyMove(e);
  });
  moveEscort();

  checkPickupProximity();
  draw();
}

function getWeaponDamage() {
  const w = equipped.weapon;
  if (w && w.stats.DMG) {
    const [lo, hi] = w.stats.DMG.split('-').map(Number);
    return rnd(lo, hi);
  }
  return rnd(1, 3); // bare fists
}

// Sum a flat stat (ATK, DEF, etc.) across all equipped gear.
function totalStat(name) {
  let sum = 0;
  for (const slot of SLOT_KEYS) {
    const it = equipped[slot];
    if (it && typeof it.stats[name] === 'number') sum += it.stats[name];
  }
  return sum;
}

// Armor reduces incoming damage by a *percentage* with diminishing returns,
// measured against the attacker's level rather than subtracting a flat amount.
// Old behaviour (raw - DEF/2) let stacked armor floor almost every hit to 1, so
// you were never threatened at depth; this keeps armor valuable while ensuring
// deeper, higher-level foes always land a real blow. Returns final damage (≥1).
function mitigateDamage(raw, lvl) {
  const def = totalStat('DEF');
  const mitigation = def / (def + 18 + (lvl || dungeonLevel) * 6);
  return Math.max(1, Math.round(raw * (1 - mitigation)));
}

function attackEnemy(e) {
  // A readable label: bosses/elites use their name, plain foes use their sprite.
  // A level tag makes the depth-based difficulty curve legible at a glance.
  const lvlTag = e.level ? `Lv${e.level} ` : '';
  const label = e.isBoss ? `${lvlTag}${e.name} ${e.type}`
    : (e.isElite ? `${lvlTag}${e.name || 'Elite'} ${e.type}`
    : (e.isGoblin ? 'Treasure Goblin 👺'
    : (e.name ? `${lvlTag}${e.name} ${e.type}` : `${lvlTag}${e.type}`)));

  // Critical hits scale off your combined CRIT + LCK stats and Agility attribute.
  const critChance = Math.min(0.6, 0.05 + (totalStat('CRIT') + totalStat('LCK')) * 0.01 + (player.attributes?.agility||0) * 0.01);
  const isCrit = Math.random() < critChance;
  // Might adds flat attack power on top of weapon damage, level, and gear ATK.
  let dmg = getWeaponDamage() + player.level * 2 + totalStat('ATK') + (player.attributes?.might||0) * 2;
  // Difficulty floor: a plain swing can't exceed a quarter of the enemy's max
  // HP, so a normal fight always takes at least 4 hits. When a hit would cap,
  // jitter it to 80-100% of the cap so the numbers don't read as an exact
  // quarter every time (and it still never exceeds the cap).
  const hitCap = Math.max(1, Math.floor(e.maxHp / 4));
  if (dmg > hitCap) dmg = Math.max(1, Math.round(hitCap * (rnd(80, 100) / 100)));
  // ...but crits and the Power buff punch straight through that cap.
  if (buffs.power) dmg = Math.round(dmg * 1.5);   // Shrine of Power
  if (isCrit) dmg = Math.round(dmg * 2.2);
  e.hp -= dmg;
  sfx(isCrit ? 'crit' : 'attack');
  spawnFloatingText(e.x, e.y, isCrit ? `${dmg}!` : `${dmg}`, isCrit ? '#ffdd55' : '#fff');
  log(isCrit ? `💥 CRITICAL! ${HERO} hits ${label} for ${dmg}!` : `${HERO} hits ${label} for ${dmg} damage!`, isCrit ? 'important' : '');
  if (e.hp <= 0) {
    e.dead = true;
    const xpMult = e.isBoss ? 5 : (e.isElite ? 2 : 1);
    const goldMult = e.isBoss ? 3 : (e.isElite ? 2 : 1);
    const xp = Math.round(10 * dungeonLevel * xpMult * pfx('xp', 1));
    player.xp += xp;
    const gold = Math.round((rnd(2, 8) + dungeonLevel * 3) * goldMult * (floorMod.goldMult || 1) * pfx('gold', 1));
    player.gold += gold;
    spawnFloatingText(e.x + 0.35, e.y, `+${gold}g`, '#ffd24b');
    log(`${label} defeated! +${xp} XP, +${gold}g`, 'important');
    sfx(e.isBoss ? 'boss' : 'kill');
    if (e.isBoss) screenFlash('#ff3344');
    updateBars();
    // The floor modifier, an active Fortune buff, and any pact sweeten every drop roll.
    const lootMult = (floorMod.lootMult || 1) * (buffs.fortune ? 1.5 : 1) * pfx('loot', 1);
    // Drop a chest — bosses and elites always drop, with richer loot. The luck
    // value is how many rarity rolls the chest makes (more rolls = better odds).
    if (e.isBoss || e.isElite || Math.random() < 0.18 * lootMult) {
      let luck = e.isBoss ? 6 : (e.isElite ? 3 : 1);
      if (buffs.fortune) luck += 1;
      groundItems.push({ x: e.x, y: e.y, luck, ilvl: e.level || dungeonLevel });
      const fancy = luck > 1;
      log(`${fancy ? '🎁' : '🧰'} ${label} dropped a ${fancy ? 'glittering ' : ''}chest!`, 'loot');
    }
    if (Math.random() < 0.20 * lootMult) {
      player.healPotions++;
      log(`❤️ ${label} dropped a ${logPotion('Health Potion')}! (${player.healPotions} held)`, 'loot');
      updateBars();
    }
    if (Math.random() < 0.06) {
      const f = pick(FOODS);
      groundFood.push({ x: e.x, y: e.y, ...f });
      log(`${f.emoji} ${label} dropped ${f.name}!`, 'loot');
    }
    // Treasure Goblin jackpot — a fat gold burst plus a guaranteed rich chest.
    if (e.isGoblin) {
      const bonus = 30 + dungeonLevel * 8;
      player.gold += bonus;
      groundItems.push({ x: e.x, y: e.y, luck: 6, ilvl: e.level || dungeonLevel });
      spawnFloatingText(e.x, e.y, `+${bonus}g`, '#ffd24b');
      log(`💰 The Treasure Goblin bursts — +${bonus}g and a glittering chest!`, 'loot');
      updateBars();
    }
    // Vanishingly rare super-drop: the air shimmers and a fabled chest appears.
    if (Math.random() < 0.02) {
      groundItems.push({ x: e.x, y: e.y, luck: 6, ilvl: (e.level || dungeonLevel) + 1 });
      log('✨ The air shimmers — a fabled chest materializes!', 'important');
      screenFlash('#ffd24b');
    }
    checkLevelUp();
  } else {
    // Enemy strikes back. Damage scales with the enemy, mitigated by armor DEF.
    let raw = Math.round(e.dmg * rnd(80, 120) / 100);
    if (buffs.guard) raw = Math.round(raw * 0.6);   // Shrine of Warding
    const edm = mitigateDamage(raw, e.level);
    player.hp = Math.max(0, player.hp - edm);
    sfx('hurt');
    spawnFloatingText(player.x, player.y, `${edm}`, '#ff3344');
    log(`${label} hits ${HERO} back for ${edm}!`);
    if (player.hp <= player.maxHp * 0.25) screenFlash('#cc0000');
    tryBossStatusProc(e);
    updateBars();
    if (player.hp === 0) handleDeath();
  }
  tryPlayerStatusProc(e);
  saveGame();
  draw();
}

function enemyMove(e) {
  // Treasure goblins flee — they move directly away from you and never attack.
  const flee = e.isGoblin;
  const dx = (flee ? -1 : 1) * Math.sign(player.x - e.x);
  const dy = (flee ? -1 : 1) * Math.sign(player.y - e.y);
  // Try horizontal then vertical
  const options = [];
  if (dx !== 0) options.push([dx, 0]);
  if (dy !== 0) options.push([0, dy]);
  options.push([dx, dy]);
  for (const [mx, my] of options) {
    const nx = e.x+mx, ny = e.y+my;
    if (nx < 0||ny < 0||nx >= MAP_W||ny >= MAP_H) continue;
    if (mapData[ny][nx] !== 0) continue;
    if (getEnemyAt(nx,ny)) continue;
    if (merchant && merchant.x === nx && merchant.y === ny) continue;
    if (mystic && mystic.x === nx && mystic.y === ny) continue;
    // For diagonal moves, don't allow squeezing through a wall corner:
    // at least one of the two orthogonally-adjacent tiles must be open.
    if (mx !== 0 && my !== 0) {
      const sideClearX = mapData[e.y][e.x+mx] === 0;
      const sideClearY = mapData[e.y+my][e.x] === 0;
      if (!sideClearX && !sideClearY) continue;
    }
    if (nx === player.x && ny === player.y) {
      // Attack player
      let raw = Math.round(e.dmg * rnd(80, 120) / 100);
      if (buffs.guard) raw = Math.round(raw * 0.6);   // Shrine of Warding
      const dmg = mitigateDamage(raw, e.level);
      player.hp = Math.max(0, player.hp-dmg);
      sfx('hurt');
      spawnFloatingText(player.x, player.y, `${dmg}`, '#ff3344');
      log(`${e.name ? e.name + ' ' + e.type : e.type} attacks ${HERO} for ${dmg}!`);
      if (player.hp <= player.maxHp * 0.25) screenFlash('#cc0000');
      tryBossStatusProc(e);   // venomous/boss foes can inflict poison or stun
      updateBars();
      if (player.hp === 0) handleDeath();
      return;
    }
    e.x = nx; e.y = ny;
    return;
  }
}

function getEnemyAt(x,y) { return enemies.find(e=>!e.dead&&e.x===x&&e.y===y)||null; }

// Death has a real cost now: you lose half your gold and are pulled back to the
// floor's entrance with partial health. Potions and caution actually matter.
function handleDeath() {
  const lostGold = Math.floor(player.gold / 2);
  player.gold -= lostGold;
  player.hp = Math.floor(player.maxHp * 0.4);
  statusEffects = statusEffects.filter(s => s.target !== 'player');
  player.x = startPos.x; player.y = startPos.y;
  sfx('death');
  log(`💀 ${HERO} was slain! Lost ${lostGold}g and crawled back to the entrance.`, 'important');
  // Shove any enemies crowding the entrance off to a random floor tile.
  enemies.forEach(e => {
    if (!e.dead && Math.abs(e.x-startPos.x) + Math.abs(e.y-startPos.y) < 4) {
      const c = randomFloorTile(); if (c) { e.x = c.x; e.y = c.y; }
    }
  });
  updateBars();
  saveGame();
}

function checkPickupProximity() {
  // Loot underfoot is shown on the map; no need to nag about it.
}

// Advance the world one turn without the player moving: status ticks, regen,
// then nearby enemies act. Lets you stand still and let enemies close in.
function passTurn() {
  tickStatusEffects();
  applyRegen();
  enemies.filter(e => !e.dead).forEach(e => {
    const dist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
    if (dist <= 6) enemyMove(e);
  });
  moveEscort();
  draw();
  saveGame();
}

function pickup() {
  const idx = groundItems.findIndex(g => g.x===player.x && g.y===player.y);
  if (idx === -1) { log('You wait...'); passTurn(); return; }
  const chest = groundItems.splice(idx, 1)[0];

  // Rarely the chest is a Mimic — it springs to life and attacks.
  if (Math.random() < 0.10) {
    const mLevel = dungeonLevel + 1;
    const hp = Math.round((14 + mLevel * 8) * 2.4);
    const dmg = Math.round((4 + mLevel * 1.7) * 1.4);
    // Find an open tile next to the player for the mimic to lunge from.
    let placed = false;
    const spots = [[1,0],[-1,0],[0,1],[0,-1]].sort(() => Math.random() - 0.5);
    for (const [ox, oy] of spots) {
      const mx = player.x + ox, my = player.y + oy;
      if (mx>=0 && my>=0 && mx<MAP_W && my<MAP_H && mapData[my][mx]===0 && !getEnemyAt(mx,my)) {
        enemies.push({ x: mx, y: my, hp, maxHp: hp, dmg, type: '🧰', name: 'Mimic', level: mLevel, dead: false, isElite: true });
        placed = true; break;
      }
    }
    if (!placed) {
      // No room to spawn — it just bites you on the spot instead.
      const bite = mitigateDamage(dmg, mLevel);
      player.hp = Math.max(1, player.hp - bite);
      spawnFloatingText(player.x, player.y, `${bite}`, '#ff3344');
    }
    sfx('trap');
    log('🧰 It\'s a MIMIC! The chest lunges at you!', 'important');
    screenFlash('#cc0000');
    updateBars();
    saveGame();
    draw();
    return;
  }

  // Very small chance the chest is trapped.
  if (Math.random() < 0.07) {
    sfx('trap');
    if (Math.random() < 0.5) {
      const dmg = 4 + dungeonLevel * 2;
      player.hp = Math.max(1, player.hp - dmg);
      spawnFloatingText(player.x, player.y, `${dmg}`, '#ff3344');
      log(`💥 It was a trapped chest! It explodes for ${dmg} damage!`, 'important');
    } else {
      applyStatusEffect('player', 'poison', 3, null);
      log('☠️ A trapped chest bursts with poison gas!', 'important');
    }
    updateBars();
    saveGame();
    draw();
    return;
  }

  // Otherwise it rolls fresh loot when opened — luckier chests roll richer.
  const luck = chest.luck || 1;
  const fancy = luck > 1;

  // ~15% of chests surprise you with gold, a potion, or food instead of gear.
  if (Math.random() < 0.15) {
    sfx('gold');
    const surprise = rnd(1, 3);
    if (surprise === 1) {
      const g = rnd(15, 40) + dungeonLevel * 4;
      player.gold += g;
      log(`${fancy ? '🎁' : '🧰'} The chest was full of coins — +${g} gold!`, 'loot');
    } else if (surprise === 2) {
      player.healPotions++;
      log(`${fancy ? '🎁' : '🧰'} A ${logPotion('Health Potion')} sat inside! (${player.healPotions} held)`, 'loot');
    } else {
      const f = pick(FOODS);
      groundFood.push({ x: chest.x, y: chest.y, ...f });
      log(`${fancy ? '🎁' : '🧰'} Tucked inside: ${f.emoji} ${f.name} — grab it!`, 'loot');
    }
    updateBars();
    renderPanel();
    saveGame();
    draw();
    return;
  }

  const chestIlvl = chest.ilvl || dungeonLevel;
  const item = generateItem(luck, chestIlvl);
  inventory.push(item);
  recordWardrobe(item);
  sfx('loot');
  log(`${fancy ? '🎁' : '🧰'} Opened a ${fancy ? 'glittering ' : ''}chest: ${logItem(item)}`, 'loot');
  // Loot explosion: a lucky chest occasionally overflows with a bonus item.
  if (Math.random() < 0.12) {
    const bonus = generateItem(luck, chestIlvl);
    inventory.push(bonus);
    recordWardrobe(bonus);
    log(`✨ The chest overflows — bonus loot: ${logItem(bonus)}!`, 'important');
  }
  renderPanel();
  saveGame();
  draw();
}

function checkLevelUp() {
  const needed = player.level * 50;
  if (player.xp >= needed) {
    player.xp -= needed;
    player.level++;
    player.attrPoints = (player.attrPoints || 0) + ATTR_POINTS_PER_LEVEL;
    recomputeMaxStats();        // level grants more base HP/MP
    player.hp = player.maxHp;   // a level up fully restores you
    player.mp = player.maxMp;
    sfx('levelup');
    log(`⭐ LEVEL UP! You are now level ${player.level}!`, 'important');
    log(`💠 +${ATTR_POINTS_PER_LEVEL} attribute points — open the 🎒 bag's HERO tab to spend them.`, 'important');
    updateBars();
    renderPanel();
    saveGame();
    // Recurse in case multiple levels were gained from one big XP haul.
    checkLevelUp();
  }
}

// Spend one earned point to permanently raise a hero attribute.
function spendAttr(key) {
  if (!ATTRIBUTES[key]) return;
  if (!player.attrPoints || player.attrPoints <= 0) { log('No attribute points to spend.'); return; }
  if (!player.attributes) player.attributes = { might:0, vitality:0, agility:0, spirit:0 };
  player.attributes[key] = (player.attributes[key] || 0) + 1;
  player.attrPoints--;
  // Raising Vitality/Spirit immediately grants the extra HP/MP it unlocks.
  if (key === 'vitality') { const before = player.maxHp; recomputeMaxStats(); player.hp += (player.maxHp - before); }
  else if (key === 'spirit') { const before = player.maxMp; recomputeMaxStats(); player.mp += (player.maxMp - before); }
  log(`${ATTRIBUTES[key].label} raised to ${player.attributes[key]}.`, 'loot');
  updateBars();
  renderPanel();
  saveGame();
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════

function updateBars() {
  document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100)+'%';
  document.getElementById('hp-text').textContent = `${player.hp}/${player.maxHp}`;
  document.getElementById('mp-bar').style.width = (player.mp/player.maxMp*100)+'%';
  document.getElementById('mp-text').textContent = `${player.mp}/${player.maxMp}`;
  document.getElementById('gold-count').textContent = player.gold;

  // Header HUD: current floor, level + XP progress, enemies remaining.
  const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  setText('floor-num', dungeonLevel);
  setText('level-num', player.level);
  const xpBar = document.getElementById('xp-bar');
  if (xpBar) xpBar.style.width = Math.min(100, player.xp / (player.level * 50) * 100) + '%';
  setText('enemies-num', (enemies || []).filter(e => !e.dead).length);
  setText('power-num', playerPower());

  // Active mystic pact indicator (hidden when no pact is in effect).
  const pactHud = document.getElementById('pact-hud');
  if (pactHud) {
    if (pact) {
      pactHud.style.display = '';
      pactHud.firstChild.textContent = pact.icon + ' ';
      setText('pact-num', pact.floors);
      pactHud.title = `${pact.name} — ${pact.floors} floor${pact.floors === 1 ? '' : 's'} left`;
    } else {
      pactHud.style.display = 'none';
    }
  }

  // Nudge the HERO tab when there are unspent attribute points to spend.
  const heroTab = document.getElementById('tab-hero');
  if (heroTab) {
    const pts = player.attrPoints || 0;
    heroTab.textContent = pts > 0 ? `HERO (${pts})` : 'HERO';
    heroTab.classList.toggle('has-points', pts > 0);
  }

  const healLabel = document.getElementById('heal-label');
  const healBtn = document.querySelector('.heal-btn');
  if (healLabel) healLabel.textContent = player.healPotions || 0;
  if (healBtn) {
    healBtn.classList.toggle('empty', !player.healPotions);
    // Pulse the heal button when you're hurt and actually have a potion to use.
    healBtn.classList.toggle('urgent', player.healPotions > 0 && player.hp < player.maxHp * 0.35);
  }
  // Red vignette warns when health is critical.
  const vig = document.getElementById('low-hp-vignette');
  if (vig) vig.classList.toggle('active', player.hp > 0 && player.hp < player.maxHp * 0.25);
}

const HEAL_AMOUNT = 50;
function useHealthPotion() {
  if (!player.healPotions) { log('No health potions! Buy some from a merchant.'); return; }
  if (player.hp >= player.maxHp) { log('Already at full health.'); return; }
  player.healPotions--;
  player.hp = Math.min(player.maxHp, player.hp + HEAL_AMOUNT);
  sfx('potion');
  log(`❤️ Drank a ${logPotion('Health Potion')}. +${HEAL_AMOUNT} HP (${player.healPotions} left)`, 'loot');
  updateBars();
  saveGame();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-inv').classList.toggle('active', tab==='inv');
  document.getElementById('tab-equip').classList.toggle('active', tab==='equip');
  document.getElementById('tab-hero').classList.toggle('active', tab==='hero');
  renderPanel();
}

function renderPanel() {
  const el = document.getElementById('panel-content');
  if (currentTab === 'inv') {
    if (inventory.length === 0) {
      el.innerHTML = '<div id="empty-panel">No items yet.<br>Explore!</div>';
      return;
    }
    // Sort the displayed list by slot (head, chest, hands, …) while keeping each
    // row's original inventory index so equip/select still target the right item.
    const slotOrder = {};
    SLOT_KEYS.forEach((s, idx) => { slotOrder[s] = idx; });
    const rows = inventory
      .map((item, i) => ({ item, i }))
      .sort((a, b) => {
        const oa = a.item.slot in slotOrder ? slotOrder[a.item.slot] : 99;
        const ob = b.item.slot in slotOrder ? slotOrder[b.item.slot] : 99;
        return oa - ob;
      });
    el.innerHTML = rows.map(({ item, i }) => {
      const equipable = !!item.slot;
      const slotName = item.slot ? SLOTS[item.slot].label.replace(/^\S+\s/, '') : 'potion';
      // Compare this item's power to whatever currently fills its slot, so we can
      // flag upgrades and show the power swing (▲+5 / ▼-2).
      const ip = equipable ? itemPower(item) : 0;
      const equippedHere = equipable ? equipped[item.slot] : null;
      const delta = equipable ? ip - (equippedHere ? itemPower(equippedHere) : 0) : 0;
      const isUpgrade = equipable && delta > 0;
      let deltaTag = '';
      if (equippedHere) {
        const c = delta > 0 ? '#5ee08a' : (delta < 0 ? '#e0556b' : '#888');
        const arrow = delta > 0 ? '▲' : (delta < 0 ? '▼' : '=');
        deltaTag = ` <span style="color:${c}">${arrow}${delta>0?'+':''}${delta}</span>`;
      }
      const pwr = equipable ? `<span class="item-power">⚡${ip}${deltaTag}</span>` : '';
      return `
      <div class="loot-item item-${item.tier} ${selectedItem===i?'selected':''} ${isUpgrade?'upgrade':''}">
        <span class="loot-icon">${itemIcon(item)}</span>
        <div class="loot-info" onclick="selectItem(${i}, this)"
             onmouseenter="showTooltip(event,${i})" onmouseleave="hideTooltip()">
          <div class="item-name">${isUpgrade?'<span class="up-arrow">▲</span> ':''}${item.name}</div>
          <div class="item-type">${slotName}${pwr}</div>
        </div>
        ${equipable
          ? `<button class="row-btn equip-row-btn ${isUpgrade?'upgrade-btn':''}" onclick="quickEquip(${i})">${equippedHere && isUpgrade?'SWAP':'EQUIP'}</button>`
          : ''}
      </div>`;
    }).join('');
  } else if (currentTab === 'equip') {
    el.innerHTML = SLOT_KEYS.map(s => renderSlot(s, SLOTS[s].label)).join('') +
      `<div style="margin-top:8px;font-size:10px;color:#555">Tap EQUIP on any loot<br>item to gear up.</div>` +
      renderCosmetics();
  } else {
    renderHero(el);
  }
}

// HERO tab: overall power, attribute points, and the attributes you can raise.
function renderHero(el) {
  const a = player.attributes || { might:0, vitality:0, agility:0, spirit:0 };
  const pts = player.attrPoints || 0;
  const gearPower = SLOT_KEYS.reduce((s, k) => s + (equipped[k] ? itemPower(equipped[k]) : 0), 0);
  const rows = ATTR_KEYS.map(key => {
    const at = ATTRIBUTES[key];
    return `<div class="attr-row">
      <div class="attr-info">
        <div class="attr-name">${at.label}</div>
        <div class="attr-desc">${at.desc}</div>
      </div>
      <span class="attr-val">${a[key] || 0}</span>
      <button class="attr-plus" ${pts > 0 ? '' : 'disabled'} onclick="spendAttr('${key}')">+</button>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="hero-power">
      <div class="hp-label">⚡ POWER</div>
      <div class="hp-value">${playerPower()}</div>
    </div>
    <div class="hero-sub">Level ${player.level} · ${gearPower} from gear<br>Power = level + attributes + gear</div>
    <div class="hero-points">${pts > 0 ? `${pts} point${pts>1?'s':''} to spend!` : 'No points to spend — level up for more.'}</div>
    ${rows}`;
}

function renderSlot(slot, label) {
  const item = equipped[slot];
  return `<div class="equip-slot">
    <div class="slot-info" onclick="tapSlot('${slot}', this)"
         onmouseenter="hoverSlot(event,'${slot}')" onmouseleave="hideTooltip()">
      <span class="slot-label">${label}</span>
      <span class="loot-icon slot-icon">${item ? itemIcon(item) : SLOT_ICONS[slot]}</span>
      <span class="slot-item ${item ? 'item-'+item.tier : ''}">
        ${item ? item.name + ` <span class="item-power">⚡${itemPower(item)}</span>` : '<span class="slot-empty">— empty —</span>'}
      </span>
    </div>
    ${item ? `<button class="row-btn unequip-row-btn" onclick="unequip('${slot}')">✕</button>` : ''}
  </div>`;
}

// COSMETICS: change how the hero *looks* without changing what's equipped. Pick
// from the wardrobe of looks you've found, per visual slot (head / chest / weapon).
const COS_LABELS = { head: '🪖 Head', chest: '🛡 Chest', weapon: '⚔ Weapon' };
function renderCosmetics() {
  if (!player.cosmetics) player.cosmetics = { head:null, chest:null, weapon:null };
  if (!player.wardrobe) player.wardrobe = { head:[], chest:[], weapon:[] };
  const blocks = VISUAL_SLOTS.map(slot => {
    const looks = player.wardrobe[slot] || [];
    const override = player.cosmetics[slot] || null;
    const shown = visualIcon(slot);
    // "Match gear" chip (clears any override) is always offered first.
    let chips = `<button class="cos-chip gear ${override ? '' : 'sel'}"
        title="Match your equipped gear" onclick="pickCosmetic('${slot}','')">GEAR</button>`;
    // One tappable chip per discovered look.
    chips += looks.map(l =>
      `<button class="cos-chip ${override === l.icon ? 'sel' : ''}"
         title="${(l.name || '').replace(/"/g,'')}" onclick="pickCosmetic('${slot}','${l.icon}')">${l.icon}</button>`
    ).join('');
    const empty = looks.length ? '' :
      `<div class="cos-empty">Find ${COS_LABELS[slot].replace(/^\S+\s/, '').toLowerCase()} loot to unlock looks.</div>`;
    return `<div class="cos-block">
      <div class="cos-blk-head">
        <span class="cos-preview">${shown || '—'}</span>
        <span class="cos-slot-label">${COS_LABELS[slot]}</span>
      </div>
      <div class="cos-chips">${chips}</div>
      ${empty}
    </div>`;
  }).join('');
  return `<div class="cos-head">
    <div class="cos-title">👁 APPEARANCE</div>
    <div class="cos-sub">Tap a look to wear it — your sprite changes, but your equipped gear and stats don't.</div>
    ${blocks}
  </div>`;
}

// Wear a chosen look for a visual slot. An empty icon clears the override so the
// slot mirrors equipped gear again.
function pickCosmetic(slot, icon) {
  if (!VISUAL_SLOTS.includes(slot)) return;
  if (!player.cosmetics) player.cosmetics = { head:null, chest:null, weapon:null };
  player.cosmetics[slot] = icon || null;
  renderPanel();
  draw();         // restyle the sprite immediately
  saveGame();
}

// One-tap equip: route an item straight to its own slot.
function quickEquip(i) {
  const item = inventory[i];
  if (!item) return;
  const slot = item.slot;
  if (!slot) { log(`${logItem(item)} can't be equipped.`); return; }
  if (equipped[slot]) inventory.push(equipped[slot]); // swap old back into bag
  equipped[slot] = item;
  inventory.splice(i, 1);
  selectedItem = null;
  hideTooltip();
  sfx('equip');
  log(`Equipped: ${logItem(item)}`, 'loot');
  recordWardrobe(item);
  renderPanel();
  draw();          // re-skin the sprite with the newly worn gear
  saveGame();
}

function unequip(slot) {
  const item = equipped[slot];
  if (!item) return;
  inventory.push(item);
  equipped[slot] = null;
  hideTooltip();
  log(`Unequipped: ${logItem(item)}`);
  renderPanel();
  draw();          // sprite drops the gear it was wearing
  saveGame();
}

function tapSlot(slot, el) {
  // Toggle the equipped item's stat tooltip.
  if (tooltipShowing === 'slot:'+slot) { hideTooltip(); return; }
  const item = equipped[slot];
  if (item) {
    showTooltipForItem(item, el);
    tooltipShowing = 'slot:'+slot;
  }
}

// Desktop hover for gear slots (mirrors the loot list). Doesn't set
// tooltipShowing so it stays a transient preview that clears on mouseleave.
function hoverSlot(e, slot) {
  if (tooltipShowing) return; // don't fight a tapped-open tooltip
  const item = equipped[slot];
  if (item) showTooltipForItem(item, e.currentTarget);
}

function selectItem(i, el) {
  // Toggle: tapping the already-open item again closes its tooltip.
  if (selectedItem === i && tooltipShowing === 'item:'+i) {
    selectedItem = null;
    hideTooltip();
    renderPanel();
    return;
  }
  selectedItem = i;
  // Capture the row's screen position before renderPanel() rebuilds (detaches) it.
  const anchorTop = el ? el.getBoundingClientRect().top : null;
  renderPanel();
  showTooltipForItem(inventory[i], anchorTop);
  tooltipShowing = 'item:'+i;
}

// ── TOOLTIP ──
const ttEl = document.getElementById('tooltip');
let tooltipShowing = null; // 'item:N' or 'slot:weapon' etc, or null

function showTooltip(e, i) {
  showTooltipForItem(inventory[i], e.currentTarget);
}

// Place the tooltip just left of the side panel, vertically aligned with the
// row/slot it describes, so it never overlaps the drawer or floats in the
// middle of the screen. Falls back to a centered position when there isn't
// room to the left (narrow / mobile screens) or no anchor is given.
function positionTooltip(anchor) {
  const gap = 8;
  const tt = ttEl.getBoundingClientRect();
  const panel = document.getElementById('side-panel');
  const pr = panel.getBoundingClientRect();
  // anchor may be a live element, a captured top coordinate (number), or null.
  let anchorTop = null;
  if (typeof anchor === 'number') {
    anchorTop = anchor;
  } else if (anchor && typeof anchor.getBoundingClientRect === 'function') {
    const r = anchor.getBoundingClientRect();
    // A re-rendered row leaves a detached element with an all-zero rect; ignore it.
    if (r.width || r.height || r.top) anchorTop = r.top;
  }
  let left, top;
  if (anchorTop !== null) {
    left = pr.left - tt.width - gap; // tuck it to the left of the open drawer
    top = anchorTop;
    if (left < gap) left = Math.max(gap, (window.innerWidth - tt.width) / 2);
  } else {
    left = Math.max(gap, (window.innerWidth - tt.width) / 2);
    top = 70;
  }
  // Keep the whole tooltip on screen.
  left = Math.min(left, window.innerWidth - tt.width - gap);
  left = Math.max(gap, left);
  top = Math.min(top, window.innerHeight - tt.height - gap);
  top = Math.max(gap, top);
  ttEl.style.left = left + 'px';
  ttEl.style.top = top + 'px';
}

function showTooltipForItem(item, anchor) {
  if (!item) return;
  const tier = TIERS[item.tier];
  const stats = Object.entries(item.stats).map(([k,v]) => {
    // DMG is a range string like "8-12"; others are flat numbers (negative on a curse).
    const negative = (typeof v === 'number') && v < 0;
    const val = (typeof v === 'string') ? v : (v < 0 ? '' : '+') + v;
    const style = negative ? ' style="color:#e0556b"' : '';
    return `<div class="tt-stat"${style}>${val} ${k}</div>`;
  }).join('') || '<div class="tt-stat" style="color:#666">No bonuses</div>';
  const power = item.slot ? itemPower(item) : 0;
  // Compare against the currently-equipped piece in the same slot, if any.
  let powerDelta = '';
  if (item.slot && equipped[item.slot] && equipped[item.slot] !== item) {
    const d = power - itemPower(equipped[item.slot]);
    if (d !== 0) powerDelta = ` <span style="color:${d>0?'#5ee08a':'#e0556b'}">(${d>0?'+':''}${d})</span>`;
  }
  // Item level: drives raw stat size, so it's worth surfacing alongside power.
  const ilvlLine = (item.slot && item.ilvl)
    ? `<span style="color:#7fb0ff;font-weight:bold">ilvl ${item.ilvl}</span>` : '';
  ttEl.innerHTML = `
    <div class="tt-name" style="color:${tier.color}">${item.name}</div>
    <div class="tt-tier" style="color:${tier.color}">${item.slot ? SLOTS[item.slot].label : 'potion'}${ilvlLine ? ' · ' + ilvlLine : ''}</div>
    ${item.slot ? `<div style="color:#ffd24b;font-weight:bold;font-size:11px;margin:3px 0">⚡ Power: ${power}${powerDelta}</div>` : ''}
    ${stats}
    <div style="color:#c8a84b;font-size:10px;margin-top:3px">Value: ${item.value}g</div>
    <div class="tt-flavor">${item.flavor}</div>
    <div style="color:#555;font-size:9px;margin-top:5px">Tap anywhere to close</div>`;
  ttEl.style.display = 'block';
  // Measure after it's visible, then anchor it relative to the panel/row.
  positionTooltip(anchor);
}

function hideTooltip() { ttEl.style.display = 'none'; tooltipShowing = null; }

// Dismiss the tooltip when tapping anywhere (the tooltip, the map, the log, etc.),
// except when tapping a loot item or gear slot (those manage it themselves).
document.addEventListener('click', (e) => {
  if (ttEl.style.display === 'block' &&
      !e.target.closest('.loot-info') &&
      !e.target.closest('.slot-info') &&
      !e.target.closest('.row-btn') &&
      !e.target.closest('.tab-btn')) {
    hideTooltip();
    if (selectedItem !== null) { selectedItem = null; renderPanel(); }
  }
}, true);

// ── LOG ──
function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="log-line ${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// Potions get their own signature colour wherever they're named in the log.
const POTION_COLOR = '#ff5ec4';
// Wrap an item's name in its rarity tier colour for chat-log mentions.
function logItem(item) {
  const c = (TIERS[item.tier] || TIERS.normal).color;
  return `<span style="color:${c}">${item.name}</span>`;
}
// Wrap a potion label in the shared potion colour for chat-log mentions.
function logPotion(label) {
  return `<span style="color:${POTION_COLOR}">${label}</span>`;
}

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const handler = () => {
    const dir = btn.dataset.dir;
    if (dir === 'up')     move(0,-1);
    if (dir === 'down')   move(0, 1);
    if (dir === 'left')   move(-1,0);
    if (dir === 'right')  move(1, 0);
    if (dir === 'pickup') pickup();
  };
  btn.addEventListener('click', handler);
});

document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp'||e.key==='w')    move(0,-1);
  if (e.key==='ArrowDown'||e.key==='s')  move(0,1);
  if (e.key==='ArrowLeft'||e.key==='a')  move(-1,0);
  if (e.key==='ArrowRight'||e.key==='d') move(1,0);
  if (e.key===' '||e.key==='f')          pickup();
  if (e.key==='q'||e.key==='Q')          useHealthPotion();
  if (e.key==='b'||e.key==='B'||e.key==='i'||e.key==='I') togglePanel();
});

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════

function rnd(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ══════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════

const SAVE_KEY = 'dungeonLoot_save_v1';

function saveGame() {
  try {
    const data = {
      player, inventory, equipped, dungeonLevel, buffs, pact,
      ts: Date.now(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {
    // localStorage unavailable (e.g. inside artifact preview) — fail silently
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.player) return false;
    player = data.player;
    if (player.gold == null) player.gold = 0;
    if (player.healPotions == null) player.healPotions = 0;
    if (player.healthPotionsBought == null) player.healthPotionsBought = 0;
    if (player.manaPotions == null) player.manaPotions = 0;
    // Migrate saves that predate hero attributes.
    if (!player.attributes) player.attributes = { might:0, vitality:0, agility:0, spirit:0 };
    for (const k of ['might','vitality','agility','spirit']) if (player.attributes[k] == null) player.attributes[k] = 0;
    if (player.attrPoints == null) player.attrPoints = 0;
    inventory = (data.inventory || []).filter(it => it && it.slot); // drop legacy typeKey-only items
    // Rebuild equipped into the new 7-slot shape; salvage any still-valid pieces into the bag.
    const freshEquipped = { head:null, chest:null, hands:null, legs:null, weapon:null, ring:null, amulet:null };
    const old = data.equipped || {};
    Object.values(old).forEach(it => {
      if (it && it.slot && freshEquipped.hasOwnProperty(it.slot) && !freshEquipped[it.slot]) {
        freshEquipped[it.slot] = it;
      } else if (it && it.slot) {
        inventory.push(it);
      }
    });
    equipped = freshEquipped;
    // Migrate saves that predate cosmetics: ensure the shape exists, then seed the
    // wardrobe from whatever gear the player is already carrying or wearing.
    if (!player.cosmetics) player.cosmetics = { head:null, chest:null, weapon:null };
    if (!player.wardrobe) player.wardrobe = { head:[], chest:[], weapon:[] };
    for (const s of VISUAL_SLOTS) if (!player.wardrobe[s]) player.wardrobe[s] = [];
    inventory.forEach(recordWardrobe);
    Object.values(equipped).forEach(recordWardrobe);
    dungeonLevel = data.dungeonLevel || 1;
    // Restore shrine buffs, tolerating older saves that predate them.
    buffs = Object.assign({ power: 0, guard: 0, fortune: 0 }, data.buffs || {});
    // Restore an active mystic pact, tolerating older saves (and dropping a
    // malformed one rather than letting it break floor generation).
    pact = (data.pact && data.pact.fx && data.pact.floors > 0) ? data.pact : null;
    // Recompute derived max HP/MP from the (possibly updated) formula so older
    // saves line up with the current attribute system, then clamp current values.
    recomputeMaxStats();
    if (player.hp == null || player.hp > player.maxHp) player.hp = player.maxHp;
    if (player.mp == null || player.mp > player.maxMp) player.mp = player.maxMp;
    // Always spawn at the safe start tile on a freshly generated floor
    player.x = 5; player.y = 5;
    return true;
  } catch (e) {
    return false;
  }
}

function wipeSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  location.reload();
}

let newGameArmed = false;
function confirmNewGame() {
  const btn = document.querySelector('.newgame-action');
  const label = btn.querySelector('.action-label');
  if (!newGameArmed) {
    newGameArmed = true;
    btn.classList.add('armed');
    label.textContent = 'SURE?';
    log('Tap SURE? again to wipe your save and start over.', 'important');
    setTimeout(() => {
      newGameArmed = false;
      btn.classList.remove('armed');
      label.textContent = 'NEW';
    }, 3000);
    return;
  }
  wipeSave();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

const hadSave = loadGame();
generateMap();
draw();
updateBars();
renderPanel();

if (hadSave) {
  log(`Welcome back, level ${player.level} adventurer.`, 'important');
  log(`Resuming on dungeon level ${dungeonLevel}. Your gear is intact.`);
} else {
  log('Welcome to the dungeon. Move to explore. USE to open chests.', 'important');
  log('Reach the ▼ stairs to descend deeper.');
}
log('Progress auto-saves automatically as you play.');
log('Tap 🎒 BAG (bottom-right) to open your loot.');
log(`Tap the ❤️ flask to drink a ${logPotion('Health Potion')} when you're hurt. Enemies hit hard!`);
log('⌨️ Keys: Q drink potion · B open bag · Space/F use.');
log('⚡ Each item has a Power value; your total Power blends level, gear, and attributes.');
log('💠 Level up to earn points, then raise attributes in the bag\'s HERO tab.');

// Reflect any saved mute preference on the SOUND button, then arm the audio:
// browsers won't let sound start until the player interacts, so the first
// gesture resumes the context and kicks off the looping music.
updateSoundButton();
['pointerdown', 'keydown', 'touchstart'].forEach(ev =>
  window.addEventListener(ev, audioUnlock, { passive: true }));

// Redraw once layout has settled so the camera fits the real canvas size.
// On the web layout, also open + populate the permanent loot drawer.
syncWebPanel();
requestAnimationFrame(() => { resizeCanvas(); draw(); });
window.addEventListener('load', () => { syncWebPanel(); resizeCanvas(); draw(); });

// Gentle animation loop: only repaints while a merchant is on the floor,
// so their robe glow pulses. Idle otherwise to save battery.
let lastPulse = 0;
function pulseLoop(ts) {
  const hasElite = enemies.some(e => !e.dead && e.isElite);
  const hasShrine = Object.keys(shrineData).length > 0;
  if ((merchant || mystic || hasFountain || hasShrine || quest || floatingTexts.length || statusEffects.length || hasElite) && ts - lastPulse > 60) { lastPulse = ts; draw(); }
  requestAnimationFrame(pulseLoop);
}
requestAnimationFrame(pulseLoop);
</script>
