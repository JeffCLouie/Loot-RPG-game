// ── CRAFTSMAN (Forge) — craft blank gear from scratch using materials ──
// Replaces the old blacksmith upgrade station. You pick an item type, a base
// look, and a rarity (how many empty modifier slots it carries), then pay
// materials + gold to forge a *blank* piece geared to your current depth: just
// its headline (weapon damage / armor defense), with no affixes. Take it to the
// 🪄 Enchanter to fill in modifiers. Crafted gear is named "Crafted <Type>" and
// flagged so it always reads as player-made (with a 🔨 badge) on top of its
// normal rarity colour.

// Rarities you can craft, cheapest first (junk & unique are not craftable).
const CRAFT_TIERS = ['normal', 'uncommon', 'rare', 'epic', 'legendary'];
let forgeSlot = 'weapon';
let forgeBase = null;   // chosen base name within the slot (drives look + name)
let forgeTier = 'normal';

// Crafted gear is geared to your deepest reached / current return depth, like
// the town merchant's stock — so the Forge stays relevant as you descend.
function craftIlvl() { return Math.max(1, Math.max(dungeonReturn || 1, player.maxFloor || 1)); }

// Material + gold cost to craft, scaling with rarity and item level. Higher
// rarities pull in higher-tier materials: Scrap always, Core at rare+, and a
// Chaos Orb at legendary.
function craftCost(tier) {
  const ilvl = craftIlvl();
  const rank = CRAFT_TIERS.indexOf(tier);            // 0 (normal) .. 4 (legendary)
  const f = 1 + ilvl * 0.12;
  const cost = {
    gold:  Math.round((25 + rank * 30) * f),
    scrap: Math.round((4 + rank * 5) * f),
  };
  if (rank >= 2) cost.core  = Math.round((1 + (rank - 2) * 2) * (1 + ilvl * 0.05)); // rare+
  if (rank >= 4) cost.chaos = 1;                                                     // legendary
  return cost;
}

function openForge() { forgeBase = null; openTownModal('🔨 Craftsman'); renderForge(); }
function forgeSelectSlot(slot) { forgeSlot = slot; forgeBase = null; renderForge(); }
function forgeSelectBase(name) { forgeBase = name; renderForge(); }
function forgeSelectTier(tier) { forgeTier = tier; renderForge(); }

function renderForge() {
  if (!CRAFT_TIERS.includes(forgeTier)) forgeTier = 'normal';
  if (!SLOT_KEYS.includes(forgeSlot)) forgeSlot = 'weapon';
  const names = SLOTS[forgeSlot].names;
  if (!forgeBase || !names.includes(forgeBase)) forgeBase = names[0];

  const slotBtns = SLOT_KEYS.map(s =>
    `<button class="forge-opt ${s === forgeSlot ? 'on' : ''}" onclick="forgeSelectSlot('${s}')">${SLOTS[s].label}</button>`
  ).join('');
  const baseBtns = names.map(n =>
    `<button class="forge-opt ${n === forgeBase ? 'on' : ''}" onclick="forgeSelectBase('${n}')">${n}</button>`
  ).join('');
  const tierBtns = CRAFT_TIERS.map(t => {
    const caps = TIER_AFFIX_CAPS[t] || { stat: 0, attr: 0 };
    return `<button class="forge-opt ${t === forgeTier ? 'on' : ''}" style="${t === forgeTier ? '' : `color:${TIERS[t].color}`}" onclick="forgeSelectTier('${t}')">
       <span style="color:${TIERS[t].color};font-size:16px">●</span>
       <span style="font-size:9px;color:#b9a98a">${caps.stat}+${caps.attr}</span></button>`;
  }).join('');

  const cost = craftCost(forgeTier);
  const afford = canAfford(cost);
  const preview = craftBlankItem(forgeSlot, forgeTier, forgeBase);
  const caps = TIER_AFFIX_CAPS[forgeTier] || { stat: 0, attr: 0 };

  setTownContent(`
    <div class="town-blurb">The Craftsman forges a <b>blank</b> piece at your current depth (ilvl ${craftIlvl()}) — just its base damage or defense, with empty modifier slots. Take it to the 🪄 Enchanter to fill them in. Rarity sets how many modifiers it can hold.</div>
    <div class="forge-label">Item type</div>
    <div class="forge-grid forge-slots">${slotBtns}</div>
    <div class="forge-label">Base</div>
    <div class="forge-grid forge-bases">${baseBtns}</div>
    <div class="forge-label">Rarity <span style="opacity:.6">(stat + attr slots)</span></div>
    <div class="forge-grid forge-tiers">${tierBtns}</div>
    <div class="shop-row" style="margin-top:10px">
      <span class="loot-icon">${iconMarkup(itemIcon(preview), tierColor(preview))}</span>
      <div class="shop-row-info item-${preview.tier}">
        <div class="shop-row-name">${preview.name}${craftedMark(preview)}</div>
        <div class="shop-row-stats">${itemStatLine(preview)} · ${caps.stat} stat / ${caps.attr} attr slots</div>
      </div>
    </div>
    <div class="shop-row">
      <div class="shop-row-info"><div class="shop-row-name">Forge cost</div>
        <div class="shop-row-sub">${costLabel(cost)}</div></div>
      <button class="shop-buy-btn" ${afford ? '' : 'disabled'} onclick="craftItem()">🔨 FORGE</button>
    </div>`);
}

// Build a blank item: headline stat only (weapon DMG / armor DEF, gloves +ATK),
// no bonus affixes. Deterministic so the Forge preview matches what you'll get.
function craftBlankItem(slot, tier, baseName) {
  const lvl = craftIlvl();
  const stats = {}, attrs = {};
  const mult = tierMult(tier);
  const dmgMult = { junk: 0.55, normal: 0.8, uncommon: 1, rare: 1.3, epic: 1.65, legendary: 2.1, unique: 2.6 }[tier];
  if (slot === 'weapon') {
    const base = Math.max(1, Math.floor((2 + lvl * 1.2) * dmgMult));
    const spread = Math.max(1, Math.floor(base * 0.4));
    stats.DMG = `${base}-${base + spread}`;
  } else if (slot === 'head' || slot === 'chest' || slot === 'hands' || slot === 'legs') {
    const slotDef = { chest: 1.3, legs: 1.0, head: 0.8, hands: 0.7 }[slot];
    stats.DEF = Math.max(1, Math.floor((1 + lvl) * mult * slotDef));
    if (slot === 'hands') stats.ATK = Math.max(1, Math.floor((1 + lvl * 0.35) * mult * 0.6));
  }
  const baseValue = { junk: 1, normal: 5, uncommon: 20, rare: 80, epic: 300, legendary: 1200, unique: 5000 }[tier];
  const value = Math.round(baseValue * (1 + lvl * 0.12));
  return {
    id: Math.random(), name: 'Crafted ' + baseName, tier, slot, ilvl: lvl,
    stats, attrs, value, crafted: true, flavor: 'Forged by your own hand.',
    icon: ITEM_ICONS[baseName] || SLOT_ICONS[slot],
  };
}

function craftItem() {
  const cost = craftCost(forgeTier);
  if (!canAfford(cost)) return;
  const item = craftBlankItem(forgeSlot, forgeTier, forgeBase);
  spendCost(cost);
  inventory.push(item);
  sfx('equip');
  log(`🔨 You forge a ${item.name} (ilvl ${item.ilvl}). Take it to the 🪄 Enchanter to add modifiers.`, 'loot');
  updateBars(); renderPanel(); renderForge(); saveGame();
}

// ── HEALER — rest to full, cure ailments, stock potions ──
function openHealer() { openTownModal('⛑️ Healer'); renderHealer(); }
function renderHealer() {
  const full = player.hp >= player.maxHp && player.mp >= player.maxMp;
  const potHeal = 25 + (player.maxFloor || 1) * 5;
  const potMana = 20 + (player.maxFloor || 1) * 5;
  setTownContent(`
    <div class="town-blurb">The healer mends your wounds and sells restoratives for the road.</div>
    <div class="shop-row">
      <span class="loot-icon">❤️</span>
      <div class="shop-row-info"><div class="shop-row-name">Full Rest &amp; Cure</div>
        <div class="shop-row-sub">Restore all HP/MP and clear poison &amp; curses</div></div>
      <span class="shop-price">Free</span>
      <button class="shop-buy-btn" ${full ? 'disabled' : ''} onclick="restHeal()">REST</button>
    </div>
    <div class="shop-row">
      <span class="loot-icon">🧪</span>
      <div class="shop-row-info"><div class="shop-row-name">Health Potion</div>
        <div class="shop-row-sub">Restores ${Math.round(HEAL_PERCENT * 100)}% HP (you hold ${player.healPotions || 0})</div></div>
      <span class="shop-price">${potHeal}g</span>
      <button class="shop-buy-btn" ${player.gold >= potHeal ? '' : 'disabled'} onclick="buyTownPotion('heal',${potHeal})">BUY</button>
    </div>
    <div class="shop-row">
      <span class="loot-icon">🔷</span>
      <div class="shop-row-info"><div class="shop-row-name">Mana Potion</div>
        <div class="shop-row-sub">Drink with E for +${MANA_AMOUNT} MP (you hold ${player.manaPotions || 0})</div></div>
      <span class="shop-price">${potMana}g</span>
      <button class="shop-buy-btn" ${player.gold >= potMana ? '' : 'disabled'} onclick="buyTownPotion('mana',${potMana})">BUY</button>
    </div>`);
}
function restHeal() {
  if (player.hp >= player.maxHp && player.mp >= player.maxMp) return;
  player.hp = player.maxHp; player.mp = player.maxMp;
  statusEffects = statusEffects.filter(s => s.target !== 'player');
  sfx('potion');
  log('⛑️ The healer restores you to full and cleanses every ailment.', 'loot');
  updateBars(); renderHealer(); saveGame();
}
function buyTownPotion(which, cost) {
  if (player.gold < cost) return;
  player.gold -= cost;
  if (which === 'heal') { player.healPotions++; player.healthPotionsBought++; log(`Bought a ${logPotion('Health Potion')}. (${player.healPotions} held)`, 'loot'); }
  else { player.manaPotions++; log(`Bought a ${logPotion('Mana Potion')}. (${player.manaPotions} held)`, 'loot'); }
  sfx('buy');
  updateBars(); renderHealer(); saveGame();
}

// ── STASH (Vault Keeper) — a safe place for gold & gear ──
// Everything stored here lives entirely off your character: stashed gold is
// never spent at merchants and never lost on death, and stashed items don't
// appear in your bag or the sell list. Deposit when you visit town, withdraw
// when you need it.
function openStash() { openTownModal('🏦 Stash Vault'); renderStash(); }
function stashItemRow(item, action, btnLabel, btnClass) {
  const upg = item.upgrades ? ` <span style="color:#ffd24b">+${item.upgrades}</span>` : '';
  const stats = item.stats ? itemStatLine(item) : '';
  const sub = item.slot ? SLOTS[item.slot].label.replace(/^\S+\s/, '') : 'potion';
  return `<div class="shop-row">
    <span class="loot-icon">${iconMarkup(itemIcon(item), tierColor(item))}</span>
    <div class="shop-row-info item-${item.tier}">
      <div class="shop-row-name">${item.name}${upg}</div>
      <div class="shop-row-sub">${sub}</div>
      ${stats ? `<div class="shop-row-stats">${stats}</div>` : ''}
    </div>
    <button class="${btnClass}" onclick="${action}">${btnLabel}</button>
  </div>`;
}
function renderStash() {
  const g = stash.gold || 0;
  const stored = stash.items.length
    ? stash.items.map((it, i) => stashItemRow(it, `stashWithdrawItem(${i})`, 'TAKE', 'shop-buy-btn')).join('')
    : '<div class="shop-empty">The vault is empty.</div>';
  const bag = inventory.length
    ? inventory.map((it, i) => stashItemRow(it, `stashDepositItem(${i})`, 'STORE', 'shop-sell-btn')).join('')
    : '<div class="shop-empty">Your bag is empty.</div>';
  setTownContent(`
    <div class="town-blurb">The Vault Keeper guards your fortune. Gold and gear stored here are kept completely safe — never spent at the shops and never lost when you fall in the dungeon.</div>
    <div class="shop-row">
      <span class="loot-icon">🏦</span>
      <div class="shop-row-info">
        <div class="shop-row-name">Stashed gold: <span style="color:var(--gold)">${g}g</span></div>
        <div class="shop-row-sub">Carried: ${player.gold}g</div>
      </div>
    </div>
    <div class="stash-gold-bar">
      <input id="stash-gold-amt" type="number" min="1" placeholder="amount" />
      <button class="shop-buy-btn" onclick="stashDepositGold()">DEPOSIT</button>
      <button class="shop-buy-btn" onclick="stashWithdrawGold()">WITHDRAW</button>
    </div>
    <div class="stash-gold-bar">
      <button class="shop-sell-all-btn" onclick="stashDepositGold(player.gold)">DEPOSIT ALL</button>
      <button class="shop-sell-all-btn" onclick="stashWithdrawGold(stash.gold)">WITHDRAW ALL</button>
    </div>
    <div class="stash-section-title">📦 In the Vault (${stash.items.length})</div>
    ${stored}
    <div class="stash-section-title">🎒 Your Bag (${inventory.length})</div>
    ${bag}`);
}
function stashGoldAmount(amt) {
  if (amt != null) return Math.floor(amt);
  const el = document.getElementById('stash-gold-amt');
  return Math.floor(parseInt(el && el.value, 10));
}
function stashDepositGold(amt) {
  amt = Math.min(stashGoldAmount(amt), player.gold);
  if (!amt || amt <= 0) return;
  player.gold -= amt;
  stash.gold = (stash.gold || 0) + amt;
  sfx('buy');
  log(`🏦 Deposited ${amt}g into the vault. (${stash.gold}g stored)`, 'loot');
  updateBars(); renderStash(); saveGame();
}
function stashWithdrawGold(amt) {
  amt = Math.min(stashGoldAmount(amt), stash.gold || 0);
  if (!amt || amt <= 0) return;
  stash.gold -= amt;
  player.gold += amt;
  sfx('buy');
  log(`🏦 Withdrew ${amt}g from the vault. (${stash.gold}g stored)`, 'loot');
  updateBars(); renderStash(); saveGame();
}
function stashDepositItem(i) {
  const item = inventory[i];
  if (!item) return;
  inventory.splice(i, 1);
  stash.items.push(item);
  sfx('equip');
  log(`🏦 Stored ${logItem(item)} in the vault.`);
  renderStash(); renderPanel(); saveGame();
}
function stashWithdrawItem(i) {
  const item = stash.items[i];
  if (!item) return;
  stash.items.splice(i, 1);
  inventory.push(item);
  recordWardrobe(item);
  sfx('equip');
  log(`🏦 Took ${logItem(item)} from the vault.`);
  renderStash(); renderPanel(); saveGame();
}

// ── TRAINER — respec spent attribute points ──
function respecCost() {
  const spent = spentAttrPoints();
  return 50 + spent * 20 + player.level * 5;
}
function openTrainer() { openTownModal('🎓 Trainer'); renderTrainer(); }
function renderTrainer() {
  const a = player.attributes || {};
  const spent = spentAttrPoints();
  const cost = respecCost();
  const rows = ATTR_KEYS.map(k => `<div class="shop-row">
      <div class="shop-row-info"><div class="shop-row-name">${ATTRIBUTES[k].label}: ${a[k] || 0}</div>
      <div class="shop-row-sub">${ATTRIBUTES[k].desc}</div></div></div>`).join('');
  setTownContent(`
    <div class="town-blurb">The trainer can unlearn your attributes, returning all ${spent} spent point${spent === 1 ? '' : 's'} to spend anew (you have ${player.attrPoints || 0} unspent).</div>
    ${rows}
    <div class="shop-row">
      <span class="loot-icon">🔄</span>
      <div class="shop-row-info"><div class="shop-row-name">Respec Attributes</div>
        <div class="shop-row-sub">Refund every point spent above the base ${ATTR_BASE}</div></div>
      <span class="shop-price">${cost}g</span>
      <button class="shop-buy-btn" ${(player.gold >= cost && spent > 0) ? '' : 'disabled'} onclick="respecAttrs()">RESET</button>
    </div>
    <div class="town-blurb" style="margin-top:10px">Retrain into a different class for ${classChangeCost()}g. Your attributes are kept; if your new class can't wield your weapon, it goes back in your bag.</div>
    ${CLASS_KEYS.map(k => {
      const c = CLASSES[k];
      const cur = player.class === k;
      const ccost = classChangeCost();
      return `<div class="shop-row">
        <span class="loot-icon">${c.icon}</span>
        <div class="shop-row-info"><div class="shop-row-name" style="color:${c.color}">${c.name}${cur ? ' (current)' : ''}</div>
          <div class="shop-row-sub">${c.passive} · ${c.skill.icon} ${c.skill.name}</div></div>
        <button class="shop-buy-btn" ${cur || player.gold < ccost ? 'disabled' : ''} onclick="changeClass('${k}')">${cur ? '—' : ccost + 'g'}</button>
      </div>`;
    }).join('')}`);
}
function respecAttrs() {
  const spent = spentAttrPoints();
  const cost = respecCost();
  if (spent <= 0 || player.gold < cost) return;
  player.gold -= cost;
  player.attrPoints = (player.attrPoints || 0) + spent;
  player.attributes = baseAttributes();
  recomputeMaxStats();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  if (player.mp > player.maxMp) player.mp = player.maxMp;
  sfx('shrine');
  log(`🎓 You unlearn your attributes — ${spent} point${spent === 1 ? '' : 's'} returned to spend.`, 'important');
  updateBars(); renderPanel(); renderTrainer(); saveGame();
}

// ── ENCHANTER — fill in & reroll item affixes ──
// Lets the player gamble gold to add a missing affix (Augment), reroll every
// bonus affix at once (Reroll), or reroll a single chosen affix. Headlines
// (weapon DMG / armor DEF/ATK) are untouched; rerolls respect the slot's pool,
// the rarity caps, and the no-duplicate rule, all via the shared affix helpers.
let enchantSel = null; // id of the item currently being worked on, or null

// Every gear item the player owns (equipped first, then bag).
function allGear() {
  const list = [];
  for (const s of SLOT_KEYS) if (equipped[s]) list.push({ item: equipped[s], where: 'equipped', slot: s });
  inventory.forEach((it, i) => { if (it && it.slot) list.push({ item: it, where: 'bag', idx: i }); });
  return list;
}
function findGear(id) { return allGear().find(g => g.item.id == id) || null; }

// Cost helpers scale with item level and rarity. Enchanting is now paid in
// ✨ Glimmer plus some gold (and a 🌀 Chaos Orb for the big epic+ reforge), so
// each returns a cost object (see canAfford / spendCost / costLabel).
function enchRank(item) { return Object.keys(TIERS).indexOf(item.tier); }
function enchTierFactor(item) { return 1 + enchRank(item) * 0.3; }
function augmentCost(item)   { return { gold: Math.round((30 + (item.ilvl||1) * 5) * enchTierFactor(item)), glimmer: 2 + Math.floor(enchRank(item) / 2) }; }
function rerollAllCost(item) {
  const c = { gold: Math.round((45 + (item.ilvl||1) * 7) * enchTierFactor(item)), glimmer: 3 + Math.floor(enchRank(item) / 2) };
  if (enchRank(item) >= 4) c.chaos = 1; // epic+ reforge demands a Chaos Orb
  return c;
}
// Rerolling a single property comes in two flavours: changing the property TYPE
// (Might → Agility) is the bigger gamble, while rerolling just its VALUE
// (+13 Might → +18 Might) is cheaper because it can only land within the band.
function rerollTypeCost(item)  { return { gold: Math.round((18 + (item.ilvl||1) * 3) * enchTierFactor(item)), glimmer: 1 + Math.floor(enchRank(item) / 3) }; }
function rerollValueCost(item) { return { gold: Math.round((10 + (item.ilvl||1) * 2) * enchTierFactor(item)), glimmer: 1 }; }

// Pretty "min–max" (or single number) for a stat/attr affix at this item's
// level & rarity, so the UI can show the value band a reroll would land in.
function statRangeLabel(item, stat) {
  const r = affixStatRange(stat, item.ilvl, tierMult(item.tier));
  return r.min === r.max ? `${r.min}` : `${r.min}–${r.max}`;
}
function attrRangeLabel(item) {
  const r = affixAttrRange(item.ilvl, tierMult(item.tier));
  return r.min === r.max ? `${r.min}` : `${r.min}–${r.max}`;
}
// Other property TYPES this slot could roll into (the pool minus what's present,
// minus the property itself) — what a TYPE reroll might swap a property for.
function otherStatTypes(item, key) {
  return (SLOT_AFFIX_POOLS[item.slot]?.stats || []).filter(s => s !== key && !(s in item.stats));
}
function otherAttrTypes(item, key) {
  return (SLOT_AFFIX_POOLS[item.slot]?.attrs || []).filter(a => a !== key && !(a in (item.attrs || {})));
}

// Affixes currently available to ADD (slot pool minus what's already present).
function availStatAffixes(item) {
  return (SLOT_AFFIX_POOLS[item.slot]?.stats || []).filter(s => !(s in item.stats));
}
function availAttrAffixes(item) {
  return (SLOT_AFFIX_POOLS[item.slot]?.attrs || []).filter(a => !(a in (item.attrs || {})));
}
// Count of bonus (non-headline) affixes the item carries.
function itemAffixCounts(item) {
  const head = headlineStats(item);
  return {
    statN: Object.keys(item.stats).filter(s => !head.includes(s)).length,
    attrN: Object.keys(item.attrs || {}).length,
  };
}
function canAddStat(item) {
  const caps = TIER_AFFIX_CAPS[item.tier] || { stat:0, attr:0 };
  return itemAffixCounts(item).statN < caps.stat && availStatAffixes(item).length > 0;
}
function canAddAttr(item) {
  const caps = TIER_AFFIX_CAPS[item.tier] || { stat:0, attr:0 };
  return itemAffixCounts(item).attrN < caps.attr && availAttrAffixes(item).length > 0;
}

function openEnchanter() { enchantSel = null; openTownModal('🪄 Enchanter'); renderEnchanter(); }

// After any enchant: refresh derived stats if the piece is worn, then re-render.
function afterEnchant(item) {
  if (Object.values(equipped).includes(item)) { recomputeMaxStats(); if (player.hp > player.maxHp) player.hp = player.maxHp; if (player.mp > player.maxMp) player.mp = player.maxMp; }
  sfx('shrine');
  hideHoverTip(); // the hovered button is about to be re-rendered out from under it
  updateBars(); renderPanel(); saveGame(); renderEnchanter();
}

function enchantAugment(id) {
  const g = findGear(id); if (!g) return;
  const item = g.item;
  const cost = augmentCost(item);
  const stat = canAddStat(item), attr = canAddAttr(item);
  if ((!stat && !attr) || !canAfford(cost)) return;
  const mult = tierMult(item.tier);
  // If both kinds have room, lean toward stats (attrs are the rarer, stronger slot).
  const addAttr = attr && (!stat || Math.random() < 0.4);
  if (addAttr) addAttrAffixes(item, item.ilvl, mult, 1);
  else         addStatAffixes(item, item.ilvl, mult, 1);
  spendCost(cost);
  log(`🪄 The enchanter augments your ${item.name} with a new property.`, 'loot');
  afterEnchant(item);
}

function enchantRerollAll(id) {
  const g = findGear(id); if (!g) return;
  const item = g.item;
  const cost = rerollAllCost(item);
  const caps = TIER_AFFIX_CAPS[item.tier] || { stat:0, attr:0 };
  if (!canAfford(cost) || (caps.stat + caps.attr) === 0) return;
  const head = headlineStats(item);
  for (const k of Object.keys(item.stats)) if (!head.includes(k)) delete item.stats[k];
  item.attrs = {};
  const mult = tierMult(item.tier);
  addStatAffixes(item, item.ilvl, mult, rollAffixCount(caps.stat));
  addAttrAffixes(item, item.ilvl, mult, rollAffixCount(caps.attr));
  spendCost(cost);
  log(`🪄 The enchanter reforges every property on your ${item.name}.`, 'loot');
  afterEnchant(item);
}

// Reroll just a property's VALUE, keeping the same modifier (e.g. +13 Might →
// +18 Might). Reassigns the existing key in place so the property list never
// reshuffles. No-op for fixed-value stats (crit chance / crit damage), whose
// button is disabled in the UI.
function enchantRerollValue(id, kind, key) {
  const g = findGear(id); if (!g) return;
  const item = g.item;
  const cost = rerollValueCost(item);
  if (!canAfford(cost)) return;
  const mult = tierMult(item.tier);
  if (kind === 'stat') {
    if (headlineStats(item).includes(key) || !(key in item.stats)) return;
    item.stats[key] = affixStatValue(key, item.ilvl, mult);
  } else {
    if (!item.attrs || !(key in item.attrs)) return;
    item.attrs[key] = affixAttrValue(item.ilvl, mult);
  }
  spendCost(cost);
  log(`🪄 The enchanter reforges the strength of a property on your ${item.name}.`, 'loot');
  afterEnchant(item);
}

// Reroll a property's TYPE into a *different* modifier from the slot's pool
// (e.g. Might → Agility), rolling a fresh value for it too. The new property is
// written into the same key slot's position via rebuild so the list stays put.
function enchantRerollType(id, kind, key) {
  const g = findGear(id); if (!g) return;
  const item = g.item;
  const cost = rerollTypeCost(item);
  if (!canAfford(cost)) return;
  const mult = tierMult(item.tier);
  if (kind === 'stat') {
    if (headlineStats(item).includes(key) || !(key in item.stats)) return;
    const pool = otherStatTypes(item, key);
    if (!pool.length) return; // no other stat this slot can hold
    const ns = pick(pool);
    item.stats = replaceObjKey(item.stats, key, ns, affixStatValue(ns, item.ilvl, mult));
  } else {
    if (!item.attrs || !(key in item.attrs)) return;
    const pool = otherAttrTypes(item, key);
    if (!pool.length) return;
    const na = pick(pool);
    item.attrs = replaceObjKey(item.attrs, key, na, affixAttrValue(item.ilvl, mult));
  }
  spendCost(cost);
  log(`🪄 The enchanter transmutes a property on your ${item.name} into something new.`, 'loot');
  afterEnchant(item);
}

// Rebuild an object replacing oldKey with newKey:newVal in the SAME position,
// so property order is preserved when a type reroll swaps one modifier out.
function replaceObjKey(obj, oldKey, newKey, newVal) {
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (k === oldKey) out[newKey] = newVal;
    else out[k] = v;
  }
  return out;
}

function renderEnchanter() {
  // Detail view for a chosen item, else the pick list.
  if (enchantSel != null && findGear(enchantSel)) { renderEnchantItem(findGear(enchantSel).item); return; }
  enchantSel = null;
  const gear = allGear();
  if (!gear.length) {
    setTownContent(`<div class="town-blurb">The enchanter can add and reroll properties on your gear — but you have none to work on.</div>`);
    return;
  }
  const rows = gear.map(g => {
    const it = g.item;
    return `<div class="shop-row">
      <span class="loot-icon">${iconMarkup(itemIcon(it), tierColor(it))}</span>
      <div class="shop-row-info item-${it.tier}">
        <div class="shop-row-name">${it.name}${craftedMark(it)}${g.where === 'equipped' ? ' <span style="color:#7fb0ff;font-size:9px">[worn]</span>' : ''}</div>
        <div class="shop-row-stats">${itemStatLine(it)}</div>
      </div>
      <button class="shop-buy-btn" onclick="enchantPick(${g.item.id})">WORK</button>
    </div>`;
  }).join('');
  setTownContent(`<div class="town-blurb">The enchanter tinkers with your gear using ✨ <b>Glimmer</b> (and a little gold): <b>Augment</b> adds a missing property, <b>Reroll all</b> gambles every bonus property at once, and each property can be rerolled on its own — its <b>value</b> (🎲, same modifier, new number) or its <b>modifier</b> (🔄, swapped for another). Rarity sets how many properties a piece can hold. Blank pieces from the 🔨 Craftsman start here.</div>${rows}`);
}

function enchantPick(id) { enchantSel = id; renderEnchanter(); }
function enchantBack()   { enchantSel = null; renderEnchanter(); }

function renderEnchantItem(item) {
  const caps = TIER_AFFIX_CAPS[item.tier] || { stat:0, attr:0 };
  const { statN, attrN } = itemAffixCounts(item);
  const head = headlineStats(item);
  const poolStats = SLOT_AFFIX_POOLS[item.slot]?.stats || [];
  const poolAttrs = SLOT_AFFIX_POOLS[item.slot]?.attrs || [];
  // Stable display order: follow the slot's pool order, with any legacy
  // off-pool properties trailing. This keeps the list from reshuffling when a
  // property is rerolled.
  const orderBy = pool => (a, b) => {
    const ia = pool.indexOf(a), ib = pool.indexOf(b);
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  };
  // Headline (locked) lines.
  const headRows = head.filter(k => k in item.stats).map(k =>
    `<div class="hc-line" style="opacity:0.6">🔒 ${(typeof item.stats[k]==='string')?item.stats[k]:'+'+item.stats[k]} ${STAT_LABELS[k]||k} <span style="font-size:9px">(headline)</span></div>`
  ).join('');
  const valCost = rerollValueCost(item), typeCost = rerollTypeCost(item);

  // One property row: a Value reroll (same modifier, new number) and a Type
  // reroll (swap to a different modifier). Each button shows what it would do.
  const propRow = (kind, key, label, color, curVal, rangeStr, swaps) => {
    const fixed = rangeStr.indexOf('–') < 0;             // single fixed value → value reroll is a no-op
    const canVal  = canAfford(valCost) && !fixed;
    const canType = canAfford(typeCost) && swaps.length > 0;
    const labelTag = `<b style="${color || 'color:#cdd6f4'}">${label}</b>`;
    // Gear-style hover cards (title line + description), escaped for the attr.
    const esc = s => s.replace(/"/g, '&quot;');
    const valTip = esc(fixed
      ? `<div class="ht-name">🎲 Reroll Value</div><div class="ht-line">${labelTag} has a fixed value (${rangeStr}) at this item level — nothing to reroll.</div>`
      : `<div class="ht-name">🎲 Reroll Value</div><div class="ht-line">Keeps ${labelTag}, rolls a new number.</div><div class="ht-sub">Lands ${rangeStr} at ilvl ${item.ilvl} (now ${curVal < 0 ? '' : '+'}${curVal}).</div>`);
    const typeTip = esc(swaps.length
      ? `<div class="ht-name">🔄 Reroll Modifier</div><div class="ht-line">Swaps ${labelTag} for a random other modifier this slot can hold:</div><div class="ht-sub">${swaps.join(', ')}</div>`
      : `<div class="ht-name">🔄 Reroll Modifier</div><div class="ht-line">No other modifier is available — every type this slot can roll is already present.</div>`);
    return `<div class="shop-row"><div class="shop-row-info">
        <div class="shop-row-name" style="${color}">${curVal < 0 ? '' : '+'}${curVal} ${label}</div>
        <div class="shop-row-sub">rolls ${rangeStr} at ilvl ${item.ilvl}</div></div>
      <span class="ench-tipwrap" data-tip="${valTip}" onmouseenter="showHoverTip(event,this)" onmouseleave="hideHoverTip()"><button class="shop-buy-btn ench-btn" ${canVal?'':'disabled'} onclick="enchantRerollValue(${item.id},'${kind}','${key}')">🎲 ${costLabel(valCost)}</button></span>
      <span class="ench-tipwrap" data-tip="${typeTip}" onmouseenter="showHoverTip(event,this)" onmouseleave="hideHoverTip()"><button class="shop-buy-btn ench-btn" ${canType?'':'disabled'} onclick="enchantRerollType(${item.id},'${kind}','${key}')">🔄 ${costLabel(typeCost)}</button></span></div>`;
  };

  const statRows = Object.keys(item.stats).filter(k => !head.includes(k)).sort(orderBy(poolStats)).map(k =>
    propRow('stat', k, STAT_LABELS[k]||k, '', item.stats[k], statRangeLabel(item, k), otherStatTypes(item, k).map(s => STAT_LABELS[s]||s))
  ).join('');
  const attrRows = Object.keys(item.attrs || {}).sort(orderBy(poolAttrs)).map(k =>
    propRow('attr', k, ATTRIBUTES[k].label, 'color:#e6c34a', item.attrs[k], attrRangeLabel(item), otherAttrTypes(item, k).map(a => ATTRIBUTES[a].label))
  ).join('');
  const empty = (!statRows && !attrRows) ? `<div class="hc-line" style="opacity:0.6">No bonus properties yet.</div>` : '';

  // Action buttons.
  const augCost = augmentCost(item);
  const canAug = canAddStat(item) || canAddAttr(item);
  const allCost = rerollAllCost(item);
  const augBtn = `<button class="shop-buy-btn" ${(canAug && canAfford(augCost))?'':'disabled'} onclick="enchantAugment(${item.id})">✨ Augment ${costLabel(augCost)}</button>`;
  const allBtn = `<button class="shop-buy-btn" ${(canAfford(allCost) && (caps.stat+caps.attr)>0)?'':'disabled'} onclick="enchantRerollAll(${item.id})">🔄 Reroll all ${costLabel(allCost)}</button>`;

  // Why is Augment unavailable? Distinguish "rarity slots full" from "this slot
  // has no more modifier types to add" (the common, confusing case — e.g. a
  // weapon shows 3/4 stats but weapons only have 3 stat types to begin with).
  let blockMsg = '';
  if (!canAug) {
    const capFull = statN >= caps.stat && attrN >= caps.attr;
    blockMsg = capFull
      ? 'All property slots for this rarity are full.'
      : 'No more modifier types are available for this slot — every property it can roll is already present, so there is nothing new to add.';
  }

  // Reference panel: every modifier this slot can roll, with its value band, so
  // you can judge a reroll before spending. Present modifiers are marked.
  const poolLine = (key, label, rangeStr, present) =>
    `<div class="ench-pool-line${present?' on':''}">${present?'◆':'◇'} ${label} <span class="ench-pool-range">${rangeStr}</span></div>`;
  const statPool = poolStats.map(s => poolLine(s, STAT_LABELS[s]||s, statRangeLabel(item, s), s in item.stats)).join('');
  const attrPool = poolAttrs.map(a => poolLine(a, ATTRIBUTES[a].label, attrRangeLabel(item), item.attrs && a in item.attrs)).join('');
  const poolPanel = `<div class="ench-pool">
      <div class="ench-pool-head">Modifiers this slot can roll <span style="opacity:0.6">(◆ = on item)</span></div>
      ${statPool ? `<div class="ench-pool-grp">Stats</div>${statPool}` : ''}
      ${attrPool ? `<div class="ench-pool-grp">Attributes</div>${attrPool}` : ''}
    </div>`;

  setTownContent(`
    <div class="shop-row"><button class="shop-buy-btn" onclick="enchantBack()">← Back</button>
      <div class="shop-row-info item-${item.tier}" style="margin-left:8px"><div class="shop-row-name">${item.name}${craftedMark(item)}</div>
      <div class="shop-row-sub">${SLOTS[item.slot].label.replace(/^\S+\s/,'')} · ilvl ${item.ilvl} · ${statN}/${caps.stat} stats · ${attrN}/${caps.attr} attrs</div></div></div>
    <div class="ench-legend">🎲 reroll value · 🔄 reroll modifier · hover a button for details</div>
    ${headRows}
    ${empty}${statRows}${attrRows}
    <div class="shop-row" style="margin-top:6px;gap:6px">${augBtn}${allBtn}</div>
    ${blockMsg ? `<div class="hc-line" style="opacity:0.6;margin-top:4px">${blockMsg}</div>` : ''}
    ${poolPanel}`);
}

// ── DUNGEON GATE — choose any reached floor to re-enter ──
function openGate() { openTownModal('🌀 Dungeon Gate'); renderGate(); }
function renderGate() {
  const maxF = Math.max(1, player.maxFloor || 1);
  let buttons = '';
  for (let f = 1; f <= maxF; f++) {
    const deepest = f === maxF;
    buttons += `<button class="gate-floor ${f === dungeonReturn ? 'current' : ''}" onclick="enterDungeonAt(${f})">${f}${deepest ? ' ▾' : ''}</button>`;
  }
  setTownContent(`
    <div class="town-blurb">Step back into the dungeon on any floor you've reached (deepest: ${maxF}). Lower floors are great for grinding levels and gear before pushing deeper.</div>
    <div class="gate-grid">${buttons}</div>`);
}
function enterDungeonAt(f) {
  const maxF = Math.max(1, player.maxFloor || 1);
  f = Math.max(1, Math.min(maxF, f));
  closeTown();
  dungeonLevel = f;
  statusEffects = [];
  player.x = 5; player.y = 5;
  generateMap();   // clears inTown and builds the chosen floor
  maybeFloorEvent();
  sfx('stairs');
  log(`🌀 You step through the gate onto dungeon floor ${f}.`, 'important');
  updateBars(); draw(); saveGame();
}

// ── GAMBLER — wager gold for a random piece of loot ──
// The gambler sells a single thrill: pay gold, get a random item geared near
// your deepest floor. Prices climb the deeper you've delved, and so do the
// possible rewards. The item level is rolled within -10/+3 of your deepest
// floor, weighted to land at (or just below) your depth, with a thin tail
// reaching above it. The rarity is rolled bottom-heavy so most pulls are
// humble — yet every tier, up to a leveled-up legendary or unique, is on the
// table, so a lucky wager can hand you something far beyond your reach.
let gambleLast = null;
// Which equipment slot the next wager is targeted at. null = "any" (the classic
// blind pull); a slot key (e.g. 'weapon') narrows the pull to that item type for
// a surcharge — you trade a heavier price for a guaranteed category.
let gambleSlot = null;

function gambleDeepest() { return Math.max(1, dungeonReturn || 1, player.maxFloor || 1); }

// Targeting a specific item type costs a premium over a blind pull — you're
// paying the gambler to narrow the odds in your favour.
const GAMBLE_TARGET_SURCHARGE = 1.6;

function gambleCost(slot = gambleSlot) {
  const d = gambleDeepest();
  // Linear base plus a gentle quadratic so deep wagers cost meaningfully more,
  // mirroring how much more valuable deep gear is.
  const base = 50 + d * 12 + d * d * 0.4;
  return Math.round(base * (slot ? GAMBLE_TARGET_SURCHARGE : 1));
}

function setGambleSlot(slot) {
  gambleSlot = (slot === gambleSlot || slot === '') ? null : slot;
  renderGambler();
}

// Item-level offset distribution, relative to your deepest floor. Peaks at -1/0
// (at or just below depth), with a long, thinning tail down to -10 and a short,
// thin tail up to +3 — so most pulls are at/below level, a few rise above.
const GAMBLE_ILVL_WEIGHTS = {
  '-10': 1.5, '-9': 2, '-8': 2.5, '-7': 3, '-6': 4, '-5': 5, '-4': 6,
  '-3': 8, '-2': 10, '-1': 11, '0': 10, '1': 5, '2': 2.5, '3': 1,
};

// Rarity distribution for a wager: bottom-heavy (lower rarity far more likely),
// but every tier is reachable — including a slim shot at legendary / unique.
const GAMBLE_TIER_WEIGHTS = {
  normal: 40, uncommon: 26, rare: 14, epic: 6, legendary: 2, unique: 0.7,
};

function gambleRollIlvl() {
  const off = Number(weighted(GAMBLE_ILVL_WEIGHTS));
  return Math.max(1, gambleDeepest() + off);
}

function openGambler() { gambleLast = null; gambleSlot = null; openTownModal('🎲 Gambler'); renderGambler(); }

function renderGambler() {
  const d = gambleDeepest();
  const cost = gambleCost();
  const afford = player.gold >= cost;
  // Type-selector chips: "Any" (blind pull) plus one per equipment slot. The
  // selected chip drives both the price (targeting carries a surcharge) and the
  // slot the roll is locked to.
  const chip = (slot, label) =>
    `<button class="cos-chip ${gambleSlot === slot ? 'sel' : ''}" onclick="setGambleSlot('${slot}')">${label}</button>`;
  const chips = chip('', '🎲 Any') +
    SLOT_KEYS.map(s => chip(s, SLOTS[s].label)).join('');
  const targetName = gambleSlot ? SLOTS[gambleSlot].label.replace(/^\S+\s/, '') : 'any type';
  const rollLabel = gambleSlot ? `Wager for a ${targetName}` : 'Wager for Loot';
  const rollSub = gambleSlot
    ? `Item level ${Math.max(1, d - 10)}–${d + 3} · guaranteed ${targetName.toLowerCase()} · targeting surcharge`
    : `Item level ${Math.max(1, d - 10)}–${d + 3} · any rarity · the deeper you've delved, the higher the stakes`;
  let resultRow = '';
  if (gambleLast) {
    const it = gambleLast.item;
    const above = (it.ilvl > d) ? ' <span style="color:#ffd24b">(above your depth!)</span>' : '';
    resultRow = `<div class="town-blurb" style="margin-top:10px">Your last wager (${gambleLast.cost}g) turned up:</div>
      <div class="shop-row">
        <span class="loot-icon">${iconMarkup(itemIcon(it), tierColor(it))}</span>
        <div class="shop-row-info item-${it.tier}">
          <div class="shop-row-name">${it.name}</div>
          <div class="shop-row-stats">ilvl ${it.ilvl}${above} · ${itemStatLine(it)}</div>
        </div>
      </div>`;
  }
  setTownContent(`
    <div class="town-blurb">The gambler shoves a heap of mystery loot across the table. Throw down your gold and she'll pull a random piece of gear geared near your deepest floor (${d}). Most pulls land at — or a little below — your depth at a humble rarity, but fortune is fickle: a single wager can turn up something legendary from far beyond your reach. Pick a slot to fish for a specific item type — for a steeper price.</div>
    <div class="town-blurb" style="margin-bottom:4px">Gamble for:</div>
    <div class="cos-chips" style="margin-bottom:10px">${chips}</div>
    <div class="shop-row">
      <span class="loot-icon">🎲</span>
      <div class="shop-row-info"><div class="shop-row-name">${rollLabel}</div>
        <div class="shop-row-sub">${rollSub}</div></div>
      <span class="shop-price">${cost}g</span>
      <button class="shop-buy-btn" ${afford ? '' : 'disabled'} onclick="gambleRoll()">ROLL</button>
    </div>
    ${resultRow}`);
}

function gambleRoll() {
  const cost = gambleCost();
  if (player.gold < cost) return;
  player.gold -= cost;
  const ilvl = gambleRollIlvl();
  const tier = weighted(GAMBLE_TIER_WEIGHTS);
  const item = generateItem(1, ilvl, tier, gambleSlot);
  inventory.push(item);
  recordWardrobe(item);
  gambleLast = { item, cost };
  const rank = Object.keys(TIERS).indexOf(tier);
  const jackpot = rank >= 4; // legendary or unique
  sfx(jackpot ? 'levelup' : 'loot');
  log(`🎲 You wager ${cost}g and the dice favor you — ${logItem(item)}!`, jackpot ? 'important' : 'loot');
  updateBars(); renderPanel(); renderGambler(); saveGame();
}

// Warm cobblestone plaza tile — clearly a town square, not a dungeon floor.
function drawTownFloor(px, py, tw, th, x, y, seed) {
  ctx.fillStyle = (x + y) % 2 === 0 ? '#8a7d63' : '#7e7158';
  ctx.fillRect(px, py, tw, th);
  // cobble seams
  ctx.fillStyle = 'rgba(58,50,36,0.5)';
  ctx.fillRect(px, py, tw, 1);
  ctx.fillRect(px, py, 1, th);
  // worn cobble highlight
  if (seed % 7 === 0) {
    ctx.fillStyle = 'rgba(255,240,205,0.12)';
    ctx.fillRect(px + tw * 0.28, py + th * 0.28, tw * 0.32, th * 0.32);
  }
  // the odd tuft of grass between the stones
  if (seed % 13 === 0) {
    ctx.fillStyle = 'rgba(86,142,62,0.55)';
    ctx.fillRect(px + tw * 0.55, py + th * 0.6, tw * 0.22, Math.max(1, th * 0.18));
    ctx.fillRect(px + tw * 0.2, py + th * 0.68, tw * 0.14, Math.max(1, th * 0.12));
  }
}

// Paint the town's shop buildings: a timbered plaster wall, door, lit windows,
// a colour-coded gabled roof, and a hanging shingle. The Dungeon Gate renders as
// a glowing stone archway instead.
function drawTownBuildings(offX, offY, tw, th) {
  townBuildings.forEach(b => {
    const x0 = offX + b.x * tw, y0 = offY + b.y * th;
    const w = b.w * tw, h = b.h * th;

    if (b.kind === 'gate') {
      // Stone archway with a swirling portal in the opening.
      ctx.fillStyle = '#6a6275';
      ctx.fillRect(x0, y0 + h * 0.12, w * 0.24, h * 0.88);
      ctx.fillRect(x0 + w - w * 0.24, y0 + h * 0.12, w * 0.24, h * 0.88);
      ctx.fillStyle = '#7c7488';
      ctx.fillRect(x0 - tw * 0.06, y0 + h * 0.02, w + tw * 0.12, h * 0.2);
      // block seams on the lintel
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(x0 + w * 0.5 - 1, y0 + h * 0.02, 2, h * 0.2);
      const tp = 0.5 + 0.5 * Math.sin(Date.now() / 300);
      ctx.save();
      ctx.shadowColor = '#bb66ff';
      ctx.shadowBlur = 14 * (tw / TILE);
      ctx.fillStyle = `rgba(150,90,230,${0.5 + 0.32 * tp})`;
      ctx.beginPath();
      ctx.ellipse(x0 + w / 2, y0 + h * 0.6, w * 0.24, h * 0.34, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(225,195,255,${0.4 + 0.4 * tp})`;
      ctx.beginPath();
      ctx.ellipse(x0 + w / 2, y0 + h * 0.6, w * 0.1, h * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return;
    }

    const eave = y0 + h * 0.4;            // where the roof meets the wall
    const wallH = y0 + h - eave;
    const fr = Math.max(2, tw * 0.08);    // timber frame thickness

    // plaster wall
    ctx.fillStyle = '#cbab86';
    ctx.fillRect(x0, eave, w, wallH);
    // timber framing (corners + sill)
    ctx.fillStyle = '#6b4a2c';
    ctx.fillRect(x0, eave, fr, wallH);
    ctx.fillRect(x0 + w - fr, eave, fr, wallH);
    ctx.fillRect(x0, y0 + h - Math.max(2, th * 0.12), w, Math.max(2, th * 0.12));

    // lit windows flanking the door
    ctx.fillStyle = '#ffe39a';
    const winW = tw * 0.34, winH = th * 0.3, winY = eave + th * 0.16;
    ctx.fillRect(x0 + w * 0.16, winY, winW, winH);
    ctx.fillRect(x0 + w - w * 0.16 - winW, winY, winW, winH);
    ctx.fillStyle = '#6b4a2c'; // muntins
    ctx.fillRect(x0 + w * 0.16 + winW / 2 - 1, winY, 2, winH);
    ctx.fillRect(x0 + w - w * 0.16 - winW / 2 - 1, winY, 2, winH);

    // door, centred at the bottom (where the keeper stands)
    const dw = tw * 0.5, dh = wallH * 0.72;
    const dx = x0 + w / 2 - dw / 2, dy = y0 + h - dh;
    ctx.fillStyle = '#4a2f18';
    ctx.fillRect(dx, dy, dw, dh);
    ctx.fillStyle = '#caa15a';
    ctx.beginPath();
    ctx.arc(dx + dw * 0.82, dy + dh * 0.5, Math.max(1, tw * 0.04), 0, Math.PI * 2);
    ctx.fill();

    // gabled roof, overhanging the walls a touch
    ctx.fillStyle = b.roof;
    ctx.beginPath();
    ctx.moveTo(x0 - tw * 0.12, eave);
    ctx.lineTo(x0 + w / 2, y0);
    ctx.lineTo(x0 + w + tw * 0.12, eave);
    ctx.closePath();
    ctx.fill();
    // shaded eave band
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x0 - tw * 0.12, eave, w + tw * 0.24, Math.max(2, th * 0.09));

    // hanging shingle with the shop's icon
    ctx.font = `${Math.round(tw * 0.4)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    drawEmoji(b.sign, x0 + w / 2, eave + th * 0.04, Math.round(tw * 0.4));
  });
}

// Draw the friendly townsfolk on top of the plaza, with a glow + name label.
function drawTownNpcs(offX, offY, tw, th, scale) {
  townNpcs.forEach(n => {
    const px = offX + n.x * tw, py = offY + n.y * th;
    const t = (Date.now() % 2400) / 2400;
    const pulse = 0.18 + 0.12 * (0.5 + 0.5 * Math.sin(t * Math.PI * 2));
    ctx.save();
    ctx.fillStyle = n.kind === 'gate' ? `rgba(150,90,255,${pulse + 0.12})` : `rgba(255,210,120,${pulse})`;
    ctx.beginPath();
    ctx.arc(px + tw / 2, py + th / 2, tw * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.font = `${Math.round(tw * 0.72)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    drawEmoji(n.emoji, px + tw / 2, py + th / 2 + th * 0.02, Math.round(tw * 0.72));
    ctx.font = `bold ${Math.round(tw * 0.32)}px serif`;
    drawEmoji(n.tag, px + tw / 2, py - th * 0.04, Math.round(tw * 0.32));
    ctx.font = `bold ${Math.round(tw * 0.2)}px monospace`;
    ctx.fillStyle = '#ffe9b0';
    ctx.fillText(n.name, px + tw / 2, py + th * 0.92);
  });
}

function spawnEnemies() {
  enemies = [];
  const isBossFloor = dungeonLevel % 5 === 0;
  let count = isBossFloor
    ? 1 + Math.floor(dungeonLevel / 5)
    : Math.min(3 + Math.floor(dungeonLevel * 0.7), 10);
  // Some floor modifiers crowd the level with extra foes.
  if (!isBossFloor && floorMod.enemyMult) count = Math.round(count * floorMod.enemyMult);
  if (!isBossFloor && pfx('enemy', 1) !== 1) count = Math.max(1, Math.round(count * pfx('enemy', 1)));

  // Pick 2-3 enemy types for this floor from the depth-appropriate band, so
  // each floor has variety while every monster stays around the same level.
  const bandIdx = Math.min(Math.floor((dungeonLevel - 1) / 3), ENEMY_POOL.length - 1);
  const pool = [...ENEMY_POOL[bandIdx]];
  const typeCount = Math.min(rnd(2, 3), pool.length);
  const floorTypes = [];
  for (let i = 0; i < typeCount; i++) floorTypes.push(pool.splice(rnd(0, pool.length-1), 1)[0]);

  // ~20% of non-boss floors feature a single glowing "elite" with better loot;
  // certain floor modifiers raise that chance.
  const eliteChance = 0.2 + (floorMod.eliteBonus || 0) + pfx('elite', 0);
  const eliteIndex = (!isBossFloor && Math.random() < eliteChance) ? rnd(0, count - 1) : -1;

  // Difficulty tracks the hero, not just the floor: once you out-level the depth
  // (e.g. by grinding lower floors from town), foes toughen so fights stay real.
  // Anti-grind: out-leveling a floor toughens its foes so fights stay real.
  // Capped, though — left uncapped this scales enemies up in lockstep with your
  // level forever, so grinding never gains ground and even the polynomial depth
  // curve would wall out. The cap lets dedicated grinding eventually overpower
  // any single floor, which is what keeps the dungeon endless rather than a dead
  // end (deep floors just demand a lot more grinding to get over).
  const lvlGap = Math.max(0, player.level - dungeonLevel);
  const threatScale = Math.min(2, 1 + lvlGap * 0.06);

  for (let i = 0; i < count; i++) {
    let ex, ey;
    let tries = 0;
    do {
      ex = rnd(1, MAP_W-1); ey = rnd(1, MAP_H-1); tries++;
    } while ((mapData[ey][ex] !== 0 || (ex === player.x && ey === player.y) || getEnemyAt(ex,ey)) && tries < 100);
    if (tries < 100) {
      if (isBossFloor && i === 0) {
        const bossIdx = Math.min(Math.floor(dungeonLevel / 5) - 1, BOSSES.length - 1);
        const boss = BOSSES[bossIdx];
        // A boss is a couple of levels above its floor, and scales primarily
        // with depth (with a gentle nudge from the hero's level so it keeps
        // pace as your power climbs). Its level also sets the loot it drops.
        const bossLevel = dungeonLevel + 2;
        const bossThreat = depthThreat(bossLevel) * threatScale;
        const bossHp = Math.round((50 + bossLevel * 23) * bossThreat);
        const bossDmg = Math.round((9 + bossLevel * 2.1) * bossThreat);
        enemies.push({
          x: ex, y: ey,
          hp: bossHp, maxHp: bossHp,
          type: boss.type, name: boss.name,
          level: bossLevel,
          dmg: bossDmg,
          dead: false, isBoss: true,
          statusChance: boss.ability === 'curse' ? 0.45 : 0.25,
          behavior: boss.behavior,
          bossAbility: boss.ability,
          cd: 3,            // turns before the signature ability can fire again
        });
        log(`⚠️ ${boss.name} ${boss.type} guards this floor — it ${boss.blurb}!`, 'important');
      } else {
        // Every monster is the level of its floor, so foes get incrementally
        // harder the deeper you dive. HP and damage scale off that level (floor
        // modifiers and any active mystic pact still nudge them up or down).
        // Damage is meaningful because armor now mitigates by a percentage
        // rather than a flat subtraction.
        const mobLevel = dungeonLevel;
        // depthThreat compounds with depth (deep is deadly); threatScale layers
        // main's anti-grind nudge on top (out-leveling a floor toughens its foes).
        const threat = depthThreat(mobLevel);
        const baseHp = Math.max(1, Math.round((10 + mobLevel * 8) * threat * (floorMod.hpMult || 1) * pfx('hp', 1) * threatScale));
        const baseDmg = Math.max(1, Math.round((3.5 + mobLevel * 1.9 + bandIdx) * threat * (floorMod.dmgMult || 1) * pfx('dmg', 1) * threatScale));
        if (i === eliteIndex) {
          const eHp = Math.round(baseHp * 2.2);
          const eName = pick(ELITE_NAMES);
          const eType = pick(floorTypes);
          enemies.push({
            x: ex, y: ey,
            hp: eHp, maxHp: eHp,
            type: eType,
            name: eName,
            level: mobLevel + 1,   // elites are a notch above the floor — richer loot
            dmg: Math.round(baseDmg * 1.4),
            dead: false, isElite: true,
            behavior: behaviorFor(eType),
          });
          log(`✨ ${eName}, a glowing elite, prowls this floor — slay it for richer loot!`, 'important');
        } else {
          const mType = pick(floorTypes);
          const mob = {
            x: ex, y: ey,
            hp: baseHp, maxHp: baseHp,
            type: mType,
            level: mobLevel,
            dmg: baseDmg,
            dead: false,
            behavior: behaviorFor(mType),
          };
          // ~22% of regular foes carry a random affix that shakes up the fight.
          if (Math.random() < 0.22) applyAffix(mob);
          enemies.push(mob);
        }
      }
    }
  }

  // Treasure Goblin: a rare, fast coward that flees on sight. Catch it for a
  // jackpot chest — but it never fights back, so it's a chase, not a duel.
  if (!isBossFloor && dungeonLevel >= 2 && Math.random() < 0.12) {
    let gx, gy, tries = 0;
    do {
      gx = rnd(1, MAP_W-1); gy = rnd(1, MAP_H-1); tries++;
    } while ((mapData[gy][gx] !== 0 || (gx === player.x && gy === player.y) || getEnemyAt(gx,gy)) && tries < 100);
    if (tries < 100) {
      const gHp = Math.round((12 + dungeonLevel * 7) * 1.2);
      enemies.push({
        x: gx, y: gy, hp: gHp, maxHp: gHp,
        type: '👺', name: 'Treasure', dmg: 1,
        level: dungeonLevel + 2,   // its jackpot chest drops gear a bit above the floor
        dead: false, isGoblin: true,
      });
      log('👺 A Treasure Goblin scurries about — catch it before it escapes!', 'important');
    }
  }
}

const AFFIXES = [
  { key: 'tough',    icon: '🛡️', name: 'Tough',    apply: m => { m.hp = Math.round(m.hp * 1.6); m.maxHp = m.hp; } },
  { key: 'fierce',   icon: '😡', name: 'Fierce',   apply: m => { m.dmg = Math.round(m.dmg * 1.4); } },
  { key: 'venomous', icon: '🧪', name: 'Venomous', apply: m => { m.statusChance = 0.4; } },
];
// Give an enemy a random affix: a name, an icon, and a stat/behaviour tweak.
function applyAffix(mob) {
  const a = pick(AFFIXES);
  mob.affixIcon = a.icon;
  mob.name = a.name;
  a.apply(mob);
}

function spawnGroundLoot() {
  groundItems = [];
  // Ground loot is a rare lucky find — most floors have none.
  let count = 0;
  if (Math.random() < 0.22) count = 1;
  if (count === 1 && dungeonLevel >= 6 && Math.random() < 0.15) count = 2;
  // Bountiful floors hide a few extra chests.
  if (floorMod.chestBonus) count += floorMod.chestBonus;
  // Deeper chests roll richer loot on top of the usual progression bonus.
  const chestLuck = 1 + Math.floor(dungeonLevel / 4);
  for (let i = 0; i < count; i++) {
    let gx, gy;
    let tries = 0;
    do {
      gx = rnd(1, MAP_W-1); gy = rnd(1, MAP_H-1); tries++;
    } while (mapData[gy][gx] !== 0 && tries < 100);
    if (tries < 100) groundItems.push({ x: gx, y: gy, luck: chestLuck, ilvl: dungeonLevel });
  }
  // Spawn food — a rare find: most floors have none.
  groundFood = [];
  let foodCount = 0;
  if (Math.random() < 0.18) foodCount = 1;
  for (let i = 0; i < foodCount; i++) {
    let fx, fy, tries = 0;
    do {
      fx = rnd(1, MAP_W-1); fy = rnd(1, MAP_H-1); tries++;
    } while ((mapData[fy][fx] !== 0 || (fx === player.x && fy === player.y)) && tries < 100);
    if (tries < 100) groundFood.push({ x: fx, y: fy, ...pick(FOODS) });
  }
  // Scatter coin piles — a few on most floors, lots during a Gold Rush.
  groundGold = [];
  let coinCount = (Math.random() < 0.5 ? 1 : 0) + (floorMod.goldPiles || 0) + pfx('goldPiles', 0);
  for (let i = 0; i < coinCount; i++) {
    let cx, cy, tries = 0;
    do {
      cx = rnd(1, MAP_W-1); cy = rnd(1, MAP_H-1); tries++;
    } while ((mapData[cy][cx] !== 0 || (cx === player.x && cy === player.y)) && tries < 100);
    if (tries < 100) groundGold.push({ x: cx, y: cy, amount: rnd(3, 10) + dungeonLevel * 2 });
  }
}

// ══════════════════════════════════════════
// ITEM GENERATION
// ══════════════════════════════════════════

// Bonus rarity rolls earned from progression: the deeper you delve and the
// higher your level, the more rolls every drop gets (and keeps the best),
// so rarer loot steadily becomes more common. Capped so it stays sane.
function progressionRolls() {
  const depth = Math.min(6, Math.floor(dungeonLevel / 4) + Math.floor((player.level - 1) / 5));
  // The Luck attribute sweetens every drop with extra rarity rolls (capped).
  const luck = Math.min(3, Math.floor(Math.max(0, totalAttr('luck') - ATTR_BASE) / 12));
  return depth + luck;
}

function rollTier(rolls = 1) {
  const entries = Object.entries(TIERS);
  const total = entries.reduce((s, [,v]) => s + v.weight, 0);
  const rollOnce = () => {
    let roll = Math.random() * total;
    for (const [k, v] of entries) {
      roll -= v.weight;
      if (roll <= 0) return k;
    }
    return 'normal';
  };
  // Luckier sources roll several times and keep the rarest result, so bosses
  // (many rolls) skew much higher than elites, which skew higher than normal.
  // Progression adds extra rolls on top, raising rarity as you advance.
  const order = Object.keys(TIERS);
  const totalRolls = Math.max(1, rolls + progressionRolls());
  let best = rollOnce();
  for (let i = 1; i < totalRolls; i++) {
    const r = rollOnce();
    if (order.indexOf(r) > order.indexOf(best)) best = r;
  }
  return best;
}

// Rarity multiplier applied to every rolled value. Deliberately compressed (~4x
// from junk to unique) so that item level — not rarity — is the dominant driver.
const TIER_MULT = { junk:0.6, normal:0.85, uncommon:1.1, rare:1.45, epic:1.9, legendary:2.5, unique:3.2 };
function tierMult(tier) { return TIER_MULT[tier] || 1; }

// Value of one rolled gear-stat affix, scaled by item level and rarity. A few
// stats get bespoke scaling: regen ticks every step so it stays small; crit/luck
// are percentage-ish so they're gentler; HP/MP are flat pools so they're lifted
// to stay relevant next to the HP/MP that Vitality/Spirit grant; CRITDMG is a
// straight crit-damage % bonus on its own curve.
function affixStatValue(stat, lvl, mult) {
  const r = affixStatRange(stat, lvl, mult);
  return rnd(r.min, r.max);
}
// The min/max a stat affix can roll at this item level & rarity. Mirrors the
// scaling in affixStatValue exactly — the only randomness in the general curve
// is the `rnd(0,2)` term, so min uses 0 and max uses 2. Crit chance, crit damage
// and luck are deterministic (fixed at this ilvl), so their min === max. The
// enchanter UI uses this to show players the value band before they reroll.
function affixStatRange(stat, lvl, mult) {
  // Deterministic curves: a single fixed outcome at this item level.
  if (stat === 'CRIT' || stat === 'LCK') {
    const v = Math.max(1, Math.round(Math.min(6, (1 + lvl * 0.12) * mult)));
    return { min: v, max: v };
  }
  if (stat === 'CRITDMG') {
    const v = Math.max(1, Math.round((5 + lvl * 0.8) * mult));
    return { min: v, max: v };
  }
  // General curve: lo = rnd term 0, hi = rnd term 2, with per-stat scaling.
  let lo = (1 + lvl * 0.6 + 0) * mult;
  let hi = (1 + lvl * 0.6 + 2) * mult;
  if      (stat === 'REGEN') { lo *= 0.4; hi *= 0.4; }
  else if (stat === 'HP')    { lo *= 6;   hi *= 6;   }
  else if (stat === 'MP')    { lo *= 4;   hi *= 4;   }
  return { min: Math.max(1, Math.round(lo)), max: Math.max(1, Math.round(hi)) };
}
// Value of one rolled attribute affix (+Might, +Luck, …), now rolled within a
// modest band around its base so that rerolling an attribute's *value* actually
// does something (a fixed value would make value-rerolls pointless).
function affixAttrValue(lvl, mult) {
  const r = affixAttrRange(lvl, mult);
  return rnd(r.min, r.max);
}
function affixAttrRange(lvl, mult) {
  const base = (2 + lvl * 0.5) * mult * 0.5;
  return { min: Math.max(1, Math.round(base * 0.7)), max: Math.max(1, Math.round(base * 1.3)) };
}
// Size of a cursed item's boost (or penalty) for one stat. Crit chance (CRIT/LCK)
// only ranges 0–100% in play, so its swings stay tiny and capped — a single item
// must never shift crit chance by tens of percent. Every other stat — crit damage
// included — gets the big "great power at a price" numbers in either direction.
function curseSwing(stat, lvl, mult, boost) {
  if (stat === 'CRIT' || stat === 'LCK') {
    return Math.max(1, Math.min(5, Math.round((1 + lvl * 0.1) * mult)));
  }
  return Math.max(1, Math.round((boost ? 10 + lvl * 2 : 6 + lvl) * mult));
}
// Roll how many of a pool's affix slots actually fill — up to `max`, biased high
// so rarer gear tends to be fuller, but a sparse roll is always possible.
function rollAffixCount(max) {
  let n = 0;
  for (let i = 0; i < Math.max(0, max); i++) if (Math.random() < 0.72) n++;
  return n;
}
// Add up to `count` non-duplicate gear-stat affixes drawn from the slot's pool,
// skipping any stat already on the item (including its headline).
function addStatAffixes(item, lvl, mult, count) {
  const pool = (SLOT_AFFIX_POOLS[item.slot]?.stats || [])
    .filter(s => !(s in item.stats))
    .sort(() => Math.random() - 0.5);
  for (let i = 0; i < count && pool.length; i++) {
    const s = pool.shift();
    item.stats[s] = affixStatValue(s, lvl, mult);
  }
}
// Add up to `count` non-duplicate attribute affixes drawn from the slot's pool.
function addAttrAffixes(item, lvl, mult, count) {
  if (!item.attrs) item.attrs = {};
  const pool = (SLOT_AFFIX_POOLS[item.slot]?.attrs || [])
    .filter(a => !(a in item.attrs))
    .sort(() => Math.random() - 0.5);
  for (let i = 0; i < count && pool.length; i++) {
    const a = pool.shift();
    item.attrs[a] = affixAttrValue(lvl, mult);
  }
}
// The set of stats that count as an item's headline (never rerolled/removed):
// weapon damage, and the armor DEF/ATK granted by the slot itself.
function headlineStats(item) {
  if (item.slot === 'weapon') return ['DMG'];
  if (item.slot === 'hands')  return ['DEF','ATK'];
  if (item.slot === 'head' || item.slot === 'chest' || item.slot === 'legs') return ['DEF'];
  return []; // ring / amulet are pure-affix
}

function generateItem(rolls = 1, ilvl = null, forceTier = null, forceSlot = null) {
  // forceTier pins the rarity (used by the town gambler, which rolls its own
  // rarity distribution); otherwise rarity comes from the usual luck rolls.
  // forceSlot pins the equipment slot (also used by the gambler, when the player
  // pays to target a specific item type); otherwise the slot is rolled.
  const tier = forceTier || rollTier(rolls);
  const slot = (forceSlot && SLOTS[forceSlot]) ? forceSlot : weighted(SLOT_WEIGHTS);
  const baseName = pick(SLOTS[slot].names);
  // Item level: how deep this drop is geared for. Higher item level means
  // bigger raw stats regardless of rarity, so loot from deeper floors steadily
  // outweighs rarer loot found earlier. Defaults to the current dungeon depth.
  const lvl = Math.max(1, Math.round(ilvl != null ? ilvl : dungeonLevel));

  let name = baseName;
  if (tier === 'uncommon') name = pick(PREFIXES) + ' ' + baseName;
  if (tier === 'rare')     name = pick(PREFIXES) + ' ' + baseName + ' ' + pick(SUFFIXES);
  if (tier === 'epic')     name = pick(PREFIXES) + ' ' + baseName + ' ' + pick(SUFFIXES);
  if (tier === 'legendary') name = pick(PREFIXES) + ' ' + baseName + ' ' + pick(SUFFIXES);
  if (tier === 'unique')   name = 'The ' + pick(PREFIXES) + ' ' + baseName;

  const stats = {};
  const attrs = {};
  const mult = tierMult(tier);
  // Weapon damage uses a slightly gentler curve so epic+ weapons aren't overpowered.
  const dmgMult = { junk:0.55, normal:0.8, uncommon:1, rare:1.3, epic:1.65, legendary:2.1, unique:2.6 }[tier];

  // Headline stat by slot: weapons deal damage, armor gives defense, jewelry gives
  // pure affixes. Each headline scales linearly with item level, so depth steadily
  // lifts raw power. The headline is never an affix, so it's never duplicated below.
  if (slot === 'weapon') {
    const base = Math.max(1, Math.floor((2 + lvl * 1.2 + rnd(0,2)) * dmgMult));
    const spread = Math.max(1, Math.floor(base * 0.4));
    stats.DMG = `${base}-${base + spread}`;
  } else if (slot === 'head' || slot === 'chest' || slot === 'hands' || slot === 'legs') {
    // Bigger armor pieces give more DEF than smaller ones.
    const slotDef = { chest: 1.3, legs: 1.0, head: 0.8, hands: 0.7 }[slot];
    stats.DEF = Math.max(1, Math.floor((1 + lvl + rnd(0,2)) * mult * slotDef));
    // Gloves also grant a little attack power — far less than a weapon.
    if (slot === 'hands') {
      stats.ATK = Math.max(1, Math.floor((1 + lvl * 0.35) * mult * 0.6));
    }
  }

  // Base value by rarity, lifted by item level so deeper gear is worth more.
  const baseValue = { junk:1, normal:5, uncommon:20, rare:80, epic:300, legendary:1200, unique:5000 }[tier];
  let value = Math.round(baseValue * (1 + lvl * 0.12));

  const item = { id: Math.random(), name, tier, slot, ilvl: lvl, stats, attrs, value,
    flavor: pick(FLAVOR[tier]), icon: ITEM_ICONS[baseName] || SLOT_ICONS[slot] };

  // Roll bonus affixes — stats and attributes from the slot's pools, each up to
  // its rarity cap, never duplicating a stat/attribute or the headline.
  const caps = TIER_AFFIX_CAPS[tier] || { stat: 0, attr: 0 };
  addStatAffixes(item, lvl, mult, rollAffixCount(caps.stat));
  addAttrAffixes(item, lvl, mult, rollAffixCount(caps.attr));

  // Cursed items (~12% of uncommon+): a big stat boost paired with a penalty.
  // The negative stat flows straight through totalStat(), so the drawback is real.
  // Swing sizes come from curseSwing(), which keeps crit chance incremental while
  // letting crit damage and flat stats take the large hits.
  const tierRank = Object.keys(TIERS).indexOf(tier);
  if (tierRank >= 2 && Math.random() < 0.12) {
    const pool = (SLOT_AFFIX_POOLS[slot]?.stats || STAT_NAMES.filter(s => s !== 'DMG'));
    const boostStat = pick(pool);
    const curseStat = pick(pool.filter(s => s !== boostStat));
    stats[boostStat] = (stats[boostStat] || 0) + curseSwing(boostStat, lvl, mult, true);
    if (curseStat) stats[curseStat] = (stats[curseStat] || 0) - curseSwing(curseStat, lvl, mult, false); // negative = penalty
    item.cursed = true;
    item.name = '☠ ' + item.name;
    item.flavor = 'Cursed: great power at a price.';
    item.value = Math.round(value * 1.5);
  }
  return item;
}

function weighted(obj) {
  const total = Object.values(obj).reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for (const [k,v] of Object.entries(obj)) { r-=v; if(r<=0) return k; }
  return Object.keys(obj)[0];
}
