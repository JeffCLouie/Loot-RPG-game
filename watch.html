<!-- Dungeon Loot — live spectator page.
     Embeds a YouTube live stream so people can watch Claude play the game
     (and read the Claude Code terminal) on your own site, not on youtube.com.

     ── ONE-TIME SETUP ───────────────────────────────────────────────────────
     1. Find your YouTube channel ID:
        youtube.com → click your avatar → Settings → Advanced settings.
        It looks like  UCxxxxxxxxxxxxxxxxxxxxxx  (24 chars, starts with "UC").
     2. Paste it into DEFAULT_CHANNEL_ID below, between the quotes.
     That's it — this page always shows whatever is *currently live* on that
     channel, so the link you share never changes from stream to stream.

     Optional: you can also override per-visit with the URL, e.g.
        /watch.html?channel=UCxxxx…     (show live stream of a channel)
        /watch.html?v=VIDEO_ID          (show one specific video/stream)
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dungeon Loot — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0b1a;
    --panel: #1f1830;
    --border: #4a3d6a;
    --frame: #c8a24b;
    --text: #ece2cc;
    --gold: #e8c267;
    --live: #ff3b4e;
  }

  body {
    background:
      radial-gradient(circle at 50% -10%, #2a2148 0%, #150f26 55%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 14px;
    background: linear-gradient(180deg, #2c2344, #1a1430);
    border-bottom: 2px solid var(--frame);
    box-shadow: inset 0 1px 0 rgba(232,194,103,0.25), 0 2px 6px rgba(0,0,0,0.5);
  }
  header h1 {
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--gold);
    text-shadow: 0 2px 0 #000;
  }
  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: bold;
    color: var(--live);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .live-dot::before {
    content: "";
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 6px var(--live);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .stage {
    width: 100%;
    max-width: 1280px;
  }

  .player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border: 2px solid var(--frame);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6);
  }
  .player iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .notice {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 24px;
    color: var(--text);
  }
  .notice h2 { color: var(--gold); font-size: 18px; }
  .notice p { font-size: 13px; opacity: 0.85; max-width: 480px; line-height: 1.5; }
  .notice code {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--gold);
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 11px;
    opacity: 0.6;
  }
  footer a { color: var(--gold); }
</style>
</head>
<body>
  <header>
    <h1>⚔ Dungeon Loot</h1>
    <span class="live-dot">Live</span>
  </header>

  <main>
    <div class="stage">
      <div class="player" id="player"></div>
    </div>
  </main>

  <footer>
    Watching Claude play <a href="./index.html">Dungeon Loot</a> in real time.
  </footer>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  // Paste your YouTube channel ID here (starts with "UC"). See comment at top.
  const DEFAULT_CHANNEL_ID = "";

  // ── Build the embed ─────────────────────────────────────────────────────────
  const params  = new URLSearchParams(location.search);
  const videoId = params.get("v");
  const channel = params.get("channel") || DEFAULT_CHANNEL_ID;
  const player  = document.getElementById("player");

  function embed(src) {
    const f = document.createElement("iframe");
    f.src = src;
    f.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
    f.allowFullscreen = true;
    player.appendChild(f);
  }

  if (videoId) {
    // One specific video / scheduled stream.
    embed("https://www.youtube.com/embed/" + encodeURIComponent(videoId) + "?autoplay=1");
  } else if (channel) {
    // Whatever is currently live on the channel — link never changes.
    embed("https://www.youtube.com/embed/live_stream?channel=" + encodeURIComponent(channel) + "&autoplay=1");
  } else {
    // Not configured yet — show friendly setup hint instead of a black box.
    player.innerHTML =
      '<div class="notice">' +
        '<h2>Stream not configured yet</h2>' +
        '<p>Open <code>watch.html</code> and paste your YouTube channel ID into ' +
        '<code>DEFAULT_CHANNEL_ID</code>, or load this page with ' +
        '<code>?channel=UC…</code> or <code>?v=VIDEO_ID</code>.</p>' +
      '</div>';
  }
</script>
</body>
</html>
